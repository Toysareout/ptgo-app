<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#030308">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<title>COACHING ENGINE — Nerve Center</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030308;--surface:#0a0a14;--surface2:#10101f;--border:#1a1a2e;
  --cyan:#00f0ff;--pink:#ff2d8e;--green:#2dffa8;--gold:#c9a84c;--purple:#a855f7;--red:#ff4444;
  --text:#e0ddd4;--dim:#666680;
  --glow-cyan:0 0 20px rgba(0,240,255,.3);--glow-pink:0 0 20px rgba(255,45,142,.3);
  --glow-green:0 0 20px rgba(45,255,168,.3);--glow-gold:0 0 20px rgba(201,168,76,.3);
  --accent:var(--cyan);--line:var(--border);--muted:var(--dim);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;overflow-x:hidden}
::selection{background:var(--cyan);color:var(--bg)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
a{color:var(--cyan);text-decoration:none}

/* GRAIN OVERLAY */
#grain{position:fixed;inset:0;pointer-events:none;z-index:10000;opacity:.04}

/* SCANLINE */
.scanline{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.15;z-index:9999;animation:scanline 4s linear infinite;pointer-events:none}
@keyframes scanline{0%{top:0}100%{top:100vh}}

.wrap{max-width:720px;margin:0 auto;padding:20px 16px 90px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.brand{font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:3px;font-size:16px;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pill{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--cyan);border:1px solid var(--cyan);padding:5px 12px;letter-spacing:2px;text-transform:uppercase}
.back-link{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--dim);border:1px solid var(--border);padding:5px 10px;letter-spacing:1px;cursor:pointer;transition:all .3s;text-decoration:none}
.back-link:hover{border-color:var(--cyan);color:var(--cyan)}

.card{background:var(--surface);border:1px solid var(--border);padding:24px 20px;margin-bottom:16px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.3}

h1{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;letter-spacing:2px;line-height:1.2;margin:8px 0 12px}
h2{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;margin:16px 0 10px;color:var(--text);text-transform:uppercase}
h3{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;margin:12px 0 8px;color:var(--dim);text-transform:uppercase}
p{color:var(--dim);line-height:1.6;margin-bottom:8px;font-size:12px}
.small{font-size:10px;color:var(--dim);letter-spacing:1px}

.hr{height:1px;background:var(--border);margin:16px 0}

textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:13px;padding:12px;outline:none;resize:vertical;min-height:80px;transition:border-color .3s}
textarea:focus{border-color:var(--cyan);box-shadow:var(--glow-cyan)}

button,.btn{display:inline-block;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;padding:12px 20px;cursor:pointer;text-align:center;width:100%;margin-top:8px;text-transform:uppercase;transition:all .3s}
button:hover,.btn:hover{background:var(--cyan);color:var(--bg)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--dim);font-size:11px;padding:10px 16px;letter-spacing:1px}
.btn-outline:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-sm{padding:8px 14px;font-size:10px;width:auto;margin:4px;letter-spacing:1px}

.progress-bar{height:3px;background:var(--border);margin-bottom:14px}
.progress-fill{height:3px;background:var(--cyan);transition:width .4s}

.tag{display:inline-block;font-family:'Orbitron',sans-serif;font-size:8px;border:1px solid var(--border);padding:3px 8px;color:var(--dim);margin:2px 4px 2px 0;letter-spacing:1px;text-transform:uppercase}
.tag-gold{border-color:rgba(201,168,76,.4);color:var(--gold)}
.tag-blue{border-color:rgba(0,240,255,.3);color:var(--cyan)}
.tag-green{border-color:rgba(45,255,168,.3);color:var(--green)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.kpi{border:1px solid var(--border);padding:14px;background:var(--surface2);text-align:center}
.kpi b{display:block;font-family:'Orbitron',sans-serif;font-size:22px;margin-top:4px;color:var(--cyan)}

.score-ring{width:100px;height:100px;margin:0 auto 10px}
.score-ring svg{width:100%;height:100%}

.book-ref{font-size:10px;color:var(--cyan);margin-top:4px;opacity:.8}
.analysis-box{background:rgba(0,240,255,.04);border:1px solid rgba(0,240,255,.2);padding:16px;margin:10px 0}
.action-box{background:rgba(255,45,142,.04);border:1px solid rgba(255,45,142,.2);padding:16px;margin:10px 0}
.plan-item{padding:10px 0;border-bottom:1px solid var(--border)}
.plan-item:last-child{border-bottom:none}
.plan-time{font-family:'Orbitron',sans-serif;color:var(--cyan);font-weight:700;font-size:12px;min-width:55px;display:inline-block}

.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(3,3,8,.95);border-top:1px solid var(--border);padding:8px 0;backdrop-filter:blur(10px);z-index:99}
.nav-inner{max-width:720px;margin:0 auto;display:flex;overflow-x:auto;padding:0 10px;gap:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}.nav-inner::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;color:var(--dim);font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;width:auto;margin:0;transition:color .3s}
.nav-btn.active{color:var(--cyan)}
.nav-btn:hover{color:var(--cyan)}
.nav-btn svg{width:20px;height:20px}

.fade-in{animation:fadeIn .3s ease-in}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.streak-flame{font-size:24px;display:inline}
.hidden{display:none}

.history-entry{padding:12px 0;border-bottom:1px solid var(--border)}
.history-date{font-family:'Orbitron',sans-serif;font-weight:700;color:var(--cyan);font-size:11px;letter-spacing:1px}
.history-score{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700}

input[type=range]{width:100%;padding:0;height:4px;accent-color:var(--cyan);margin:8px 0;background:var(--border)}
.slider-val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;color:var(--cyan)}

.habit-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.habit-item:last-child{border-bottom:none}
.habit-check{width:24px;height:24px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.habit-check.done{background:var(--green);border-color:var(--green);box-shadow:var(--glow-green)}
.habit-check.done::after{content:"✓";color:var(--bg);font-weight:700;font-size:14px}
.habit-text{flex:1}
.habit-text .ht{font-size:12px;color:var(--text);font-weight:700}
.habit-text .hb{font-size:10px;color:var(--dim);margin-top:2px}
.habit-streak{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--cyan);text-align:right;min-width:40px}

.mood-slider-wrap{text-align:center;padding:10px 0}
.mood-emoji{font-size:36px;display:block;margin-bottom:6px;transition:all .2s}
.mood-label{font-size:12px;color:var(--dim)}

.quote-box{background:var(--surface2);border:1px solid var(--border);padding:20px;text-align:center;margin-bottom:16px;position:relative}
.quote-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pink),transparent);opacity:.5}
.quote-text{font-size:13px;color:var(--text);font-style:italic;line-height:1.6;margin-bottom:8px}
.quote-source{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--pink);letter-spacing:1px}

.export-btn{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;padding:8px 14px;cursor:pointer;width:auto;margin:4px;transition:all .3s}
.export-btn:hover{border-color:var(--cyan);color:var(--cyan)}

.weekly-card{background:var(--surface);border:1px solid rgba(0,240,255,.2);padding:24px 20px;margin-bottom:16px;position:relative}
.weekly-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.category-badge{display:inline-block;padding:4px 10px;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;margin:2px}
.cat-mind{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.cat-body{background:rgba(45,255,168,.1);color:var(--green);border:1px solid rgba(45,255,168,.3)}
.cat-social{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.cat-finance{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.3)}
.cat-purpose{background:rgba(0,240,255,.1);color:var(--cyan);border:1px solid rgba(0,240,255,.3)}

/* AI COACH CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:400px}
.chat-messages{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:8px}
.chat-bubble{max-width:85%;padding:12px 16px;font-size:12px;line-height:1.6;animation:fadeIn .2s ease}
.chat-bubble.user{align-self:flex-end;background:linear-gradient(135deg,rgba(0,240,255,.15),rgba(0,240,255,.05));border:1px solid rgba(0,240,255,.3);color:var(--text)}
.chat-bubble.ai{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.chat-bubble.ai .coach-name{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--pink);font-weight:700;letter-spacing:2px;margin-bottom:6px}
.chat-input-wrap{display:flex;gap:8px;padding:10px 0}
.chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:13px;padding:12px;outline:none;resize:none;min-height:44px;max-height:120px;transition:border-color .3s}
.chat-input:focus{border-color:var(--cyan);box-shadow:var(--glow-cyan)}
.chat-send{width:44px;height:44px;background:transparent;border:1px solid var(--cyan);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s}
.chat-send:hover{background:var(--cyan)}
.chat-send svg{width:20px;height:20px;stroke:var(--cyan);fill:none}
.chat-send:hover svg{stroke:var(--bg)}
.typing-dots{display:flex;gap:4px;padding:8px 0}
.typing-dots span{width:6px;height:6px;background:var(--dim);border-radius:50%;animation:typing .8s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes typing{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* CHALLENGES */
.challenge-card{background:var(--surface2);border:1px solid var(--border);padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.challenge-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
.challenge-card.active{border-color:var(--gold);box-shadow:var(--glow-gold)}
.challenge-card.completed{opacity:.7;border-color:var(--green)}
.challenge-timer{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--gold);font-weight:700;letter-spacing:1px}
.challenge-reward{display:inline-block;font-family:'Orbitron',sans-serif;font-size:9px;background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.3);padding:3px 8px;margin-top:6px;letter-spacing:1px}

/* BADGES */
.badge{display:inline-flex;flex-direction:column;align-items:center;gap:4px;padding:12px;border:1px solid var(--border);background:var(--surface2);text-align:center;min-width:80px}
.badge.earned{border-color:var(--cyan);background:rgba(0,240,255,.05);box-shadow:var(--glow-cyan)}
.badge.locked{opacity:.3;filter:grayscale(1)}
.badge-icon{font-size:28px}
.badge-name{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;color:var(--text);letter-spacing:1px}
.badge-desc{font-size:8px;color:var(--dim)}

/* PWA INSTALL */
.install-banner{background:var(--surface);border:1px solid rgba(0,240,255,.2);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .3s}
.install-banner:hover{border-color:var(--cyan);box-shadow:var(--glow-cyan)}
.install-banner .ib-icon{font-size:28px}
.install-banner .ib-text{flex:1}
.install-banner .ib-text b{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--text);display:block;letter-spacing:1px}
.install-banner .ib-text span{font-size:10px;color:var(--dim)}
.install-banner .ib-close{color:var(--dim);font-size:18px;cursor:pointer;padding:4px}

/* BIOMETRIC DASHBOARD */
.bio-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bio-card{background:var(--surface2);border:1px solid var(--border);padding:14px;text-align:center;position:relative;overflow:hidden}
.bio-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.2}
.bio-value{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:700;margin:6px 0}
.bio-label{font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.bio-trend{font-size:10px;font-family:'Orbitron',sans-serif}
.bio-trend.up{color:var(--green)}.bio-trend.down{color:var(--red)}.bio-trend.flat{color:var(--dim)}
.bio-pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* SPEED CHECK-IN */
.speed-track{position:relative;overflow:hidden;touch-action:pan-y}
.speed-card{background:var(--surface);border:1px solid var(--border);padding:30px 20px;text-align:center;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .3s ease,opacity .3s ease}
.speed-slider{width:100%;height:60px;position:relative;margin:20px 0}
.speed-val{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.speed-label{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:8px}
.speed-progress{display:flex;gap:4px;margin-bottom:16px}
.speed-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s}
.speed-dot.active{background:var(--cyan);box-shadow:var(--glow-cyan)}
.speed-dot.done{background:var(--green)}

/* VOICE INPUT */
.voice-btn{width:60px;height:60px;border-radius:50%;border:2px solid var(--pink);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;margin:0 auto}
.voice-btn.recording{background:rgba(255,45,142,.2);border-color:var(--pink);box-shadow:var(--glow-pink);animation:voicePulse 1s ease-in-out infinite}
.voice-btn svg{width:24px;height:24px;stroke:var(--pink);fill:none}
@keyframes voicePulse{0%,100%{box-shadow:0 0 10px rgba(255,45,142,.3)}50%{box-shadow:0 0 30px rgba(255,45,142,.5)}}
.voice-transcript{background:var(--surface2);border:1px solid var(--border);padding:10px;font-size:12px;color:var(--text);min-height:40px;margin-top:10px;font-style:italic}

/* PREDICTION ALERTS */
.predict-alert{background:linear-gradient(135deg,rgba(0,240,255,.05),rgba(168,85,247,.05));border:1px solid rgba(168,85,247,.3);padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.predict-alert::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple),transparent)}
.predict-icon{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--purple);letter-spacing:2px;margin-bottom:6px}
.predict-text{font-size:12px;color:var(--text);line-height:1.6}

/* FEEDBACK LOOP */
.feedback-quick{display:flex;gap:8px;justify-content:center;margin:12px 0}
.feedback-btn{width:50px;height:50px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.feedback-btn:hover{transform:scale(1.1)}
.feedback-btn.selected{border-color:var(--cyan);box-shadow:var(--glow-cyan);background:rgba(0,240,255,.1)}

/* BENCHMARK NETWORK */
.benchmark-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative;margin:4px 0}
.benchmark-fill{height:100%;border-radius:4px;transition:width 1s ease}
.benchmark-marker{position:absolute;top:-2px;width:3px;height:12px;background:var(--pink);border-radius:1px;transition:left 1s ease}

/* OPEN PROTOCOL */
.api-code{background:var(--surface2);border:1px solid var(--border);padding:12px;font-family:'Space Mono',monospace;font-size:10px;color:var(--cyan);overflow-x:auto;white-space:pre;margin:8px 0}

/* COMMAND PALETTE */
.cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:20000;display:flex;align-items:flex-start;justify-content:center;padding:80px 20px 20px;backdrop-filter:blur(8px);animation:fadeIn .15s ease}
.cmd-box{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--cyan);box-shadow:0 0 40px rgba(0,240,255,.2);overflow:hidden}
.cmd-input{width:100%;background:var(--bg);border:none;border-bottom:1px solid var(--border);color:var(--cyan);font-family:'Space Mono',monospace;font-size:14px;padding:16px 20px;outline:none}
.cmd-input::placeholder{color:var(--dim)}
.cmd-list{max-height:400px;overflow-y:auto}
.cmd-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(26,26,46,.5)}
.cmd-item:hover,.cmd-item.active{background:rgba(0,240,255,.08)}
.cmd-item .cmd-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.cmd-item .cmd-label{font-size:12px;color:var(--text);flex:1}
.cmd-item .cmd-shortcut{font-size:10px;color:var(--dim);font-family:'Space Mono',monospace;background:var(--surface2);padding:2px 6px;border:1px solid var(--border)}
.cmd-item .cmd-desc{font-size:10px;color:var(--dim)}

/* GAMIFICATION */
.xp-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;position:relative}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink));border-radius:3px;transition:width .5s ease}
.level-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid var(--cyan);background:rgba(0,240,255,.05);font-family:'Orbitron',sans-serif;font-size:10px;color:var(--cyan);letter-spacing:1px}
.achievement{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface2);border:1px solid var(--border);margin-bottom:8px;transition:all .3s}
.achievement.unlocked{border-color:var(--gold);background:rgba(201,168,76,.05)}
.achievement.locked{opacity:.4;filter:grayscale(.8)}
.achievement-icon{font-size:28px;width:40px;text-align:center;flex-shrink:0}
.xp-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20001;font-family:'Orbitron',sans-serif;font-size:24px;color:var(--gold);text-shadow:var(--glow-gold);animation:xpPop .8s ease forwards;pointer-events:none}
@keyframes xpPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}60%{transform:translate(-50%,-60%) scale(1)}100%{opacity:0;transform:translate(-50%,-80%) scale(.8)}}
.level-up-overlay{position:fixed;inset:0;z-index:20002;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}

/* CRT / GLITCH EFFECTS */
.crt-on body{text-shadow:0 0 2px rgba(0,240,255,.3)}
.crt-scanlines::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);pointer-events:none;z-index:9998}
.glitch-text{position:relative}
.glitch-text::before,.glitch-text::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%}
.glitch-text::before{left:2px;text-shadow:-2px 0 var(--pink);clip-path:inset(0 0 50% 0);animation:glitch1 2s infinite linear alternate-reverse}
.glitch-text::after{left:-2px;text-shadow:2px 0 var(--cyan);clip-path:inset(50% 0 0 0);animation:glitch2 2s infinite linear alternate-reverse}
@keyframes glitch1{0%{clip-path:inset(0 0 80% 0)}20%{clip-path:inset(20% 0 60% 0)}40%{clip-path:inset(40% 0 30% 0)}60%{clip-path:inset(60% 0 10% 0)}80%{clip-path:inset(80% 0 0% 0)}100%{clip-path:inset(10% 0 70% 0)}}
@keyframes glitch2{0%{clip-path:inset(80% 0 0% 0)}20%{clip-path:inset(60% 0 20% 0)}40%{clip-path:inset(30% 0 40% 0)}60%{clip-path:inset(10% 0 60% 0)}80%{clip-path:inset(0% 0 80% 0)}100%{clip-path:inset(70% 0 10% 0)}}

/* MATRIX RAIN */
#matrix-canvas{position:fixed;inset:0;z-index:19999;pointer-events:none;opacity:0;transition:opacity .5s}
#matrix-canvas.active{opacity:.15}

/* TERMINAL MODE */
.terminal-mode .card{border-radius:0;border-color:var(--green)}
.terminal-mode .card::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.terminal-mode{--cyan:var(--green);--pink:var(--green);--accent:var(--green)}
.terminal-mode .brand{background:var(--green);-webkit-background-clip:text}
.terminal-mode .nav-btn.active{color:var(--green)}
.terminal-prompt{font-family:'Space Mono',monospace;color:var(--green);font-size:12px}
.terminal-prompt::before{content:'> ';color:var(--green);opacity:.6}
.terminal-cursor{display:inline-block;width:8px;height:14px;background:var(--green);animation:blink 1s step-end infinite;vertical-align:middle}
@keyframes blink{50%{opacity:0}}

/* POWER SCORE */
.power-ring{position:relative;width:160px;height:160px;margin:0 auto}
.power-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.power-number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-weight:900;font-size:42px;text-align:center}
.power-label{font-size:10px;color:var(--dim);display:block;letter-spacing:2px}

/* MULTIPLAYER */
.battle-card{background:var(--surface2);border:1px solid var(--border);padding:16px;margin-bottom:10px;position:relative;overflow:hidden}

// =========================================================
// DATA LAYER — localStorage
// =========================================================
const STORAGE_KEY = "coaching_engine_data";

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { entries: [], streakStartDate: null };
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function todayStr() {
  return new Date().toISOString().split("T")[0];
}

function getTodayEntry() {
  const data = loadData();
  return data.entries.find(e => e.date === todayStr());
}

function getStreak() {
  const data = loadData();
  const entries = data.entries.sort((a,b) => b.date.localeCompare(a.date));
  if (!entries.length) return 0;
  let streak = 0;
  let checkDate = new Date();
  // Allow today or yesterday as start
  const todayE = entries.find(e => e.date === todayStr());
  if (!todayE) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yStr = yesterday.toISOString().split("T")[0];
    if (!entries.find(e => e.date === yStr)) return 0;
    checkDate = yesterday;
  }
  for (let i = 0; i < 365; i++) {
    const dStr = checkDate.toISOString().split("T")[0];
    if (entries.find(e => e.date === dStr && e.completed)) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

// QUESTION SELECTION — taegliche Rotation ueber alle Buecher
// =========================================================
function getDailyQuestions() {
  // Seed basierend auf Datum fuer konsistente taegliche Fragen
  const today = todayStr();
  let seed = 0;
  for (let i = 0; i < today.length; i++) seed += today.charCodeAt(i) * (i+1);

  // 10 Fragen aus verschiedenen Buechern
  const questions = [];
  const usedBooks = new Set();

  // Erst 10 verschiedene Buecher waehlen, dann je 1 Frage
  const bookOrder = [...BOOKS].sort((a,b) => {
    const ha = (seed * 31 + a.id.charCodeAt(0)) % 1000;
    const hb = (seed * 31 + b.id.charCodeAt(0)) % 1000;
    return ha - hb;
  });

  for (let i = 0; i < 10 && i < bookOrder.length; i++) {
    const book = bookOrder[i];
    const qIdx = (seed + i * 7) % book.questions.length;
    questions.push({
      bookId: book.id,
      bookTitle: book.title,
      bookAuthor: book.author,
      bookColor: book.color,
      question: book.questions[qIdx],
      principle: book.principles[qIdx % book.principles.length],
      action: book.actions[(seed + i) % book.actions.length]
    });
  }
  return questions;
}

// =========================================================
// ANALYSIS ENGINE
// =========================================================
function analyzeAnswers(questions, answers) {
  const analysis = {
    totalScore: 0,
    categories: {},
    strengths: [],
    weaknesses: [],
    bookScores: {},
    dailyPlan: [],
    insights: []
  };

  // Keyword-basierte Analyse
  const positiveWords = ["ja","gut","gemacht","getan","geschafft","stolz","besser","gewaehlt","bewusst","klar","ehrlich","stark","diszipliniert","fokussiert","trainiert","gelernt","gewachsen","ueberwunden","konfrontiert","praesent","entschlossen","verantwortung","gelesen","gearbeitet","aufgestanden"];
  const negativeWords = ["nein","nicht","leider","versagt","vermieden","angst","faul","aufgeschoben","abgelenkt","weich","zoegernd","unsicher","excuse","ausrede","prokrastiniert","ignoriert","geschwanzt","vergessen","verschwendet","komfortzone"];
  const neutralWords = ["vielleicht","manchmal","teilweise","versucht","bisschen","wenig","etwas"];

  questions.forEach((q, i) => {
    const answer = (answers[i] || "").toLowerCase().trim();
    if (!answer) return;

    const words = answer.split(/\s+/);
    let posCount = 0, negCount = 0, neutCount = 0;

    words.forEach(w => {
      if (positiveWords.some(p => w.includes(p))) posCount++;
      if (negativeWords.some(n => w.includes(n))) negCount++;
      if (neutralWords.some(n => w.includes(n))) neutCount++;
    });

    // Laenge der Antwort als Engagement-Indikator
    const lengthScore = Math.min(words.length / 15, 1);

    // Score pro Frage: 0-100
    let qScore;
    if (posCount > negCount) qScore = 60 + Math.min(posCount * 10, 40);
    else if (negCount > posCount) qScore = 20 + Math.max(40 - negCount * 10, 0);
    else qScore = 45 + (lengthScore * 20);

    // Engagement Bonus fuer ausfuehrliche Antworten
    qScore = Math.round(Math.min(100, qScore + lengthScore * 10));

    const bookId = q.bookId;
    if (!analysis.bookScores[bookId]) {
      analysis.bookScores[bookId] = { scores: [], book: q };
    }
    analysis.bookScores[bookId].scores.push(qScore);
    analysis.totalScore += qScore;

    // Staerken/Schwaechen identifizieren
    if (qScore >= 70) {
      analysis.strengths.push({ question: q, score: qScore, answer: answers[i] });
    } else if (qScore < 45) {
      analysis.weaknesses.push({ question: q, score: qScore, answer: answers[i], action: q.action });
    }
  });

  const answeredCount = answers.filter(a => a && a.trim()).length;
  analysis.totalScore = answeredCount > 0 ? Math.round(analysis.totalScore / answeredCount) : 0;

  // Category scores berechnen
  analysis.categoryScores = {};
  Object.keys(analysis.bookScores).forEach(bid => {
    const cat = BOOK_CATEGORIES[bid] || "mind";
    if (!analysis.categoryScores[cat]) analysis.categoryScores[cat] = [];
    analysis.categoryScores[cat].push(...analysis.bookScores[bid].scores);
  });

  // Mood-Integration
  const data = loadData();
  const todayMood = data.moodLog ? data.moodLog.find(m => m.date === todayStr()) : null;
  if (todayMood) {
    analysis.mood = todayMood;
    // Mood beeinflusst Gesamtscore leicht (max +/- 10 Punkte)
    const moodBonus = Math.round((todayMood.mood - 5) * 2);
    analysis.totalScore = Math.max(0, Math.min(100, analysis.totalScore + moodBonus));
  }

  // Insights generieren
  if (analysis.weaknesses.length >= 3) {
    analysis.insights.push("Du hast heute mehrere Schwachstellen identifiziert. Das ist GUT — Bewusstsein ist der erste Schritt.");
  }
  if (analysis.strengths.length >= 5) {
    analysis.insights.push("Starker Tag. Du bist auf einem guten Weg. Bleib dran und erhoehe die Intensitaet.");
  }
  if (answeredCount < 7) {
    analysis.insights.push("Du hast nicht alle Fragen beantwortet. Vollstaendige Selbstreflexion braucht Disziplin.");
  }
  if (todayMood && todayMood.energy <= 3) {
    analysis.insights.push("Dein Energielevel ist niedrig. Priorisiere heute Erholung und Koerper-Reset.");
  }
  if (todayMood && todayMood.mood >= 8 && analysis.totalScore < 50) {
    analysis.insights.push("Gute Stimmung, aber die Antworten zeigen Verbesserungspotenzial. Nutze die positive Energie!");
  }

  // Category-spezifische Insights
  Object.keys(analysis.categoryScores).forEach(cat => {
    const scores = analysis.categoryScores[cat];
    const catAvg = Math.round(scores.reduce((a,b) => a+b, 0) / scores.length);
    const catInfo = CATEGORY_LABELS[cat];
    if (catAvg < 40) {
      analysis.insights.push(`${catInfo.label}-Bereich schwach (${catAvg}/100). Fokussiere heute auf ${catInfo.label}-Habits.`);
    }
  });

  // Schwaechen-basierte Aktionen fuer den Tagesplan
  analysis.weaknesses.forEach(w => {
    analysis.dailyPlan.push({
      action: w.action,
      reason: `Basierend auf: "${w.question.question.substring(0,50)}..."`,
      book: w.question.bookTitle,
      priority: "high"
    });
  });

  // Allgemeine Aktionen hinzufuegen
  const timeSlots = ["06:00","07:00","08:00","10:00","12:00","14:00","16:00","18:00","20:00","22:00"];
  const generalActions = [
    {time:"06:00", action:"Aufstehen. Kein Snooze. Glas Wasser. 5 Min Stille.", book:"Tate Bibel / 12 Rules"},
    {time:"07:00", action:"Koerperliches Training — Kraft oder Ausdauer. Minimum 30 Min.", book:"Alpha Mann Bibel"},
    {time:"08:00", action:"Kalte Dusche. 2 Minuten. Atemkontrolle.", book:"Der Weg des wahren Mannes"},
    {time:"10:00", action:"Deep Work — 2h fokussierte Arbeit an deinem wichtigsten Projekt.", book:"Almanach / Trading Psychologie"},
    {time:"12:00", action:"Mittagspause: Bewusst essen. 10 Min spazieren.", book:"12 Rules for Life"},
    {time:"14:00", action:"Spezifisches Wissen aufbauen — lernen, lesen, ueben.", book:"Almanach von Naval"},
    {time:"16:00", action:"Soziale Interaktion: Ein echtes Gespraech fuehren.", book:"Models / Verhandeln"},
    {time:"18:00", action:"Reflexion: Was habe ich heute geschafft? Was morgen?", book:"Trading Psychologie"},
    {time:"20:00", action:"30 Min Lesen. Kein Screen.", book:"Almanach von Naval"},
    {time:"22:00", action:"Tagesabschluss: Coaching-Fragen beantworten. Frueh schlafen.", book:"12 Rules / Liebe dich selbst"}
  ];

  analysis.generalPlan = generalActions;
  return analysis;
}

      <p class="small" style="margin-top:10px;text-align:center">Ehrlichkeit > Perfektion</p>
    </div>
  `;
  document.getElementById("content").innerHTML = html;
  // Focus on textarea
  setTimeout(() => document.getElementById("answer-input")?.focus(), 100);
}

function prevQuestion() {
  saveCurrentAnswer();
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

function nextQuestion() {
  const input = document.getElementById("answer-input");
  const text = input ? input.value.trim() : "";

  if (text.length < 10) {
    input.style.borderColor = "#ef4444";
    input.setAttribute("placeholder", "Mindestens 10 Zeichen — sei ehrlich mit dir selbst!");
    input.focus();
    return;
  }

  saveCurrentAnswer();

  if (currentQuestion < 9) {
    currentQuestion++;
    renderQuestion();
  } else {
    finishDaily();
  }
}

function saveCurrentAnswer() {
  const input = document.getElementById("answer-input");
  if (input) dailyAnswers[currentQuestion] = input.value;

  // Zwischenspeichern
  const data = loadData();
  let entry = data.entries.find(e => e.date === todayStr());
  if (!entry) {
    entry = { date: todayStr(), completed: false, answers: [], questions: [], analysis: null };
    data.entries.push(entry);
  }
  entry.answers = [...dailyAnswers];
  saveData(data);
}

function finishDaily() {
  const analysis = analyzeAnswers(dailyQuestions, dailyAnswers);

  const data = loadData();
  let entry = data.entries.find(e => e.date === todayStr());
  if (!entry) {
    entry = { date: todayStr(), completed: false, answers: [], questions: [], analysis: null };
    data.entries.push(entry);
  }
  entry.completed = true;
  entry.answers = [...dailyAnswers];
  entry.questions = dailyQuestions.map(q => ({ bookId: q.bookId, question: q.question, bookTitle: q.bookTitle }));
  entry.analysis = analysis;
  entry.score = analysis.totalScore;
  saveData(data);

  renderTodayResult(entry);
}

function resetToday() {
  const data = loadData();

    chartHtml = `<div style="display:flex;align-items:flex-end;gap:4px;height:120px;padding:10px 0">`;
    last7.forEach(e => {
      const h = Math.max((e.score || 0) / maxScore * 100, 5);

      Object.keys(e.analysis.bookScores).forEach(bid => {

  let bookProgressHtml = "";

    const bt = bookTotals[bid];

function getLevelHtml(days) {
  const levels = [
    { name: "Anfaenger", min: 0, color: "#6b7280" },
    { name: "Erwacht", min: 7, color: "#3b82f6" },
    { name: "Diszipliniert", min: 21, color: "#8b5cf6" },
    { name: "Krieger", min: 50, color: "#f59e0b" },
    { name: "Meister", min: 100, color: "#22c55e" },
    { name: "Maschine", min: 200, color: "#ef4444" },
    { name: "Legende", min: 365, color: "#ec4899" }
  ];

  let currentLevel = levels[0];
  let nextLevel = levels[1];
  for (let i = levels.length - 1; i >= 0; i--) {
    if (days >= levels[i].min) {
      currentLevel = levels[i];
      nextLevel = levels[i+1] || null;
      break;
    }
  }

  let progressToNext = "";
  if (nextLevel) {
    const pct = Math.round((days - currentLevel.min) / (nextLevel.min - currentLevel.min) * 100);
    progressToNext = `
      <div style="margin-top:10px">
        <p class="small">Naechstes Level: <span style="color:${nextLevel.color}">${nextLevel.name}</span> (${nextLevel.min} Tage)</p>
        <div style="height:6px;background:var(--line);border-radius:3px;margin-top:6px">
          <div style="height:6px;background:${currentLevel.color};border-radius:3px;width:${pct}%"></div>
        </div>
        <p class="small" style="margin-top:4px">${days}/${nextLevel.min} Tage</p>
      </div>
    `;
  }

  return `
    <div style="text-align:center">
      <p style="font-size:28px;font-weight:700;color:${currentLevel.color}">${currentLevel.name}</p>
      <p class="small">${days} Tage aktiv</p>
      ${progressToNext}
    </div>
  `;
}

function getHabitsData() {
  const data = loadData();
  if (!data.habits) data.habits = {};
  return data;
}

function getHabitStreak(habitId) {
  const data = getHabitsData();
  let streak = 0;
  let checkDate = new Date();
  for (let i = 0; i < 365; i++) {
    const dStr = checkDate.toISOString().split("T")[0];
    if (data.habits[dStr] && data.habits[dStr].includes(habitId)) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else {
      if (i === 0) { checkDate.setDate(checkDate.getDate() - 1); continue; }
      break;
    }
  }
  return streak;
}

function toggleHabit(habitId) {
  const data = getHabitsData();
  const today = todayStr();
  if (!data.habits[today]) data.habits[today] = [];
  const idx = data.habits[today].indexOf(habitId);
  if (idx >= 0) data.habits[today].splice(idx, 1);
  else data.habits[today].push(habitId);
  saveData(data);
  renderHabits();
}

function renderHabits() {
  const data = getHabitsData();
  const today = todayStr();
  const todayHabits = data.habits[today] || [];
  const doneCount = todayHabits.length;
  const totalCount = DAILY_HABITS.length;
  const pct = Math.round(doneCount / totalCount * 100);

  // Last 7 days heatmap
  let heatmapHtml = '<div style="display:flex;gap:4px;justify-content:center;margin:12px 0">';
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dStr = d.toISOString().split("T")[0];
    const count = (data.habits[dStr] || []).length;
    const intensity = Math.min(count / totalCount, 1);
    const bg = count === 0 ? "var(--line)" : `rgba(34,197,94,${0.2 + intensity * 0.8})`;
    const dayLabel = ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
    heatmapHtml += `<div style="text-align:center;flex:1">
      <div style="width:100%;aspect-ratio:1;background:${bg};border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${count > 0 ? '#fff' : 'var(--muted)'}">${count}</div>
      <p class="small" style="margin-top:4px">${dayLabel}</p>
    </div>`;
  }
  heatmapHtml += '</div>';

  // Group habits by category
  const categories = {};
  DAILY_HABITS.forEach(h => {
    if (!categories[h.category]) categories[h.category] = [];
    categories[h.category].push(h);
  });

  let habitsListHtml = "";
  Object.keys(categories).forEach(cat => {
    const catInfo = CATEGORY_LABELS[cat];
    habitsListHtml += `<div style="margin-top:14px"><span class="category-badge ${catInfo.css}">${catInfo.label}</span></div>`;
    categories[cat].forEach(h => {
      const done = todayHabits.includes(h.id);
      const streak = getHabitStreak(h.id);
      habitsListHtml += `
        <div class="habit-item" onclick="toggleHabit('${h.id}')">
          <div class="habit-check ${done ? 'done' : ''}"></div>

            <div class="hb">${h.book}</div>
          </div>
          ${streak > 0 ? `<div class="habit-streak">${streak}d 🔥</div>` : ''}
        </div>
      `;
    });
  });

  const html = `
    <div class="card fade-in">
      <h2>Taegliche Habits</h2>

function exportData() {
  const data = loadData();
  const exportObj = {
    exportDate: new Date().toISOString(),
    version: "2.0",
    ...data
  };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `coaching-export-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!imported.entries || !Array.isArray(imported.entries)) {
          alert("Ungueltige Datei — kein gueltiger Coaching-Export.");
          return;
        }
        const current = loadData();
        // Merge: keep existing entries, add new ones by date
        const existingDates = new Set(current.entries.map(e => e.date));
        const newEntries = imported.entries.filter(e => !existingDates.has(e.date));
        current.entries.push(...newEntries);
        // Merge mood log
        if (imported.moodLog) {
          if (!current.moodLog) current.moodLog = [];
          const existingMoodDates = new Set(current.moodLog.map(m => m.date));
          imported.moodLog.filter(m => !existingMoodDates.has(m.date)).forEach(m => current.moodLog.push(m));
        }
        // Merge habits
        if (imported.habits) {
          if (!current.habits) current.habits = {};
          Object.keys(imported.habits).forEach(d => {
            if (!current.habits[d]) current.habits[d] = imported.habits[d];
          });
        }
        saveData(current);
        alert(`Import erfolgreich! ${newEntries.length} neue Eintraege hinzugefuegt.`);
        showScreen(currentScreen);
      } catch(err) {
        alert("Fehler beim Import: " + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// DEEP CONTEXT ENGINE — builds a complete user profile from ALL data
function buildDeepContext() {
  const data = loadData();
  const entries = data.entries.filter(e => e.completed).sort((a,b) => b.date.localeCompare(a.date));
  const streak = getStreak();
  const todayMood = data.moodLog ? data.moodLog.find(m => m.date === todayStr()) : null;
  const entry = getTodayEntry();
  const totalDays = entries.length;

  // Trend-Analyse: letzte 7 vs vorherige 7
  const recent7 = entries.slice(0,7);
  const prev7 = entries.slice(7,14);
  const recentAvg = recent7.length ? Math.round(recent7.reduce((s,e)=>s+(e.score||0),0)/recent7.length) : 0;
  const prevAvg = prev7.length ? Math.round(prev7.reduce((s,e)=>s+(e.score||0),0)/prev7.length) : 0;
  const trend = recentAvg - prevAvg;

  // Schwaechen-Pattern ueber Zeit: welche Buecher tauchen immer wieder als Schwaeche auf
  const weaknessFreq = {};
  entries.slice(0,30).forEach(e => {
    if (e.analysis && e.analysis.weaknesses) {
      e.analysis.weaknesses.forEach(w => {
        const bk = w.question?.bookTitle || 'unknown';
        weaknessFreq[bk] = (weaknessFreq[bk]||0) + 1;
      });
    }
  });
  const chronicWeaknesses = Object.entries(weaknessFreq).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`${k}(${v}x)`);

  // Staerken-Pattern
  const strengthFreq = {};
  entries.slice(0,30).forEach(e => {
    if (e.analysis && e.analysis.strengths) {
      e.analysis.strengths.forEach(s => {
        const bk = s.question?.bookTitle || 'unknown';
        strengthFreq[bk] = (strengthFreq[bk]||0) + 1;
      });
    }
  });
  const coreStrengths = Object.entries(strengthFreq).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`${k}(${v}x)`);

  // Mood-Pattern
  const moodLog = (data.moodLog || []).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,14);
  const avgMood = moodLog.length ? Math.round(moodLog.reduce((s,m)=>s+m.mood,0)/moodLog.length*10)/10 : 0;
  const avgEnergy = moodLog.length ? Math.round(moodLog.reduce((s,m)=>s+m.energy,0)/moodLog.length*10)/10 : 0;
  const avgFocus = moodLog.length ? Math.round(moodLog.reduce((s,m)=>s+m.focus,0)/moodLog.length*10)/10 : 0;

  // Habits-Analyse
  const habitData = data.habits || {};
  let habitTotal = 0, habitDays = 0;
  Object.values(habitData).forEach(h => { if (h.length) { habitTotal += h.length; habitDays++; } });
  const habitAvg = habitDays ? Math.round(habitTotal/habitDays*10)/10 : 0;

  // Conversation memory — extract key themes from recent chat
  const recentChat = loadChatHistory().slice(-20);
  const chatThemes = recentChat.filter(m=>m.role==='user').map(m=>m.text).join(' ').toLowerCase();

  // Letzte Antworten analysieren — wie tief reflektiert der User?
  const lastAnswers = entry ? (entry.answers||[]).filter(a=>a&&a.trim()) : [];
  const avgAnswerLen = lastAnswers.length ? Math.round(lastAnswers.reduce((s,a)=>s+a.split(/\s+/).length,0)/lastAnswers.length) : 0;

  return {
    streak, totalDays, todayMood, entry, recentAvg, prevAvg, trend,
    chronicWeaknesses, coreStrengths, avgMood, avgEnergy, avgFocus,
    habitAvg, chatThemes, avgAnswerLen, entries, moodLog
  };
}

// ADAPTIVE RESPONSE ENGINE — generates contextual, personalized responses
function generateCoachResponse(userMsg) {
  const msg = userMsg.toLowerCase();
  const ctx = buildDeepContext();

  // Multi-topic detection with confidence scoring
  const topicMap = {
    motivation: {kw:["motivation","antrieb","keine lust","aufgeben","schwer","muede","erschoepft","keinen bock","antriebslos","warum","wozu"],weight:0},
    discipline: {kw:["disziplin","prokrastin","aufschieb","abgelenkt","fokus","konzentration","social media","handy","zeit","verschwendet","ablenkung"],weight:0},
    confidence: {kw:["selbstbewusst","unsicher","angst","scheu","traue mich","mutig","verletzlich","peinlich","blamier","vergleich"],weight:0},
    relationships: {kw:["beziehung","freundin","partner","frauen","maenner","date","ansprechen","sozial","liebe","trennung","einsam","allein"],weight:0},
    finance: {kw:["geld","finanzen","einkommen","business","nebenprojekt","investier","karriere","reich","arm","schulden","passiv"],weight:0},
    fitness: {kw:["training","sport","koerper","fitness","gym","laufen","kraft","bewegung","abnehm","gewicht","muskeln","dusche"],weight:0},
    purpose: {kw:["sinn","zweck","purpose","lebensziel","was will ich","richtung","orientierung","berufung","erfuell","leer"],weight:0},
    mood: {kw:["traurig","schlecht","down","deprimiert","hoffnungslos","verzweifelt","wertlos","weinen","panik","ueberfordert"],weight:0},
    strategy: {kw:["plan","strategie","naechster schritt","wie schaffe","system","routine","struktur","optimier","effizient"],weight:0},
    growth: {kw:["wachstum","besser","veraender","fortschritt","entwickl","level","upgrade","transform"],weight:0}
  };

  // Score topics
  const detectedTopics = [];
  for (const [topic, def] of Object.entries(topicMap)) {
    def.weight = def.kw.filter(k => msg.includes(k)).length;
    if (def.weight > 0) detectedTopics.push({topic, weight: def.weight});
  }
  detectedTopics.sort((a,b) => b.weight - a.weight);
  const primary = detectedTopics[0]?.topic || null;
  const secondary = detectedTopics[1]?.topic || null;

  // STATUS HEADER — always show user's current state
  let status = `**[SYSTEM-SCAN]**\n`;
  status += `Streak: ${ctx.streak}d | Score: ${ctx.recentAvg}/100 | Trend: ${ctx.trend > 0 ? '+'+ctx.trend : ctx.trend} | `;
  status += `Mood: ${ctx.avgMood} | Energy: ${ctx.avgEnergy} | Focus: ${ctx.avgFocus}\n`;
  if (ctx.chronicWeaknesses.length) status += `Chronische Schwaechen: ${ctx.chronicWeaknesses.join(', ')}\n`;
  if (ctx.coreStrengths.length) status += `Kern-Staerken: ${ctx.coreStrengths.join(', ')}\n`;
  status += `Habits: ${ctx.habitAvg}/12 pro Tag | Reflexionstiefe: ${ctx.avgAnswerLen} Woerter/Antwort\n`;
  status += `---\n\n`;

  // ADAPTIVE PERSONALITY — changes based on streak and performance
  let tone = 'standard';
  if (ctx.streak >= 30 && ctx.recentAvg >= 70) tone = 'warrior';
  else if (ctx.streak >= 7 && ctx.recentAvg >= 50) tone = 'coach';
  else if (ctx.recentAvg < 35 || (ctx.todayMood && ctx.todayMood.mood <= 3)) tone = 'empathic';
  else if (ctx.totalDays === 0) tone = 'onboarding';

  // CROSS-REFERENCE ENGINE — find relevant book for this situation
  function pickBook(topic) {
    const bookMap = {
      motivation: ['tate','alpha','deida'], discipline: ['naval','trading','tate'],
      confidence: ['models','sexismus','loveyourself'], relationships: ['models','negotiation','deida'],
      finance: ['naval','tate','power'], fitness: ['alpha','tate','deida'],
      purpose: ['deida','naval','subtle'], mood: ['loveyourself','subtle','12rules'],
      strategy: ['power','naval','trading'], growth: ['12rules','deida','subtle']
    };
    const ids = bookMap[topic] || ['12rules','naval','subtle'];
    const book = BOOKS.find(b => b.id === ids[Date.now() % ids.length]);
    return book || BOOKS[0];
  }

  // PATTERN PREDICTION — what should user focus on next?
  function predictNextAction() {
    if (ctx.chronicWeaknesses.length === 0) return "Starte dein erstes Check-in um Muster zu erkennen.";
    const weakBook = ctx.chronicWeaknesses[0].split('(')[0];
    const book = BOOKS.find(b => b.title === weakBook);
    if (book) return book.actions[Date.now() % book.actions.length];
    return "Fokussiere heute auf dein groesstes Wachstumsfeld.";
  }

  // RESPONSE BUILDER
  let response = status;

  if (primary) {
    const book = pickBook(primary);
    const principle = book.principles[Date.now() % book.principles.length];
    const action = book.actions[Date.now() % book.actions.length];
    const question = book.questions[Date.now() % book.questions.length];

    // Tone-adapted intro
    if (tone === 'warrior') {
      response += `Du bist ${ctx.streak} Tage drin. Du weisst was zu tun ist. Hier ist der Befehl:\n\n`;
    } else if (tone === 'empathic') {
      response += `Ich sehe deine Daten. Es ist gerade schwer. Aber du bist hier — das zaehlt.\n\n`;
    } else if (tone === 'onboarding') {
      response += `Willkommen. Lass uns dein System aufbauen.\n\n`;
    } else {
      response += `**Analyse laeuft...**\n\n`;
    }

    // Primary topic response
    response += `**[${book.title.toUpperCase()} — ${book.author}]**\n`;
    response += `*"${principle}"*\n\n`;

    // Context-aware advice
    if (ctx.trend < -5) {
      response += `Dein Score faellt seit ${Math.abs(ctx.trend)} Punkten. Das ist ein Signal, kein Urteil. `;
      response += `Dein System braucht einen Reset.\n\n`;
    } else if (ctx.trend > 5) {
      response += `+${ctx.trend} Punkte Trend. Momentum ist da. Jetzt nicht nachlassen.\n\n`;
    }

    // Specific action
    response += `**AKTION:** ${action}\n\n`;

    // Cross-reference with second topic
    if (secondary) {
      const book2 = pickBook(secondary);
      response += `**[CROSS-REF: ${book2.title}]** ${book2.principles[0]}\n\n`;
    }

    // Socratic follow-up
    response += `**REFLEXION:** ${question}`;

    // Habit integration
    if (ctx.habitAvg < 6) {
      response += `\n\n*[SYSTEM: Deine Habit-Rate ist ${ctx.habitAvg}/12. Das ist unter 50%. Heute Abend: Habits-Tab oeffnen und abhaken.]*`;
    }

  } else {
    // No topic detected — proactive coaching based on data
    response += `**[PROAKTIVE ANALYSE]**\n\n`;

function escapeHtml(text) { const d = document.createElement("div"); d.textContent = text; return d.innerHTML; }

function formatCoachMsg(text) {
  return text
    .replace(/\*\*\[(.+?)\]\*\*/g, '<div style="font-family:Orbitron,sans-serif;font-size:9px;color:var(--cyan);letter-spacing:2px;margin:8px 0 4px">$1</div>')
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/\*\[(.+?)\]\*/g, '<div style="font-size:10px;color:var(--pink);margin-top:8px;padding:6px;border:1px solid rgba(255,45,142,.2);background:rgba(255,45,142,.04)">$1</div>')
    .replace(/\*"(.+?)"\*/g, '<i style="color:var(--gold)">"$1"</i>')
    .replace(/\*(.+?)\*/g, '<i>$1</i>')
    .replace(/\n/g, '<br>');
}

function sendQuickTopic(topic) { document.getElementById("chat-input").value = topic; sendChat(); }

function sendChat() {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text) return;

  chatMessages.push({ role: "user", text, ts: Date.now() });
  input.value = "";

  const messagesDiv = document.getElementById("chat-messages");
  messagesDiv.innerHTML += `<div class="chat-bubble user fade-in">${escapeHtml(text)}</div>`;
  messagesDiv.innerHTML += `<div id="typing-indicator" class="chat-bubble ai fade-in"><div style="font-family:Orbitron,sans-serif;font-size:9px;color:var(--cyan);letter-spacing:2px;margin-bottom:6px">ANALYSIERE DATEN...</div><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  scrollChatBottom();

  // Processing delay scales with data depth
  const delay = 600 + Math.random() * 800;
  setTimeout(() => {
    const response = generateCoachResponse(text);
    chatMessages.push({ role: "ai", text: response, ts: Date.now() });
    saveChatHistory(chatMessages);
    const typingEl = document.getElementById("typing-indicator");
    if (typingEl) typingEl.remove();
    messagesDiv.innerHTML += `<div class="chat-bubble ai fade-in"><div class="coach-name">NEURAL COACH</div>${formatCoachMsg(response)}</div>`;
    scrollChatBottom();
  }, delay);
}

function scrollChatBottom() {
  setTimeout(() => { const el = document.getElementById("chat-messages"); if (el) el.scrollTop = el.scrollHeight; }, 50);
}

function getChallengeProgress(challenge) {
  const data = getHabitsData();
  let count = 0;
  for (let i = 0; i < challenge.target; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dStr = d.toISOString().split("T")[0];
    const dayHabits = data.habits[dStr] || [];
    if (challenge.habitId === "_all") {
      if (dayHabits.length >= DAILY_HABITS.length) count++;
    } else {
      if (dayHabits.includes(challenge.habitId)) count++;
    }
  }
  return count;
}

function getActiveChallenges() {
  const data = loadData();
  if (!data.activeChallenges) {
    // Auto-assign 3 random challenges
    const shuffled = [...WEEKLY_CHALLENGES].sort(() => Math.random() - 0.5);
    data.activeChallenges = shuffled.slice(0, 3).map(c => ({
      id: c.id,
      startDate: todayStr(),
      completed: false
    }));
    saveData(data);
  }
  return data.activeChallenges;
}

function renderChallengesSection() {
  const active = getActiveChallenges();
  let html = `<div class="card fade-in"><h2>Aktive Challenges</h2><p class="small">Woechentlich wechselnde Herausforderungen</p><div class="hr"></div>`;

  active.forEach(ac => {
    const ch = WEEKLY_CHALLENGES.find(c => c.id === ac.id);
    if (!ch) return;
    const progress = getChallengeProgress(ch);
    const pct = Math.round(progress / ch.target * 100);
    const isComplete = progress >= ch.target;

    if (isComplete && !ac.completed) {
      ac.completed = true;
      const data = loadData();
      if (!data.completedChallenges) data.completedChallenges = [];
      if (!data.completedChallenges.includes(ch.id)) {
        data.completedChallenges.push(ch.id);
        data.totalPoints = (data.totalPoints || 0) + ch.points;
      }
      data.activeChallenges = active;
      saveData(data);
    }

    html += `
      <div class="challenge-card ${isComplete ? 'completed' : 'active'}">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:28px">${ch.icon}</span>

function refreshChallenges() {

const NERVE_API = '/.netlify/functions/nerve-brain';

async function nerveApi(action, params={}) {
  const res = await fetch(NERVE_API, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action, ...params})
  });
  if (!res.ok) throw new Error((await res.json()).error || 'API Fehler');
  return res.json();
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(d) {
  if (!d) return '';
  const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
  if (s < 60) return 'gerade eben';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  return Math.floor(s/86400) + 'd';
}

// DOMAIN CLASSIFIER — detect what type of situation this is
function classifySituation(text) {

    mental: {kw:["angst","depression","stress","motivation","selbstwert","zweifel","gedanken","gefuehl","emotion","panik","burnout","ueberfordert","sinn","purpose","identitaet","entscheidung","blockade","prokrastin"],score:0,icon:"◈",color:"var(--purple)"},
    finance: {kw:["geld","finanzen","schulden","sparen","investition","portfolio","krypto","aktien","einkommen","passiv","budget","steuer","vermoegen","cashflow","immobilie","rendite"],score:0,icon:"▲",color:"var(--cyan)"},
    creative: {kw:["idee","kreativ","projekt","kunst","musik","schreib","design","innovation","content","brand","social media","video","buch","app","plattform","konzept"],score:0,icon:"✦",color:"#ff6b9d"},
    legal: {kw:["recht","gesetz","vertrag","anwalt","klage","haftung","versicherung","patent","lizenz","datenschutz","gdpr","compliance","regulierung"],score:0,icon:"§",color:"var(--dim)"},
    technical: {kw:["code","software","api","server","datenbank","system","architektur","performance","bug","deploy","cloud","infrastruktur","automatisier","ki","algorithm"],score:0,icon:"⟁",color:"var(--cyan)"}
  };
  for (const [key, d] of Object.entries(domains)) {
    d.score = d.kw.filter(k => t.includes(k)).length;
  }
  const sorted = Object.entries(domains).sort((a,b) => b[1].score - a[1].score);
  const primary = sorted[0][1].score > 0 ? {key: sorted[0][0], ...sorted[0][1]} : {key:'general',icon:'◉',color:'var(--cyan)',score:0};
  const secondary = sorted[1][1].score > 0 ? {key: sorted[1][0], ...sorted[1][1]} : null;
  return {primary, secondary, allScores: sorted};
}

// ENTITY EXTRACTOR — pull out key entities from text
function extractEntities(text) {
  const entities = {people:[], numbers:[], timeframes:[], locations:[], actions:[]};
  // Numbers with context
  const numMatches = text.match(/\d+[\.,]?\d*\s*(%|euro|eur|€|\$|kg|km|std|stunden|tage|wochen|monate|jahre|mal|punkte|prozent)/gi) || [];
  entities.numbers = numMatches.slice(0,8);
  // Timeframes
  const timeMatches = text.match(/(seit|vor|in|ab|bis)\s+\d+\s*(tagen?|wochen?|monaten?|jahren?|stunden?|minuten?)/gi) || [];
  entities.timeframes = timeMatches.slice(0,5);
  // Action verbs (German imperatives / infinitives suggesting next steps)
  const actionWords = text.match(/\b(muss|soll|will|kann|brauche|plane|moechte|versuche|starte|beende|aendere|verbessere|optimiere|reduziere|steigere|entwickle)\b/gi) || [];
  entities.actions = [...new Set(actionWords)].slice(0,6);
  return entities;
}

// SENTIMENT ANALYZER — detect emotional valence of text
function analyzeSentiment(text) {
  const t = text.toLowerCase();
  const pos = ["gut","super","toll","perfekt","gluecklich","erfolgreich","stark","positiv","besser","wachstum","chance","moeglich","hoffnung","fortschritt","gewinn","vorteil","freude","energie","motivation","gewonnen","geschafft"];
  const neg = ["schlecht","problem","schwierig","krise","verlust","angst","stress","schmerz","risiko","gefahr","fehler","scheitern","versagen","blockade","hindernis","nachteil","sorge","zweifel","schulden","verloren","kaputt"];
  const urgent = ["sofort","dringend","jetzt","schnell","akut","notfall","deadline","morgen","heute","kritisch"];
  const posScore = pos.filter(w => t.includes(w)).length;
  const negScore = neg.filter(w => t.includes(w)).length;
  const urgScore = urgent.filter(w => t.includes(w)).length;
  const total = posScore + negScore || 1;
  const valence = Math.round((posScore - negScore) / total * 100);
  return {
    valence, // -100 (very negative) to +100 (very positive)
    urgency: urgScore > 2 ? 'critical' : urgScore > 0 ? 'elevated' : 'normal',
    posScore, negScore, urgScore,
    label: valence > 30 ? 'POSITIV' : valence < -30 ? 'KRITISCH' : 'NEUTRAL'
  };
}

// COMPLEXITY SCORER — how complex is this situation?
function scoreComplexity(text, entities, domains) {
  let score = 0;
  const words = text.split(/\s+/).length;
  if (words > 300) score += 3; else if (words > 100) score += 2; else score += 1;
  score += Math.min(entities.numbers.length, 3);
  score += entities.timeframes.length > 0 ? 1 : 0;
  const activeDomains = domains.allScores.filter(([,d]) => d.score > 0).length;
  score += Math.min(activeDomains, 3);
  if (text.includes('?')) score += 1;
  return Math.min(score, 10);
}

// PREDICTION ENGINE — project possible outcomes
function predictOutcomes(domains, sentiment, complexity, userCrossRef) {
  const scenarios = [];
  const hasStrength = userCrossRef.refs.some(r => r.severity === 'positive');
  const hasWarning = userCrossRef.refs.some(r => r.severity === 'critical');
  const streakBonus = userCrossRef.ctx.streak >= 7 ? 15 : 0;
  const moodPenalty = userCrossRef.ctx.avgMood < 4 ? -10 : 0;

  // Best case
  let bestProb = 60 + streakBonus + (sentiment.valence > 0 ? 10 : 0) - (complexity > 7 ? 15 : 0);
  bestProb = Math.max(20, Math.min(90, bestProb));
  scenarios.push({
    label: "BEST CASE",
    probability: bestProb,
    description: "Konsequente Umsetzung mit System fuehrt zu messbaren Ergebnissen",
    color: "var(--green)",
    requirements: "Taegliche Ausfuehrung + Tracking + Anpassung"
  });

  // Most likely
  let likelyProb = 45 + Math.floor(streakBonus/2) + moodPenalty;
  likelyProb = Math.max(25, Math.min(75, likelyProb));
  scenarios.push({
    label: "WAHRSCHEINLICH",
    probability: likelyProb,
    description: "Teilweise Umsetzung mit gemischten Ergebnissen — Fortschritt aber langsamer als geplant",
    color: "var(--gold)",
    requirements: "Regelmaessige Check-ins + Kurskorrektur bei Abweichung"
  });

  // Worst case
  let worstProb = 20 + (hasWarning ? 15 : 0) + (complexity > 7 ? 10 : 0) - streakBonus;
  worstProb = Math.max(5, Math.min(50, worstProb));
  scenarios.push({
    label: "WORST CASE",
    probability: worstProb,
    description: "Keine Umsetzung — Situation verschlechtert sich oder stagniert",
    color: "var(--red,#ff4444)",
    requirements: "Vermeidbar durch: Sofort-Protokoll starten + Accountability"
  });

  return scenarios;
}

// SYNTHESIS — final intelligence report
function generateSynthesis(text, domains, sentiment, complexity, entities, crossRef, paths, predictions) {
  let synthesis = "";
  const ctx = crossRef.ctx;

  // Executive summary
  synthesis += `SITUATIONSTYP: ${domains.primary.key.toUpperCase()}`;
  if (domains.secondary) synthesis += ` + ${domains.secondary.key.toUpperCase()}`;
  synthesis += ` | KOMPLEXITAET: ${complexity}/10 | SENTIMENT: ${sentiment.label} (${sentiment.valence > 0 ? '+' : ''}${sentiment.valence})\n`;
  synthesis += `DRINGLICHKEIT: ${sentiment.urgency === 'critical' ? 'KRITISCH' : sentiment.urgency === 'elevated' ? 'ERHOEHT' : 'NORMAL'}\n\n`;

  // Core insight
  synthesis += `KERN-ERKENNTNIS:\n`;
  if (sentiment.valence < -30 && complexity >= 6) {
    synthesis += `Diese Situation ist emotional belastend UND komplex. Prioritaet 1: Emotionale Stabilisierung. Prioritaet 2: Komplexitaet reduzieren durch Zerlegung in Teilprobleme.\n\n`;
  } else if (complexity >= 7) {
    synthesis += `Hohe Komplexitaet erkannt. Nicht alles gleichzeitig loesen. Fokus auf den einen Hebel der 80% der Wirkung bringt.\n\n`;
  } else if (sentiment.valence > 30) {
    synthesis += `Positive Ausgangslage. Nutze dieses Momentum fuer entschiedenes Handeln. Jetzt ist der richtige Zeitpunkt.\n\n`;
  } else {
    synthesis += `Situation ist handhabbar. Klare Analyse + systematische Ausfuehrung fuehrt zum Ergebnis.\n\n`;
  }

  // Personal integration
  if (ctx.totalDays > 0) {
    synthesis += `PERSOENLICHE INTEGRATION:\n`;
    synthesis += `Basierend auf ${ctx.totalDays} Tagen Daten: `;
    if (ctx.trend > 5) {
      synthesis += `Dein Aufwaertstrend (+${ctx.trend}) zeigt dass du gerade Momentum hast. Nutze es.\n`;
    } else if (ctx.trend < -5) {
      synthesis += `Achtung: Abwaertstrend (${ctx.trend}). Loesung: Nicht mehr anfangen, sondern aktuelles konsolidieren.\n`;
    } else {
      synthesis += `Stabiler Kurs. Gute Basis fuer neue Herausforderungen.\n`;
    }
    synthesis += `\n`;
  }

  // Key numbers
  if (entities.numbers.length) {
    synthesis += `ERKANNTE KENNZAHLEN: ${entities.numbers.join(' | ')}\n`;
  }
  if (entities.timeframes.length) {
    synthesis += `ZEITRAHMEN: ${entities.timeframes.join(' | ')}\n`;
  }

  // Final recommendation
  synthesis += `\nPRIORITAET #1: ${paths[0].actions[paths[0].actions.length - 1]}\n`;
  synthesis += `ERFOLGSCHANCE: ${predictions[0].probability}% bei konsequenter Umsetzung.`;

  return synthesis;
}

// MAIN ANALYSIS PIPELINE
async function startAnalyzerAnalysis() {
  const title = document.getElementById('a-title').value.trim() || 'Neue Analyse';
  const inputText = document.getElementById('a-text').value.trim();
  if (!inputText) { alert('Bitte Text eingeben'); return; }
  const detail = document.getElementById('analyzer-result');
  detail.style.display = 'block';
  detail.scrollIntoView({behavior:'smooth', block:'start'});

  // PHASE 0: Loading animation
  const phases = [
    {name:"CONTEXT SCAN", color:"var(--cyan)", icon:"◎", desc:"Domäne erkennen, Entitäten extrahieren, Sentiment messen..."},
    {name:"PATTERN MATRIX", color:"var(--purple)", icon:"◈", desc:"Multi-dimensionale Muster-Erkennung und Komplexitaets-Scoring..."},
    {name:"CROSS-REFERENCE", color:"var(--gold)", icon:"◆", desc:"Abgleich mit persoenlichen Daten, Buch-Bibliothek, historischen Mustern..."},
    {name:"STRATEGIC MODEL", color:"var(--green)", icon:"▲", desc:"3-Pfad-Strategie generieren: Sofort / 7-Tage / 30-Tage..."},
    {name:"SYNTHESIS", color:"var(--pink,#ff6b9d)", icon:"✦", desc:"Prognose berechnen, Kern-Erkenntnis destillieren, Report generieren..."}
  ];

  for (let i = 0; i < phases.length; i++) {
    const p = phases[i];
    const progress = Math.round((i+1)/phases.length*100);
    detail.innerHTML = `
      <div class="card fade-in" style="text-align:center;padding:30px;border-color:${p.color}">
        <div style="font-family:Orbitron,sans-serif;font-size:14px;color:${p.color};letter-spacing:3px;margin-bottom:8px">${p.icon} PHASE ${i+1}/5</div>
        <div style="font-family:Orbitron,sans-serif;font-size:11px;color:var(--text);letter-spacing:2px;margin-bottom:12px">${p.name}</div>
        <p style="font-size:11px;color:var(--dim)">${p.desc}</p>
        <div style="margin-top:16px;background:var(--surface2);height:4px;border-radius:2px;overflow:hidden">
          <div style="width:${progress}%;height:100%;background:${p.color};transition:width .5s ease"></div>
        </div>
        <p class="small" style="margin-top:8px">${progress}% COMPLETE</p>
      </div>
    `;
    await new Promise(r => setTimeout(r, 400 + Math.random()*300));
  }

  // RUN THE PIPELINE
  const domains = classifySituation(inputText);
  const entities = extractEntities(inputText);
  const sentiment = analyzeSentiment(inputText);
  const complexity = scoreComplexity(inputText, entities, domains);
  const crossRef = crossReferenceUserData(inputText, domains);
  const paths = generateStrategicModel(inputText, domains, sentiment, complexity, entities);
  const predictions = predictOutcomes(domains, sentiment, complexity, crossRef);
  const synthesis = generateSynthesis(inputText, domains, sentiment, complexity, entities, crossRef, paths, predictions);

  // Also try API analysis in parallel
  let apiResult = null;
  try {
    apiResult = await nerveApi('situation_analyze', {title, input_text: inputText});
  } catch(e) { /* API optional, local analysis is primary */ }

  // BUILD RESULT HTML
  let resultHtml = '';

  // PHASE 1: CONTEXT SCAN
  resultHtml += `
    <div class="card fade-in" style="border-color:rgba(0,240,255,.3)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:16px;color:var(--cyan)">◎</span>
        <h3 style="margin:0;color:var(--cyan)">PHASE 1 — CONTEXT SCAN</h3>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div style="background:var(--surface2);padding:10px;border-radius:4px">
          <p class="small" style="margin:0">DOMAENE</p>
          <p style="font-size:14px;color:${domains.primary.color};font-weight:700;margin:4px 0 0">${domains.primary.icon} ${domains.primary.key.toUpperCase()}</p>
        </div>
        <div style="background:var(--surface2);padding:10px;border-radius:4px">
          <p class="small" style="margin:0">SENTIMENT</p>
          <p style="font-size:14px;color:${sentiment.valence > 20 ? 'var(--green)' : sentiment.valence < -20 ? 'var(--red,#ff4444)' : 'var(--gold)'};font-weight:700;margin:4px 0 0">${sentiment.label} (${sentiment.valence > 0 ? '+' : ''}${sentiment.valence})</p>
        </div>
        <div style="background:var(--surface2);padding:10px;border-radius:4px">
          <p class="small" style="margin:0">KOMPLEXITAET</p>
          <p style="font-size:14px;color:${complexity >= 7 ? 'var(--red,#ff4444)' : complexity >= 4 ? 'var(--gold)' : 'var(--green)'};font-weight:700;margin:4px 0 0">${complexity}/10</p>
        </div>
        <div style="background:var(--surface2);padding:10px;border-radius:4px">
          <p class="small" style="margin:0">DRINGLICHKEIT</p>
          <p style="font-size:14px;color:${sentiment.urgency === 'critical' ? 'var(--red,#ff4444)' : sentiment.urgency === 'elevated' ? 'var(--gold)' : 'var(--green)'};font-weight:700;margin:4px 0 0">${sentiment.urgency.toUpperCase()}</p>
        </div>
      </div>
      ${domains.secondary ? `<p style="font-size:11px;color:var(--dim)">Sekundaere Domaene: <span style="color:${domains.secondary.color}">${domains.secondary.icon} ${domains.secondary.key.toUpperCase()}</span></p>` : ''}
      ${entities.numbers.length ? `<p style="font-size:11px;color:var(--dim);margin-top:6px">Erkannte Zahlen: <span style="color:var(--text)">${entities.numbers.join(' | ')}</span></p>` : ''}
      ${entities.timeframes.length ? `<p style="font-size:11px;color:var(--dim);margin-top:4px">Zeitrahmen: <span style="color:var(--text)">${entities.timeframes.join(' | ')}</span></p>` : ''}
    </div>
  `;

  // PHASE 2: PATTERN MATRIX
  resultHtml += `
    <div class="card fade-in" style="border-color:rgba(168,85,247,.3)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:16px;color:var(--purple)">◈</span>
        <h3 style="margin:0;color:var(--purple)">PHASE 2 — PATTERN MATRIX</h3>
      </div>
      <div style="margin-bottom:12px">
        ${domains.allScores.filter(([,d]) => d.score > 0).map(([key, d]) => {
          const pct = Math.min(100, d.score * 20);
          return `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-size:12px;width:14px;text-align:center">${d.icon}</span>
              <span style="font-size:11px;color:var(--dim);width:80px">${key.toUpperCase()}</span>
              <div style="flex:1;background:var(--surface2);height:6px;border-radius:3px;overflow:hidden">
                <div style="width:${pct}%;height:100%;background:${d.color};border-radius:3px"></div>
              </div>
              <span style="font-size:10px;color:${d.color};width:30px;text-align:right">${d.score}</span>
            </div>`;
        }).join('')}
      </div>
      <div style="background:var(--surface2);padding:10px;border-left:2px solid var(--purple);font-size:11px;color:var(--dim);line-height:1.7">
        <b style="color:var(--text)">MUSTER-ANALYSE:</b> ${domains.allScores.filter(([,d]) => d.score > 0).length} aktive Domaenen erkannt.
        ${complexity >= 7 ? ' Multi-dimensionale Situation — erfordert mehrschichtige Strategie.' : complexity >= 4 ? ' Moderate Komplexitaet — fokussierter Ansatz empfohlen.' : ' Klare Situation — direkter Loesungsweg moeglich.'}
      </div>
    </div>
  `;

  // PHASE 3: CROSS-REFERENCE
  resultHtml += `
    <div class="card fade-in" style="border-color:rgba(201,168,76,.3)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:16px;color:var(--gold)">◆</span>
        <h3 style="margin:0;color:var(--gold)">PHASE 3 — CROSS-REFERENCE</h3>
      </div>
      ${crossRef.refs.length ? crossRef.refs.map(ref => {
        const borderColor = ref.severity === 'critical' ? 'var(--red,#ff4444)' : ref.severity === 'warning' ? 'var(--gold)' : ref.severity === 'positive' ? 'var(--green)' : 'var(--cyan)';
        const icon = ref.severity === 'critical' ? '⚠' : ref.severity === 'warning' ? '◈' : ref.severity === 'positive' ? '✦' : '◎';
        return `
          <div style="padding:10px;margin-bottom:6px;background:var(--surface2);border-left:2px solid ${borderColor}">
            <p style="font-size:10px;color:${borderColor};font-family:Orbitron,sans-serif;letter-spacing:1px;margin:0">${icon} ${escHtml(ref.label)}</p>
            <p style="font-size:12px;color:var(--dim);margin:4px 0 0;line-height:1.6">${escHtml(ref.detail)}</p>
          </div>`;
      }).join('') : '<p style="font-size:12px;color:var(--dim)">Keine persoenlichen Daten zum Abgleich vorhanden. Starte Check-ins fuer tiefere Analysen.</p>'}
    </div>
  `;

  // PHASE 4: STRATEGIC MODEL
  resultHtml += `
    <div class="card fade-in" style="border-color:rgba(45,255,168,.3)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:16px;color:var(--green)">▲</span>
        <h3 style="margin:0;color:var(--green)">PHASE 4 — STRATEGIC MODEL</h3>
      </div>
      ${paths.map(path => `
        <div style="margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span style="font-size:14px">${path.icon}</span>
            <span style="font-family:Orbitron,sans-serif;font-size:11px;color:${path.color};letter-spacing:1px">${path.name}</span>
            <span class="tag" style="color:${path.color};border-color:${path.color};font-size:9px">${path.priority}</span>
          </div>
          <p class="small" style="margin:0 0 6px">${path.timeframe}</p>
          ${path.actions.map((a, i) => `
            <div style="padding:8px 10px;margin-bottom:4px;background:var(--surface2);border-left:2px solid ${path.color};font-size:12px;color:var(--text);line-height:1.5">
              <span style="color:${path.color};font-weight:700">${i+1}.</span> ${escHtml(a)}
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>
  `;

  // PHASE 5: SYNTHESIS & PREDICTION
  resultHtml += `
    <div class="card fade-in" style="border-color:rgba(255,107,157,.3)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:16px;color:var(--pink,#ff6b9d)">✦</span>
        <h3 style="margin:0;color:var(--pink,#ff6b9d)">PHASE 5 — SYNTHESIS & PREDICTION</h3>
      </div>
      <div style="margin-bottom:16px">
        <p style="font-size:10px;font-family:Orbitron,sans-serif;letter-spacing:1px;color:var(--dim);margin:0 0 8px">PROGNOSE-MODELL</p>
        ${predictions.map(pred => `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <div style="width:70px;text-align:right">
              <span style="font-family:Orbitron,sans-serif;font-size:16px;color:${pred.color};font-weight:700">${pred.probability}%</span>
            </div>
            <div style="flex:1">
              <div style="background:var(--surface2);height:8px;border-radius:4px;overflow:hidden;margin-bottom:4px">
                <div style="width:${pred.probability}%;height:100%;background:${pred.color};border-radius:4px;transition:width 1s ease"></div>
              </div>
              <p style="font-size:11px;color:${pred.color};font-weight:700;margin:0">${pred.label}</p>
              <p style="font-size:11px;color:var(--dim);margin:2px 0 0">${escHtml(pred.description)}</p>
              <p style="font-size:10px;color:var(--dim);margin:2px 0 0;font-style:italic">${escHtml(pred.requirements)}</p>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="hr"></div>
      <div style="background:var(--surface2);padding:14px;border-radius:4px;margin-top:12px">
        <p style="font-size:10px;font-family:Orbitron,sans-serif;letter-spacing:1px;color:var(--cyan);margin:0 0 8px">INTELLIGENCE REPORT</p>
        <pre style="font-size:11px;color:var(--text);line-height:1.7;white-space:pre-wrap;margin:0;font-family:'Space Mono',monospace">${escHtml(synthesis)}</pre>
      </div>
    </div>
  `;

  // API enrichment (if available)
  if (apiResult) {
    const apiResearch = typeof apiResult.research === 'object' ? apiResult.research : {};
    const apiPlan = Array.isArray(apiResult.plan) ? apiResult.plan : [];
    if (apiResearch.kernpunkte || apiPlan.length || apiResult.analysis) {
      resultHtml += `
        <div class="card fade-in" style="border-color:rgba(0,240,255,.15)">
          <p style="font-size:10px;font-family:Orbitron,sans-serif;letter-spacing:1px;color:var(--cyan);margin:0 0 8px">◎ NERVE-API ENRICHMENT</p>
          ${apiResearch.kernpunkte ? `<div style="margin-bottom:8px"><p class="small">KI-RECHERCHE:</p><ul style="padding-left:16px;font-size:12px;color:var(--dim)">${apiResearch.kernpunkte.map(k=>`<li>${escHtml(k)}</li>`).join('')}</ul></div>` : ''}
          ${apiPlan.length ? `<div style="margin-bottom:8px"><p class="small">KI-PLAN:</p>${apiPlan.map(s=>`<div style="padding:6px 10px;margin-bottom:4px;background:var(--surface2);border-left:2px solid var(--cyan);font-size:11px;color:var(--text)">${escHtml(s.aktion||s.raw||JSON.stringify(s))}</div>`).join('')}</div>` : ''}
          ${apiResult.analysis ? `<div><p class="small">KI-ANALYSE:</p><p style="font-size:12px;color:var(--dim);line-height:1.7;white-space:pre-wrap">${escHtml(apiResult.analysis)}</p></div>` : ''}
        </div>
      `;
    }
  }

  // Close button
  resultHtml += `<button class="btn-outline" onclick="document.getElementById('analyzer-result').style.display='none'" style="width:100%;margin-bottom:16px">ANALYSE SCHLIESSEN</button>`;

  detail.innerHTML = resultHtml;

  // Save to local history
  const history = loadAnalyzerHistory();
  history.unshift({
    title,
    inputText,
    date: new Date().toISOString().split('T')[0],
    domain: domains.primary.key,
    domainIcon: domains.primary.icon,
    domainColor: domains.primary.color,
    complexity,
    sentiment: sentiment.label,
    resultHtml
  });
  saveAnalyzerHistory(history);

  // Clear inputs
  document.getElementById('a-text').value = '';
  document.getElementById('a-title').value = '';

  // Refresh list
  const listEl = document.getElementById('analyzer-list');
  if (listEl) {
    const updatedHistory = loadAnalyzerHistory();
    listEl.innerHTML = updatedHistory.slice(0,10).map((h,i) => `
      <div class="card" style="cursor:pointer;padding:14px;margin-bottom:8px;border-color:${h.domainColor || 'var(--border)'}" onclick="showSavedAnalysis(${i})">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <p style="font-weight:700;font-size:13px;color:var(--text);margin:0">${escHtml(h.title)}</p>
            <p class="small" style="margin:4px 0 0">${escHtml(h.domain || 'general')} · Komplexitaet ${h.complexity || '?'}/10 · ${h.date || ''}</p>
          </div>
          <span style="font-size:18px">${h.domainIcon || '◉'}</span>
        </div>
      </div>
    `).join('');
  }
}

      <div class="card fade-in" style="border-color:rgba(168,85,247,.3)">

        ${pd.physik_bezug ? `<p style="font-size:12px;margin-top:10px"><b style="color:var(--text)">Physik-Bezug:</b> <span style="color:var(--dim)">${escHtml(pd.physik_bezug)}</span></p>` : ''}
        ${pd.evolution_bezug ? `<p style="font-size:12px"><b style="color:var(--text)">Evolution-Bezug:</b> <span style="color:var(--dim)">${escHtml(pd.evolution_bezug)}</span></p>` : ''}
        ${pd.empfehlung ? `<div style="margin-top:12px;padding:12px;background:var(--surface2);border-left:2px solid var(--green)"><p style="font-size:12px;color:var(--text)"><b>Empfehlung:</b> ${escHtml(pd.empfehlung)}</p></div>` : ''}
        ${pd.raw ? `<p style="font-size:12px;color:var(--dim);margin-top:10px">${escHtml(pd.raw)}</p>` : ''}
