async function loadPatientList() {
  const el = document.getElementById('patient-list');
  try {
    const data = await nerveApi('patient_list');
    if (!data.length) { el.innerHTML = '<p style="text-align:center;color:var(--dim)">Noch keine Patientenanalysen.</p>'; return; }

// FEATURE 1: PREDICTIVE ENGINE v2090
// Predicts tomorrow's state from historical patterns
// =========================================================

function buildPredictiveModel() {
  const data = loadData();
  const entries = data.entries.filter(e => e.completed).sort((a,b) => b.date.localeCompare(a.date));
  const moodLog = (data.moodLog || []).sort((a,b) => b.date.localeCompare(a.date));

  if (entries.length < 3) return null;

  // Rolling averages
  const last7 = entries.slice(0,7);
  const last14 = entries.slice(0,14);
  const avgScore7 = last7.reduce((s,e)=>s+(e.score||0),0) / last7.length;
  const avgScore14 = last14.length ? last14.reduce((s,e)=>s+(e.score||0),0) / last14.length : avgScore7;
  const momentum = avgScore7 - avgScore14;

  // Day-of-week pattern
  const dow = new Date().getDay();
  const tomorrowDow = (dow + 1) % 7;
  const dowEntries = entries.filter(e => new Date(e.date).getDay() === tomorrowDow);
  const dowAvg = dowEntries.length ? dowEntries.reduce((s,e)=>s+(e.score||0),0) / dowEntries.length : avgScore7;

  // Mood trajectory
  const recentMoods = moodLog.slice(0,7);
  const avgMood = recentMoods.length ? recentMoods.reduce((s,m)=>s+m.mood,0)/recentMoods.length : 5;
  const avgEnergy = recentMoods.length ? recentMoods.reduce((s,m)=>s+m.energy,0)/recentMoods.length : 5;
  const avgFocus = recentMoods.length ? recentMoods.reduce((s,m)=>s+m.focus,0)/recentMoods.length : 5;

  // Weakness prediction — what's likely to be weak tomorrow
  const weaknessFreq = {};
  last7.forEach(e => {
    if (e.analysis && e.analysis.weaknesses) {
      e.analysis.weaknesses.forEach(w => {
        const bk = w.question?.bookTitle || 'unknown';
        weaknessFreq[bk] = (weaknessFreq[bk]||0) + 1;
      });
    }
  });
  const likelyWeaknesses = Object.entries(weaknessFreq).sort((a,b)=>b[1]-a[1]).slice(0,3);

  // Streak-based motivation prediction
  const streak = getStreak();
  let motivationRisk = 'low';
  if (streak === 0) motivationRisk = 'high';
  else if (streak % 7 === 6) motivationRisk = 'medium'; // Day before weekly milestone
  else if (streak > 21) motivationRisk = 'low';

  // Energy cycle prediction (based on mood patterns)
  const energyEntries = moodLog.slice(0,14);
  let energyPeakHour = 10; // default
  let energyDipHour = 14;
  if (avgEnergy > 7) { energyPeakHour = 9; energyDipHour = 15; }
  else if (avgEnergy < 4) { energyPeakHour = 11; energyDipHour = 13; }

  // Predicted score
  const weightedPrediction = (avgScore7 * 0.4) + (dowAvg * 0.3) + (avgScore14 * 0.2) + (momentum * 0.1 * 10);
  const predictedScore = Math.max(0, Math.min(100, Math.round(weightedPrediction)));

  // Risk factors
  const risks = [];
  if (momentum < -5) risks.push({text:'Abwaertstrend erkannt (-' + Math.abs(Math.round(momentum)) + ' Punkte)', severity:'high'});
  if (avgEnergy < 4) risks.push({text:'Chronisch niedrige Energie (' + avgEnergy.toFixed(1) + '/10)', severity:'high'});
  if (avgMood < 4) risks.push({text:'Mood unter kritischem Level (' + avgMood.toFixed(1) + '/10)', severity:'high'});
  if (motivationRisk === 'high') risks.push({text:'Streak unterbrochen — Motivationsrisiko', severity:'medium'});
  if (likelyWeaknesses.length) risks.push({text:'Wiederkehrende Schwaeche: ' + likelyWeaknesses[0][0], severity:'medium'});

  // Opportunities
  const opps = [];
  if (momentum > 3) opps.push('Aufwaertstrend nutzen — anspruchsvollere Ziele setzen');
  if (streak > 7) opps.push('Streak-Momentum — perfekt fuer neue Gewohnheiten');
  if (avgEnergy > 7) opps.push('Hohe Energie — Deep Work Session einplanen');
  if (dowAvg > avgScore7) opps.push('Historisch starker Wochentag — nutze das');
  if (!opps.length) opps.push('Stabile Basis — fokussiere auf Konsistenz');

  // Pre-load protocol
  const protocol = [];
  if (avgEnergy < 5) protocol.push({time:'06:30', action:'Kalt duschen (30 Sek.) — Adrenalin-Reset', icon:'❄'});
  else protocol.push({time:'06:30', action:'10 Min Sonnenlicht — Cortisol-Timing optimieren', icon:'☀'});
  protocol.push({time:'07:00', action:'Schwerstes Buch-Kapitel zuerst (Willpower-Peak)', icon:'📖'});
  if (energyPeakHour <= 10) protocol.push({time:`${String(energyPeakHour).padStart(2,'0')}:00`, action:'Deep Work Block — wichtigste Aufgabe', icon:'⚡'});
  protocol.push({time:`${String(energyDipHour).padStart(2,'0')}:00`, action:'Energie-Dip erwartet — Spaziergang oder Atemuebung', icon:'🌿'});
  if (likelyWeaknesses.length) {
    const book = BOOKS.find(b => b.title === likelyWeaknesses[0][0]);
    if (book) protocol.push({time:'18:00', action:`${book.title} Review — Schwachstelle gezielt bearbeiten`, icon:'🎯'});
  }
  protocol.push({time:'21:00', action:'Check-in + Reflexion — Tagesbilanz ziehen', icon:'📊'});
  if (avgMood < 5) protocol.push({time:'21:30', action:'Dankbarkeits-Journaling — 3 positive Dinge', icon:'✍'});

  return {
    predictedScore, momentum: Math.round(momentum), avgScore7: Math.round(avgScore7),
    dowAvg: Math.round(dowAvg), avgMood, avgEnergy, avgFocus, streak,
    motivationRisk, likelyWeaknesses, risks, opps, protocol,
    energyPeakHour, energyDipHour, totalEntries: entries.length,
    confidence: Math.min(95, 40 + entries.length * 2)
  };
}

// FEATURE 2: VOICE-FIRST UI (Web Speech API)
// =========================================================
let voiceRecognition = null;
let isRecording = false;

function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;
  const recognition = new SpeechRecognition();
  recognition.lang = 'de-DE';
  recognition.continuous = true;
  recognition.interimResults = true;
  return recognition;
}

function startVoiceInput(targetId, callback) {
  const recognition = initVoice();
  if (!recognition) { alert('Spracheingabe nicht unterstuetzt in diesem Browser'); return; }
  voiceRecognition = recognition;
  isRecording = true;
  let transcript = '';

  recognition.onresult = (event) => {
    transcript = '';
    for (let i = 0; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    const el = document.getElementById(targetId);
    if (el) el.value = transcript;
    const preview = document.getElementById(targetId + '-voice-preview');
    if (preview) preview.textContent = transcript;
  };

  recognition.onerror = () => { stopVoiceInput(); };
  recognition.onend = () => {
    isRecording = false;
    updateVoiceButton(targetId);
    if (callback && transcript) callback(transcript);
  };

  recognition.start();
  updateVoiceButton(targetId);
}

function stopVoiceInput() {
  if (voiceRecognition) {
    voiceRecognition.stop();
    voiceRecognition = null;
  }
  isRecording = false;
}

function toggleVoice(targetId, callback) {
  if (isRecording) { stopVoiceInput(); updateVoiceButton(targetId); }
  else startVoiceInput(targetId, callback);
}

function updateVoiceButton(targetId) {
  const btn = document.getElementById(targetId + '-voice-btn');
  if (btn) btn.classList.toggle('recording', isRecording);
}

function voiceButtonHtml(targetId) {
  return `
    <div style="text-align:center;margin:12px 0">
      <button class="voice-btn" id="${targetId}-voice-btn" onclick="toggleVoice('${targetId}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <p class="small" style="margin-top:6px">${isRecording ? 'AUFNAHME LAEUFT...' : 'ANTIPPEN ZUM SPRECHEN'}</p>
      <div id="${targetId}-voice-preview" class="voice-transcript" style="display:${isRecording ? 'block' : 'none'}"></div>
    </div>
  `;
}

function getBioData() {
  // Aggregate all biometric data from mood logs and entries
  const data = loadData();
  const moodLog = (data.moodLog || []).sort((a,b) => b.date.localeCompare(a.date));
  const entries = data.entries.filter(e => e.completed).sort((a,b) => b.date.localeCompare(a.date));

  const today = moodLog[0] || {};
  const yesterday = moodLog[1] || {};

  // Calculate derived metrics
  const recoveryScore = today.sleep ? Math.round((today.sleep / 10) * (today.mood / 10) * 100) : null;
  const stressIndex = today.stress ? Math.round(today.stress * 10) : null;
  const readiness = today.energy && today.focus ? Math.round((today.energy + today.focus) / 2 * 10) : null;

  // 7-day averages
  const last7 = moodLog.slice(0,7);
  const avgCalc = (key) => last7.length ? Math.round(last7.reduce((s,m)=>s+(m[key]||0),0)/last7.length*10)/10 : null;

  // HRV simulation based on stress/sleep data
  const simulatedHRV = today.stress && today.sleep ? Math.round(40 + (today.sleep * 3) - (today.stress * 2) + Math.random() * 10) : null;

  // Consistency score
  const consistency = entries.length >= 7 ? Math.round(Math.min(entries.length, 30) / 30 * 100) : null;

  return {
    today, yesterday,
    mood: {current: today.mood, avg: avgCalc('mood'), delta: today.mood && yesterday.mood ? today.mood - yesterday.mood : null},
    energy: {current: today.energy, avg: avgCalc('energy'), delta: today.energy && yesterday.energy ? today.energy - yesterday.energy : null},
    focus: {current: today.focus, avg: avgCalc('focus'), delta: today.focus && yesterday.focus ? today.focus - yesterday.focus : null},
    stress: {current: today.stress, avg: avgCalc('stress'), delta: today.stress && yesterday.stress ? today.stress - yesterday.stress : null},
    sleep: {current: today.sleep, avg: avgCalc('sleep'), delta: today.sleep && yesterday.sleep ? today.sleep - yesterday.sleep : null},
    recoveryScore, stressIndex, readiness, simulatedHRV, consistency,
    moodLog, entries, daysTracked: entries.length
  };
}

function generateBenchmarkData() {
  // Simulate anonymous benchmark data from "network" of users
  // In production this would come from a real API
  const data = loadData();
  const entries = data.entries.filter(e => e.completed);
  const moodLog = data.moodLog || [];
  const streak = getStreak();

  const myScore = entries.length ? Math.round(entries.slice(0,7).reduce((s,e)=>s+(e.score||0),0) / Math.min(entries.length,7)) : 0;
  const myMood = moodLog.length ? Math.round(moodLog.slice(0,7).reduce((s,m)=>s+m.mood,0)/Math.min(moodLog.length,7)*10)/10 : 5;

  // Simulated population distributions (realistic bell curves)
  const populationSize = 12847;
  const avgScore = 52;
  const avgStreak = 8;
  const avgMood = 5.8;
  const avgCompletion = 67;

  const myPercentile = (val, mean, stddev) => {
    const z = (val - mean) / stddev;
    const p = 0.5 * (1 + Math.min(1, Math.max(-1, z * 0.7071067811865476 * (1 + z * z * 0.04)))) ;
    return Math.max(1, Math.min(99, Math.round(p * 100)));
  };

  return {
    populationSize,
    categories: [
      {
        label: 'GESAMTSCORE',
        myValue: myScore,
        networkAvg: avgScore,
        networkTop10: 82,
        networkBottom10: 23,
        percentile: myPercentile(myScore, avgScore, 20),
        unit: '/100',
        color: 'var(--cyan)'
      },
      {
        label: 'STREAK',
        myValue: streak,
        networkAvg: avgStreak,
        networkTop10: 45,
        networkBottom10: 1,
        percentile: myPercentile(streak, avgStreak, 12),
        unit: ' Tage',
        color: 'var(--green)'
      },
      {
        label: 'STIMMUNG',
        myValue: myMood,
        networkAvg: avgMood,
        networkTop10: 8.2,
        networkBottom10: 3.1,
        percentile: myPercentile(myMood, avgMood, 1.5),
        unit: '/10',
        color: 'var(--gold)'
      },
      {
        label: 'CHECK-IN RATE',
        myValue: entries.length > 0 ? Math.min(100, Math.round(entries.length / Math.max(1, Math.round((Date.now() - new Date(entries[entries.length-1].date).getTime()) / 86400000)) * 100)) : 0,
        networkAvg: avgCompletion,
        networkTop10: 95,
        networkBottom10: 22,
        percentile: myPercentile(entries.length > 0 ? Math.round(entries.length / 30 * 100) : 0, avgCompletion, 25),
        unit: '%',
        color: 'var(--purple)'
      }
    ],
    insights: []
  };
}

function submitFeedback(rating, source, btn) {
  // Save feedback
  const feedbackKey = 'coaching_feedback_log';

  btn.classList.add('selected');

  setTimeout(() => {

        <div style="text-align:center;padding:20px">
          <div style="font-size:36px;margin-bottom:12px">${rating === 'much_better' ? '🔥' : rating === 'better' ? '✅' : rating === 'same' ? '📊' : '📉'}</div>

          <p style="font-size:11px;color:var(--dim);margin-top:8px">${rating === 'much_better' || rating === 'better' ? 'Wir merken uns was funktioniert.' : 'Wir passen die Empfehlungen an.'}</p>
        </div>
      `;
      setTimeout(() => modal.remove(), 1500);
    }

function getFeedbackStats() {
  const log = JSON.parse(localStorage.getItem('coaching_feedback_log') || '[]');
  const total = log.length;
  if (total === 0) return null;
  const counts = {much_better:0, better:0, same:0, worse:0};
  log.forEach(f => counts[f.rating] = (counts[f.rating]||0) + 1);
  const effectiveRate = Math.round((counts.much_better + counts.better) / total * 100);
  return {total, counts, effectiveRate};
}

let proactiveInterval = null;

function initProactiveSystem() {
  // Request notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    // Will ask on first interaction
  }

  // Check for proactive alerts every 5 minutes
  if (proactiveInterval) clearInterval(proactiveInterval);
  proactiveInterval = setInterval(checkProactiveAlerts, 300000);

  // Also check immediately
  setTimeout(checkProactiveAlerts, 3000);
}

function checkProactiveAlerts() {
  const data = loadData();
  const today = todayStr();
  const shown = JSON.parse(localStorage.getItem('coaching_proactive_shown_' + today) || '[]');
  const entry = getTodayEntry();
  const todayMood = data.moodLog ? data.moodLog.find(m => m.date === today) : null;
  const hour = new Date().getHours();

  const alerts = [];

  // Morning check-in reminder
  if (!todayMood && hour >= 7 && hour <= 10 && !shown.includes('morning')) {
    alerts.push({id:'morning', title:'Guten Morgen', body:'Speed Check-in starten? 15 Sekunden fuer deinen Tagesstart.', action:'speed', priority:'high'});
  }

  // Midday energy check
  if (todayMood && todayMood.energy <= 4 && hour >= 13 && hour <= 15 && !shown.includes('energy_dip')) {
    alerts.push({id:'energy_dip', title:'Energie-Dip erkannt', body:'Dein Energielevel war heute niedrig. 5 Min Spaziergang?', action:'bio', priority:'medium'});
  }

  // Evening check-in reminder
  if (!entry?.completed && hour >= 19 && hour <= 22 && !shown.includes('evening')) {
    alerts.push({id:'evening', title:'Tages-Check-in', body:'Dein vollstaendiges Check-in steht noch aus. 10 Fragen, 5 Minuten.', action:'daily', priority:'high'});
  }

  // Streak at risk
  const streak = getStreak();
  if (!entry?.completed && hour >= 20 && streak > 3 && !shown.includes('streak_risk')) {
    alerts.push({id:'streak_risk', title:`${streak}-Tage Streak in Gefahr!`, body:'Noch kein Check-in heute. Dein Streak endet um Mitternacht.', action:'daily', priority:'critical'});
  }

  // Show first unshown alert
  const alert = alerts[0];
  if (alert) {
    shown.push(alert.id);
    localStorage.setItem('coaching_proactive_shown_' + today, JSON.stringify(shown));
    showProactiveAlert(alert);

    // Also try push notification
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(alert.title, {body: alert.body, icon: '/icon-192.png', tag: alert.id});
    }
  }
}

function showProactiveAlert(alert) {
  const existing = document.getElementById('proactive-alert');
  if (existing) existing.remove();

  const el = document.createElement('div');
  el.id = 'proactive-alert';
  const borderColor = alert.priority === 'critical' ? 'var(--red)' : alert.priority === 'high' ? 'var(--cyan)' : 'var(--gold)';
  el.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10002;max-width:360px;width:calc(100% - 40px);animation:fadeIn .3s ease`;
  el.innerHTML = `
    <div class="card" style="border-color:${borderColor};padding:16px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5)" onclick="showScreen('${alert.action}');this.parentElement.remove()">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div>
          <p style="font-family:Orbitron,sans-serif;font-size:10px;color:${borderColor};letter-spacing:2px;margin:0">${escHtml(alert.title).toUpperCase()}</p>
          <p style="font-size:12px;color:var(--text);margin:6px 0 0;line-height:1.5">${escHtml(alert.body)}</p>
        </div>
        <span style="color:var(--dim);cursor:pointer;font-size:16px;padding:4px" onclick="event.stopPropagation();this.closest('#proactive-alert').remove()">✕</span>
      </div>
    </div>
  `;
  document.body.appendChild(el);

  // Auto-dismiss after 10 seconds
  setTimeout(() => { const a = document.getElementById('proactive-alert'); if (a) a.remove(); }, 10000);
}

function exportDataAs(format) {
  const data = loadData();
  const entries = data.entries.filter(e => e.completed);
  const moodLog = data.moodLog || [];

  if (format === 'json') {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `coaching-export-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    alert('JSON Export heruntergeladen!');
  }
  else if (format === 'csv') {
    let csv = 'Datum,Score,Mood,Energy,Focus,Stress,Sleep,Staerken,Schwaechen\n';
    entries.forEach(e => {
      const mood = moodLog.find(m => m.date === e.date) || {};
      csv += `${e.date},${e.score||0},${mood.mood||''},${mood.energy||''},${mood.focus||''},${mood.stress||''},${mood.sleep||''},${e.analysis?.strengths?.length||0},${e.analysis?.weaknesses?.length||0}\n`;
    });
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `coaching-export-${todayStr()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    alert('CSV Export heruntergeladen!');
  }
  else if (format === 'clipboard') {
    navigator.clipboard.writeText(JSON.stringify(data, null, 2)).then(() => {
      alert('Daten in Zwischenablage kopiert!');
    }).catch(() => { alert('Kopieren fehlgeschlagen — versuche JSON Export.'); });
  }
}

function getCurrentLevel(xp) {
  let current = LEVELS[0];
  for (const lvl of LEVELS) {
    if (xp >= lvl.xp) current = lvl;
    else break;
  }
  return current;
}

function getNextLevel(xp) {
  for (const lvl of LEVELS) {
    if (xp < lvl.xp) return lvl;
  }
  return null;
}

function awardXP(action, bonus) {
  const amount = (XP_ACTIONS[action] || 0) + (bonus || 0);
  if (amount <= 0) return;
  const xpData = getXpData();
  const oldXP = xpData.xp || 0;
  const oldLevel = getCurrentLevel(oldXP);
  xpData.xp = oldXP + amount;
  const newLevel = getCurrentLevel(xpData.xp);

  // Track screen visits
  if (!xpData.screens) xpData.screens = {};
  if (currentScreen) xpData.screens[currentScreen] = true;

  // Track max streak
  xpData.maxStreak = Math.max(xpData.maxStreak || 0, getStreak());

  saveXpData(xpData);

  // XP popup
  showXpPopup(amount);

  // Level up check
  if (newLevel.level > oldLevel.level) {
    setTimeout(() => showLevelUp(newLevel), 800);

  // Update streak pill with level
  updateStreakPill();
}

function openCommandPalette() {
  if (cmdPaletteOpen) return;

  cmdSelectedIndex = 0;

  const overlay = document.createElement('div');
  overlay.className = 'cmd-overlay';
  overlay.id = 'cmd-palette';

  overlay.innerHTML = `

      <div class="cmd-list" id="cmd-list"></div>
    </div>
  `;
  document.body.appendChild(overlay);

  const input = document.getElementById('cmd-search');
  input.addEventListener('input', () => renderCmdResults(input.value));
  input.addEventListener('keydown', handleCmdKeydown);
  renderCmdResults('');
}

function closeCommandPalette() {
  const el = document.getElementById('cmd-palette');
  if (el) el.remove();
  cmdPaletteOpen = false;
}

function renderCmdResults(query) {
  const q = query.toLowerCase();
  const filtered = CMD_ACTIONS.filter(a =>
    a.label.toLowerCase().includes(q) ||
    a.desc.toLowerCase().includes(q) ||
    (a.shortcut && a.shortcut.toLowerCase() === q)
  );
  cmdSelectedIndex = Math.min(cmdSelectedIndex, filtered.length - 1);
  if (cmdSelectedIndex < 0) cmdSelectedIndex = 0;

  const el = document.getElementById('cmd-list');
  if (!el) return;
  el.innerHTML = filtered.map((a, i) => `
    <div class="cmd-item ${i === cmdSelectedIndex ? 'active' : ''}" onclick="executeCmdAction(${CMD_ACTIONS.indexOf(a)})" onmouseenter="cmdSelectedIndex=${i};renderCmdResults(document.getElementById('cmd-search').value)">
      <span class="cmd-icon">${a.icon}</span>
      <div style="flex:1">
        <span class="cmd-label">${a.label}</span>
        <span class="cmd-desc" style="display:block">${a.desc}</span>
      </div>
      ${a.shortcut ? `<span class="cmd-shortcut">${a.shortcut}</span>` : ''}
    </div>
  `).join('');
}

function handleCmdKeydown(e) {
  const q = document.getElementById('cmd-search')?.value || '';
  const filtered = CMD_ACTIONS.filter(a =>
    a.label.toLowerCase().includes(q.toLowerCase()) ||
    a.desc.toLowerCase().includes(q.toLowerCase())
  );

  if (e.key === 'Escape') { closeCommandPalette(); e.preventDefault(); }
  else if (e.key === 'ArrowDown') { cmdSelectedIndex = Math.min(cmdSelectedIndex + 1, filtered.length - 1); renderCmdResults(q); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { cmdSelectedIndex = Math.max(cmdSelectedIndex - 1, 0); renderCmdResults(q); e.preventDefault(); }
  else if (e.key === 'Enter') {
    const action = filtered[cmdSelectedIndex];
    if (action) executeCmdAction(CMD_ACTIONS.indexOf(action));
    e.preventDefault();
  }
}

function executeCmdAction(index) {
  closeCommandPalette();
  CMD_ACTIONS[index]?.action();
}

// Global keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Ctrl+K or Cmd+K — Command Palette
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    if (cmdPaletteOpen) closeCommandPalette();
    else openCommandPalette();
  }
  // Escape closes palette
  if (e.key === 'Escape' && cmdPaletteOpen) {
    closeCommandPalette();
  }
});

// FEATURE 11: CLIENT-SIDE ENCRYPTION (AES-256)
// =========================================================

const ENCRYPTION_KEY_NAME = 'coaching_enc_key';

async function generateEncryptionKey() {
  const key = await crypto.subtle.generateKey(
    {name: 'AES-GCM', length: 256}, true, ['encrypt', 'decrypt']
  );
  const exported = await crypto.subtle.exportKey('jwk', key);
  localStorage.setItem(ENCRYPTION_KEY_NAME, JSON.stringify(exported));
  return key;
}

async function getEncryptionKey() {
  const stored = localStorage.getItem(ENCRYPTION_KEY_NAME);
  if (stored) {
    return await crypto.subtle.importKey(
      'jwk', JSON.parse(stored), {name: 'AES-GCM', length: 256}, true, ['encrypt', 'decrypt']
    );
  }
  return await generateEncryptionKey();
}

async function encryptData(plaintext) {
  try {
    const key = await getEncryptionKey();
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const encoded = new TextEncoder().encode(plaintext);
    const encrypted = await crypto.subtle.encrypt({name: 'AES-GCM', iv}, key, encoded);
    return {
      iv: Array.from(iv),
      data: Array.from(new Uint8Array(encrypted)),
      encrypted: true
    };
  } catch(e) { return {data: plaintext, encrypted: false}; }
}

async function decryptData(encObj) {
  try {
    if (!encObj.encrypted) return encObj.data;
    const key = await getEncryptionKey();
    const iv = new Uint8Array(encObj.iv);
    const data = new Uint8Array(encObj.data);
    const decrypted = await crypto.subtle.decrypt({name: 'AES-GCM', iv}, key, data);
    return new TextDecoder().decode(decrypted);
  } catch(e) { return null; }
}

function isEncryptionAvailable() {
  return typeof crypto !== 'undefined' && crypto.subtle;
}

  }

function getVariant(testName) {
  const abData = getABTestData();
  if (!abData[testName]) {
    const test = AB_TESTS[testName];
    if (!test) return null;
    abData[testName] = {
      variant: test.variants[Math.floor(Math.random() * test.variants.length)],
      assigned: new Date().toISOString(),
      impressions: 0,
      conversions: 0
    };
    saveABTestData(abData);
  }
  abData[testName].impressions++;
  saveABTestData(abData);
  return abData[testName].variant;
}

function trackConversion(testName) {
  const abData = getABTestData();
  if (abData[testName]) {
    abData[testName].conversions++;
    saveABTestData(abData);
  }
}

function getABResults() {
  const abData = getABTestData();
  return Object.entries(abData).map(([name, data]) => ({
    name,
    variant: data.variant,
    impressions: data.impressions,
    conversions: data.conversions,
    rate: data.impressions > 0 ? Math.round(data.conversions / data.impressions * 100) : 0
  }));
}

function startMatrixRain(canvas) {
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const fontSize = 14;
  const columns = Math.floor(canvas.width / fontSize);
  const drops = new Array(columns).fill(1);
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';

  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0f0';
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < drops.length; i++) {
      const text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    if (matrixActive) matrixAnimFrame = requestAnimationFrame(draw);
  }
  draw();
}

// =========================================================

function calculatePowerScore() {
  const data = loadData();
  const entries = data.entries.filter(e => e.completed).sort((a,b) => b.date.localeCompare(a.date));
  const moodLog = (data.moodLog || []).sort((a,b) => b.date.localeCompare(a.date));
  const streak = getStreak();
  const xpData = getXpData();
  const xp = xpData.xp || 0;
  const level = getCurrentLevel(xp);
  const feedbackStats = getFeedbackStats();

  // Component scores (0-100 each)
  const components = {};

  // 1. Consistency (25%) — streak + completion rate
  const daysSinceFirst = entries.length ? Math.max(1, Math.round((Date.now() - new Date(entries[entries.length-1].date).getTime()) / 86400000)) : 1;
  const completionRate = Math.min(100, Math.round(entries.length / daysSinceFirst * 100));
  components.consistency = Math.round(Math.min(100, (streak / 30 * 50) + (completionRate * 0.5)));

  // 2. Performance (25%) — recent scores
  const recentScores = entries.slice(0,7).map(e => e.score || 0);
  components.performance = recentScores.length ? Math.round(recentScores.reduce((a,b)=>a+b,0) / recentScores.length) : 0;

  // 3. Wellbeing (20%) — mood + energy + focus
  const recentMoods = moodLog.slice(0,7);
  const avgMood = recentMoods.length ? recentMoods.reduce((s,m)=>s+m.mood,0)/recentMoods.length : 5;
  const avgEnergy = recentMoods.length ? recentMoods.reduce((s,m)=>s+m.energy,0)/recentMoods.length : 5;
  const avgFocus = recentMoods.length ? recentMoods.reduce((s,m)=>s+(m.focus||5),0)/recentMoods.length : 5;
  components.wellbeing = Math.round((avgMood + avgEnergy + avgFocus) / 3 * 10);

  // 4. Growth (15%) — trend + weakness reduction
  const prev7 = entries.slice(7,14).map(e => e.score || 0);
  const recentAvg = recentScores.length ? recentScores.reduce((a,b)=>a+b,0)/recentScores.length : 0;
  const prevAvg = prev7.length ? prev7.reduce((a,b)=>a+b,0)/prev7.length : recentAvg;
  const trend = recentAvg - prevAvg;
  components.growth = Math.round(Math.min(100, Math.max(0, 50 + trend * 3)));

  // 5. Engagement (15%) — XP + habits + feedback
  const habitData = data.habits || {};
  let habitTotal = 0, habitDays = 0;
  Object.values(habitData).forEach(h => { if (h.length) { habitTotal += h.length; habitDays++; } });
  const habitRate = habitDays ? Math.round(habitTotal / habitDays / 12 * 100) : 0;
  const feedbackRate = feedbackStats ? feedbackStats.effectiveRate : 50;
  components.engagement = Math.round((Math.min(100, xp / 100) * 0.4) + (habitRate * 0.3) + (feedbackRate * 0.3));

  // POWER SCORE — weighted composite
  const powerScore = Math.round(
    components.consistency * 0.25 +
    components.performance * 0.25 +
    components.wellbeing * 0.20 +
    components.growth * 0.15 +
    components.engagement * 0.15
  );

  // Power tier
  let tier, tierColor;
  if (powerScore >= 90) { tier = 'TRANSCENDENT'; tierColor = 'var(--gold)'; }
  else if (powerScore >= 75) { tier = 'ELITE'; tierColor = 'var(--cyan)'; }
  else if (powerScore >= 60) { tier = 'STRONG'; tierColor = 'var(--green)'; }
  else if (powerScore >= 40) { tier = 'DEVELOPING'; tierColor = 'var(--gold)'; }
  else if (powerScore >= 20) { tier = 'EMERGING'; tierColor = 'var(--dim)'; }
  else { tier = 'INITIALIZING'; tierColor = 'var(--red)'; }

  return {powerScore, components, tier, tierColor, level, xp, streak, entries: entries.length};
}

    <div class="card fade-in" style="border-color:rgba(201,168,76,.2)">
      <h3 style="color:var(--gold)">LEADERBOARD</h3>
      ${leaderboard.map(p => `
        <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);${p.isYou ? 'background:rgba(0,240,255,.05);margin:0 -20px;padding:10px 20px' : ''}">
          <span style="font-family:Orbitron,sans-serif;font-size:16px;color:${p.rank === 1 ? 'var(--gold)' : p.rank === 2 ? 'var(--dim)' : p.rank === 3 ? '#cd7f32' : 'var(--dim)'};width:24px;font-weight:700">#${p.rank}</span>
          <div style="flex:1">
            <span style="font-size:12px;color:${p.isYou ? 'var(--cyan)' : 'var(--text)'};font-weight:${p.isYou ? '700' : '400'}">${p.name}</span>
            <span class="tag" style="margin-left:6px">LVL ${p.level}</span>
          </div>
          <span style="font-family:Orbitron,sans-serif;font-size:14px;color:${p.isYou ? 'var(--cyan)' : 'var(--dim)'}">${p.score}</span>
        </div>
      `).join('')}
    </div>

    <!-- BATTLE HISTORY -->
    ${completedBattles.length ? `
    <div class="card fade-in">
      <h3>BATTLE HISTORY</h3>
      ${completedBattles.slice(0,5).map(b => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>
            <span style="font-size:11px;color:var(--text)">vs ${b.opponent.name}</span>
            <span class="tag" style="margin-left:4px;color:${b.status === 'won' ? 'var(--green)' : 'var(--red)'};border-color:${b.status === 'won' ? 'var(--green)' : 'var(--red)'}">${b.status === 'won' ? 'WIN' : 'LOSS'}</span>
          </div>
          <span style="font-size:11px;color:var(--dim)">${b.playerProgress} vs ${b.opponentProgress}</span>
        </div>
      `).join('')}
    </div>` : ''}
  `;
  document.getElementById("content").innerHTML = html;
}

let realtimeInterval = null;

function startRealtimeUpdates() {
  if (realtimeInterval) clearInterval(realtimeInterval);
  realtimeInterval = setInterval(() => {
    // Update streak pill with live data
    updateStreakPill();
    // Update any live elements on screen
    const liveScore = document.getElementById('live-power-score');
    if (liveScore) {
      const ps = calculatePowerScore();
      liveScore.textContent = ps.powerScore;
    }
    const liveTime = document.getElementById('live-time');
    if (liveTime) {
      liveTime.textContent = new Date().toLocaleTimeString('de-DE');
    }
  }, 5000);
}

// =========================================================
// FEATURE 18: OFFLINE-FIRST SERVICE WORKER
// =========================================================

function registerEnhancedSW() {
  if (!('serviceWorker' in navigator)) return;

  const swCode = `
    const CACHE_NAME = 'coaching-v2090';
    const ASSETS = ['/coaching.html', '/manifest.json'];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
          const clone = resp.clone();
          caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
          return resp;
        }).catch(() => caches.match('/coaching.html')))
      );
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(names =>
        Promise.all(names.filter(n => n !== CACHE_NAME).map(n => caches.delete(n)))
      ));
    });
  `;

  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);

  // Try registering the enhanced SW (may fail due to blob URL restrictions)
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// Wrap finishSpeedCheckin for XP
const _origFinishSpeed = finishSpeedCheckin;
finishSpeedCheckin = function() {
  _origFinishSpeed();
  awardXP('speed_checkin');
  const xpData = getXpData();
  xpData.speedCheckins = (xpData.speedCheckins || 0) + 1;
  // Track time-based achievements
  const hour = new Date().getHours();
  if (hour >= 0 && hour < 6) xpData.lateCheckins = (xpData.lateCheckins || 0) + 1;
  if (hour >= 4 && hour < 6) xpData.earlyCheckins = (xpData.earlyCheckins || 0) + 1;
  saveXpData(xpData);
  trackConversion('checkin_style');
};

// Wrap sendChat for XP
const _origSendChat = typeof sendChat === 'function' ? sendChat : null;

// Wrap showScreen for tracking
const _origShowScreen = showScreen;
showScreen = function(screen) {
  _origShowScreen(screen);
  const xpData = getXpData();
  if (!xpData.screens) xpData.screens = {};
  xpData.screens[screen] = true;
  saveXpData(xpData);
  updateStreakPill();
};

// Wrap submitFeedback for XP
const _origSubmitFeedback = submitFeedback;
submitFeedback = function(rating, source, btn) {
  _origSubmitFeedback(rating, source, btn);
  awardXP('feedback_given');
  const xpData = getXpData();
  xpData.feedbackGiven = (xpData.feedbackGiven || 0) + 1;
  saveXpData(xpData);
  if (rating === 'better' || rating === 'much_better') trackConversion('action_type');
};

// =========================================================
// GRAIN OVERLAY (Film grain effect from Nerve Center)
// =========================================================
function initGrain() {
  const canvas = document.getElementById("grain");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener("resize", resize);
  function draw() {
    const w = canvas.width, h = canvas.height;
    const img = ctx.createImageData(w, h);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = Math.random() * 255;
      img.data[i] = img.data[i+1] = img.data[i+2] = v;
      img.data[i+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    requestAnimationFrame(draw);
  }
  draw();
}

// =========================================================
// PWA INSTALL PROMPT
// =========================================================
let deferredPrompt = null;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  const dismissed = localStorage.getItem("coaching_install_dismissed");
  if (dismissed) return;

  const slot = document.getElementById("install-banner-slot");
  if (!slot) return;
  slot.innerHTML = `
    <div class="install-banner fade-in" onclick="installApp()">
      <span class="ib-icon">📲</span>
      <div class="ib-text">
        <b>App installieren</b>
        <span>Coaching Engine auf deinem Homescreen</span>
      </div>
      <span class="ib-close" onclick="event.stopPropagation();dismissInstall()">✕</span>
    </div>
  `;
}

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }
  document.getElementById("install-banner-slot").innerHTML = "";
}

function dismissInstall() {
  localStorage.setItem("coaching_install_dismissed", "1");
  document.getElementById("install-banner-slot").innerHTML = "";
}

// Register service worker for offline support
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}

initProactiveSystem();
startRealtimeUpdates();
