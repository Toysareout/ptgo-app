<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<title>Daily Coaching Engine</title>
<style>
:root{--bg:#0b0f1a;--card:#0f172a;--muted:#94a3b8;--text:#e5e7eb;--accent:#f59e0b;--line:#1f2937;--green:#22c55e;--red:#ef4444;--blue:#6366f1}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;background:radial-gradient(1000px 600px at 50% -100px,#1f2a52,transparent),var(--bg);color:var(--text);overflow-x:hidden}
a{color:var(--accent);text-decoration:none}

.wrap{max-width:720px;margin:0 auto;padding:20px 16px 80px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{font-weight:700;letter-spacing:.2px;font-size:18px}
.pill{font-size:11px;color:var(--muted);border:1px solid var(--line);padding:5px 10px;border-radius:999px}

.card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:18px;padding:24px 20px;box-shadow:0 20px 60px rgba(0,0,0,.35);margin-bottom:16px}

h1{font-size:28px;line-height:1.1;margin:8px 0 12px}
h2{font-size:18px;margin:16px 0 10px;color:#f3f4f6}
h3{font-size:15px;margin:12px 0 8px;color:#cbd5e1}
p{color:var(--muted);line-height:1.6;margin-bottom:8px}
.small{font-size:12px;color:var(--muted)}

.hr{height:1px;background:var(--line);margin:16px 0}

textarea{width:100%;background:#0b1223;border:1px solid #263246;color:#e5e7eb;border-radius:12px;padding:12px;font-size:15px;outline:none;resize:vertical;min-height:80px;font-family:inherit}
textarea:focus{border-color:var(--accent)}

button,.btn{display:inline-block;background:linear-gradient(180deg,#fbbf24,#f59e0b);color:#111827;border:none;border-radius:14px;padding:14px 20px;font-weight:700;font-size:16px;cursor:pointer;text-align:center;width:100%;margin-top:8px}
button:hover{opacity:.9}
.btn-outline{background:transparent;border:1px solid var(--line);color:var(--muted);font-size:14px;padding:10px 16px}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;margin:4px}

.progress-bar{height:4px;background:var(--line);border-radius:999px;margin-bottom:14px}
.progress-fill{height:4px;background:var(--accent);border-radius:999px;transition:width .4s}

.tag{display:inline-block;font-size:11px;border:1px solid #374151;padding:3px 8px;border-radius:999px;color:#cbd5e1;margin:2px 4px 2px 0}
.tag-gold{border-color:rgba(245,158,11,.4);color:#fbbf24;background:rgba(245,158,11,.1)}
.tag-blue{border-color:rgba(99,102,241,.4);color:#a5b4fc;background:rgba(99,102,241,.1)}
.tag-green{border-color:rgba(34,197,94,.4);color:#86efac;background:rgba(34,197,94,.1)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.kpi{border:1px solid var(--line);border-radius:14px;padding:14px;background:rgba(255,255,255,.02);text-align:center}
.kpi b{display:block;font-size:24px;margin-top:4px;color:var(--accent)}

.score-ring{width:100px;height:100px;margin:0 auto 10px}
.score-ring svg{width:100%;height:100%}

.book-ref{font-size:11px;color:#6366f1;margin-top:4px;opacity:.8}
.analysis-box{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.25);border-radius:14px;padding:16px;margin:10px 0}
.action-box{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.25);border-radius:14px;padding:16px;margin:10px 0}
.plan-item{padding:10px 0;border-bottom:1px solid var(--line)}
.plan-item:last-child{border-bottom:none}
.plan-time{color:var(--accent);font-weight:700;font-size:14px;min-width:55px;display:inline-block}

.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(11,15,26,.95);border-top:1px solid var(--line);padding:8px 0;backdrop-filter:blur(10px);z-index:99}
.nav-inner{max-width:720px;margin:0 auto;display:flex;justify-content:space-around;padding:0 10px}
.nav-btn{background:none;border:none;color:var(--muted);font-size:11px;padding:6px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;width:auto;margin:0}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px}

.fade-in{animation:fadeIn .3s ease-in}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.streak-flame{font-size:24px;display:inline}
.hidden{display:none}

.history-entry{padding:12px 0;border-bottom:1px solid var(--line)}
.history-date{font-weight:700;color:var(--accent);font-size:14px}

</head>

// =========================================================
// DATA LAYER — localStorage
// =========================================================
const STORAGE_KEY = "coaching_engine_data";

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { entries: [], streakStartDate: null };
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function todayStr() {
  return new Date().toISOString().split("T")[0];
}

function getTodayEntry() {
  const data = loadData();
  return data.entries.find(e => e.date === todayStr());
}

function getStreak() {
  const data = loadData();
  const entries = data.entries.sort((a,b) => b.date.localeCompare(a.date));
  if (!entries.length) return 0;
  let streak = 0;
  let checkDate = new Date();
  // Allow today or yesterday as start
  const todayE = entries.find(e => e.date === todayStr());
  if (!todayE) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yStr = yesterday.toISOString().split("T")[0];
    if (!entries.find(e => e.date === yStr)) return 0;
    checkDate = yesterday;
  }
  for (let i = 0; i < 365; i++) {
    const dStr = checkDate.toISOString().split("T")[0];
    if (entries.find(e => e.date === dStr && e.completed)) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

// =========================================================
// QUESTION SELECTION — taegliche Rotation ueber alle Buecher
// =========================================================
function getDailyQuestions() {
  // Seed basierend auf Datum fuer konsistente taegliche Fragen
  const today = todayStr();
  let seed = 0;
  for (let i = 0; i < today.length; i++) seed += today.charCodeAt(i) * (i+1);

  // 10 Fragen aus verschiedenen Buechern
  const questions = [];
  const usedBooks = new Set();

  // Erst 10 verschiedene Buecher waehlen, dann je 1 Frage
  const bookOrder = [...BOOKS].sort((a,b) => {
    const ha = (seed * 31 + a.id.charCodeAt(0)) % 1000;
    const hb = (seed * 31 + b.id.charCodeAt(0)) % 1000;
    return ha - hb;
  });

  for (let i = 0; i < 10 && i < bookOrder.length; i++) {
    const book = bookOrder[i];
    const qIdx = (seed + i * 7) % book.questions.length;
    questions.push({
      bookId: book.id,
      bookTitle: book.title,
      bookAuthor: book.author,
      bookColor: book.color,
      question: book.questions[qIdx],
      principle: book.principles[qIdx % book.principles.length],
      action: book.actions[(seed + i) % book.actions.length]
    });
  }
  return questions;
}

// =========================================================
// ANALYSIS ENGINE
// =========================================================
function analyzeAnswers(questions, answers) {
  const analysis = {
    totalScore: 0,
    categories: {},
    strengths: [],
    weaknesses: [],
    bookScores: {},
    dailyPlan: [],
    insights: []
  };

  // Keyword-basierte Analyse
  const positiveWords = ["ja","gut","gemacht","getan","geschafft","stolz","besser","gewaehlt","bewusst","klar","ehrlich","stark","diszipliniert","fokussiert","trainiert","gelernt","gewachsen","ueberwunden","konfrontiert","praesent","entschlossen","verantwortung","gelesen","gearbeitet","aufgestanden"];
  const negativeWords = ["nein","nicht","leider","versagt","vermieden","angst","faul","aufgeschoben","abgelenkt","weich","zoegernd","unsicher","excuse","ausrede","prokrastiniert","ignoriert","geschwanzt","vergessen","verschwendet","komfortzone"];
  const neutralWords = ["vielleicht","manchmal","teilweise","versucht","bisschen","wenig","etwas"];

  questions.forEach((q, i) => {
    const answer = (answers[i] || "").toLowerCase().trim();
    if (!answer) return;

    const words = answer.split(/\s+/);
    let posCount = 0, negCount = 0, neutCount = 0;

    words.forEach(w => {
      if (positiveWords.some(p => w.includes(p))) posCount++;
      if (negativeWords.some(n => w.includes(n))) negCount++;
      if (neutralWords.some(n => w.includes(n))) neutCount++;
    });

    // Laenge der Antwort als Engagement-Indikator
    const lengthScore = Math.min(words.length / 15, 1);

    // Score pro Frage: 0-100
    let qScore;
    if (posCount > negCount) qScore = 60 + Math.min(posCount * 10, 40);
    else if (negCount > posCount) qScore = 20 + Math.max(40 - negCount * 10, 0);
    else qScore = 45 + (lengthScore * 20);

    // Engagement Bonus fuer ausfuehrliche Antworten
    qScore = Math.min(100, qScore + lengthScore * 10);

    const bookId = q.bookId;
    if (!analysis.bookScores[bookId]) {
      analysis.bookScores[bookId] = { scores: [], book: q };
    }
    analysis.bookScores[bookId].scores.push(qScore);
    analysis.totalScore += qScore;

    // Staerken/Schwaechen identifizieren
    if (qScore >= 70) {
      analysis.strengths.push({ question: q, score: qScore, answer: answers[i] });
    } else if (qScore < 45) {
      analysis.weaknesses.push({ question: q, score: qScore, answer: answers[i], action: q.action });
    }
  });

  const answeredCount = answers.filter(a => a && a.trim()).length;
  analysis.totalScore = answeredCount > 0 ? Math.round(analysis.totalScore / answeredCount) : 0;

  // Insights generieren
  if (analysis.weaknesses.length >= 3) {
    analysis.insights.push("Du hast heute mehrere Schwachstellen identifiziert. Das ist GUT — Bewusstsein ist der erste Schritt.");
  }
  if (analysis.strengths.length >= 5) {
    analysis.insights.push("Starker Tag. Du bist auf einem guten Weg. Bleib dran und erhoehe die Intensitaet.");
  }
  if (answeredCount < 7) {
    analysis.insights.push("Du hast nicht alle Fragen beantwortet. Vollstaendige Selbstreflexion braucht Disziplin.");
  }

  // Schwaechen-basierte Aktionen fuer den Tagesplan
  analysis.weaknesses.forEach(w => {
    analysis.dailyPlan.push({
      action: w.action,
      reason: `Basierend auf: "${w.question.question.substring(0,50)}..."`,
      book: w.question.bookTitle,
      priority: "high"
    });
  });

  // Allgemeine Aktionen hinzufuegen
  const timeSlots = ["06:00","07:00","08:00","10:00","12:00","14:00","16:00","18:00","20:00","22:00"];
  const generalActions = [
    {time:"06:00", action:"Aufstehen. Kein Snooze. Glas Wasser. 5 Min Stille.", book:"Tate Bibel / 12 Rules"},
    {time:"07:00", action:"Koerperliches Training — Kraft oder Ausdauer. Minimum 30 Min.", book:"Alpha Mann Bibel"},
    {time:"08:00", action:"Kalte Dusche. 2 Minuten. Atemkontrolle.", book:"Der Weg des wahren Mannes"},
    {time:"10:00", action:"Deep Work — 2h fokussierte Arbeit an deinem wichtigsten Projekt.", book:"Almanach / Trading Psychologie"},
    {time:"12:00", action:"Mittagspause: Bewusst essen. 10 Min spazieren.", book:"12 Rules for Life"},
    {time:"14:00", action:"Spezifisches Wissen aufbauen — lernen, lesen, ueben.", book:"Almanach von Naval"},
    {time:"16:00", action:"Soziale Interaktion: Ein echtes Gespraech fuehren.", book:"Models / Verhandeln"},
    {time:"18:00", action:"Reflexion: Was habe ich heute geschafft? Was morgen?", book:"Trading Psychologie"},
    {time:"20:00", action:"30 Min Lesen. Kein Screen.", book:"Almanach von Naval"},
    {time:"22:00", action:"Tagesabschluss: Coaching-Fragen beantworten. Frueh schlafen.", book:"12 Rules / Liebe dich selbst"}
  ];

  analysis.generalPlan = generalActions;
  return analysis;
}

let currentScreen = "daily";

function showScreen(screen) {
  currentScreen = screen;
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("nav-" + screen)?.classList.add("active");

  const streak = getStreak();
  document.getElementById("streak-pill").textContent = streak > 0 ? `${streak} Tage Streak 🔥` : "Tag 1";

  switch(screen) {
    case "daily": renderDaily(); break;
    case "plan": renderPlan(); break;
    case "progress": renderProgress(); break;
    case "history": renderHistory(); break;
  }
}

function renderDaily() {
  const entry = getTodayEntry();

  if (entry && entry.completed) {
    renderTodayResult(entry);
    return;
  }

  dailyQuestions = getDailyQuestions();
  if (entry && entry.answers) {
    dailyAnswers = entry.answers;
    currentQuestion = entry.answers.filter(a => a && a.trim()).length;
    if (currentQuestion >= 10) currentQuestion = 9;
  } else {
    dailyAnswers = new Array(10).fill("");
    currentQuestion = 0;
  }

  renderQuestion();
}

function renderQuestion() {
  const q = dailyQuestions[currentQuestion];
  const pct = ((currentQuestion) / 10 * 100);
  const book = BOOKS.find(b => b.id === q.bookId);

  const html = `
    <div class="card fade-in">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

      <p class="small" style="margin-top:10px;text-align:center">Ehrlichkeit > Perfektion</p>
    </div>
  `;
  document.getElementById("content").innerHTML = html;
  // Focus on textarea
  setTimeout(() => document.getElementById("answer-input")?.focus(), 100);
}

function prevQuestion() {
  saveCurrentAnswer();
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

function nextQuestion() {
  saveCurrentAnswer();

  if (currentQuestion < 9) {
    currentQuestion++;
    renderQuestion();
  } else {
    finishDaily();
  }
}

function saveCurrentAnswer() {
  const input = document.getElementById("answer-input");
  if (input) dailyAnswers[currentQuestion] = input.value;

  // Zwischenspeichern
  const data = loadData();
  let entry = data.entries.find(e => e.date === todayStr());
  if (!entry) {
    entry = { date: todayStr(), completed: false, answers: [], questions: [], analysis: null };
    data.entries.push(entry);
  }
  entry.answers = [...dailyAnswers];
  saveData(data);
}

function finishDaily() {
  const analysis = analyzeAnswers(dailyQuestions, dailyAnswers);

  const data = loadData();
  let entry = data.entries.find(e => e.date === todayStr());
  if (!entry) {
    entry = { date: todayStr(), completed: false, answers: [], questions: [], analysis: null };
    data.entries.push(entry);
  }
  entry.completed = true;
  entry.answers = [...dailyAnswers];
  entry.questions = dailyQuestions.map(q => ({ bookId: q.bookId, question: q.question, bookTitle: q.bookTitle }));
  entry.analysis = analysis;
  entry.score = analysis.totalScore;
  saveData(data);

  renderTodayResult(entry);
}

  const totalDays = entries.length;
  const avgScore = totalDays > 0 ? Math.round(entries.reduce((s,e) => s + (e.score || 0), 0) / totalDays) : 0;

  // Letzte 7 Tage Score-Verlauf
  const last7 = entries.slice(0, 7).reverse();
  const maxScore = 100;
  let chartHtml = "";
  if (last7.length > 0) {
    const barWidth = Math.floor(90 / Math.max(last7.length, 1));
    chartHtml = `<div style="display:flex;align-items:flex-end;gap:4px;height:120px;padding:10px 0">`;
    last7.forEach(e => {
      const h = Math.max((e.score || 0) / maxScore * 100, 5);
      const color = (e.score || 0) >= 70 ? "#22c55e" : (e.score || 0) >= 45 ? "#f59e0b" : "#ef4444";
      const dayLabel = e.date.substring(5);
      chartHtml += `<div style="flex:1;text-align:center">
        <div style="height:${h}px;background:${color};border-radius:6px 6px 0 0;min-height:5px;margin:0 2px"></div>
        <p class="small" style="margin:4px 0 0">${dayLabel}</p>
      </div>`;
    });
    chartHtml += `</div>`;
  }

  // Buch-Gesamtanalyse ueber alle Tage
  const bookTotals = {};
  entries.forEach(e => {
    if (e.analysis && e.analysis.bookScores) {
      Object.keys(e.analysis.bookScores).forEach(bid => {
        if (!bookTotals[bid]) bookTotals[bid] = { scores: [], book: e.analysis.bookScores[bid].book };
        bookTotals[bid].scores.push(...e.analysis.bookScores[bid].scores);
      });
    }
  });

  let bookProgressHtml = "";
  Object.keys(bookTotals).forEach(bid => {
    const bt = bookTotals[bid];
    const avg = Math.round(bt.scores.reduce((a,b)=>a+b,0) / bt.scores.length);
    const color = bt.book.bookColor;
    bookProgressHtml += `<div style="display:flex;align-items:center;gap:8px;margin:6px 0">
      <span style="font-size:12px;color:${color};min-width:110px">${bt.book.bookTitle}</span>

    </div>`;
  });

  // Trend berechnen
  let trendHtml = "";
  if (entries.length >= 2) {
    const recent = entries.slice(0, 3).reduce((s,e) => s + (e.score||0), 0) / Math.min(entries.length, 3);
    const older = entries.slice(3, 6);
    if (older.length > 0) {
      const olderAvg = older.reduce((s,e) => s + (e.score||0), 0) / older.length;

      if (diff > 0) trendHtml = `<span style="color:#22c55e;font-weight:700">+${diff} Punkte</span> vs. letzte Woche`;
      else if (diff < 0) trendHtml = `<span style="color:#ef4444;font-weight:700">${diff} Punkte</span> vs. letzte Woche`;
      else trendHtml = `<span style="color:var(--muted)">Gleichbleibend</span> vs. letzte Woche`;
    }
  }

  const html = `
    <div class="card fade-in">
      <h2>Dein Fortschritt</h2>
      <div class="grid3" style="margin:14px 0">
        <div class="kpi">
          <span class="small">Streak</span>
          <b>${streak} ${streak > 0 ? "🔥" : ""}</b>
        </div>
        <div class="kpi">
          <span class="small">Tage gesamt</span>
          <b>${totalDays}</b>
        </div>
        <div class="kpi">
          <span class="small">Schnitt</span>
          <b>${avgScore}</b>
        </div>
      </div>
      ${trendHtml ? `<p style="text-align:center;font-size:13px">${trendHtml}</p>` : ""}
    </div>

    ${last7.length > 0 ? `
    <div class="card fade-in">
      <h3>Letzte 7 Tage</h3>
      ${chartHtml}
    </div>` : ""}

    ${bookProgressHtml ? `
    <div class="card fade-in">
      <h3>Buch-Fortschritt (Gesamt)</h3>
      <p class="small">Durchschnittliche Scores pro Buch ueber alle Tage</p>
      ${bookProgressHtml}
    </div>` : ""}

    <div class="card fade-in">
      <h3>Level-System</h3>
      <div style="margin:10px 0">
        ${getLevelHtml(totalDays)}
      </div>
    </div>
  `;
  document.getElementById("content").innerHTML = html;
}

function getLevelHtml(days) {
  const levels = [
    { name: "Anfaenger", min: 0, color: "#6b7280" },
    { name: "Erwacht", min: 7, color: "#3b82f6" },
    { name: "Diszipliniert", min: 21, color: "#8b5cf6" },
    { name: "Krieger", min: 50, color: "#f59e0b" },
    { name: "Meister", min: 100, color: "#22c55e" },
    { name: "Maschine", min: 200, color: "#ef4444" },
    { name: "Legende", min: 365, color: "#ec4899" }
  ];

  let currentLevel = levels[0];
  let nextLevel = levels[1];
  for (let i = levels.length - 1; i >= 0; i--) {
    if (days >= levels[i].min) {
      currentLevel = levels[i];
      nextLevel = levels[i+1] || null;
      break;
    }
  }

  let progressToNext = "";
  if (nextLevel) {
    const pct = Math.round((days - currentLevel.min) / (nextLevel.min - currentLevel.min) * 100);
    progressToNext = `
      <div style="margin-top:10px">
        <p class="small">Naechstes Level: <span style="color:${nextLevel.color}">${nextLevel.name}</span> (${nextLevel.min} Tage)</p>
        <div style="height:6px;background:var(--line);border-radius:3px;margin-top:6px">
          <div style="height:6px;background:${currentLevel.color};border-radius:3px;width:${pct}%"></div>
        </div>
        <p class="small" style="margin-top:4px">${days}/${nextLevel.min} Tage</p>
      </div>
    `;
  }

  return `
    <div style="text-align:center">
      <p style="font-size:28px;font-weight:700;color:${currentLevel.color}">${currentLevel.name}</p>
      <p class="small">${days} Tage aktiv</p>
      ${progressToNext}
    </div>
  `;
}

// =========================================================
// HISTORY SCREEN
// =========================================================
function renderHistory() {
  const data = loadData();
  const entries = data.entries.filter(e => e.completed).sort((a,b) => b.date.localeCompare(a.date));

  if (entries.length === 0) {
    document.getElementById("content").innerHTML = `
      <div class="card fade-in">
        <h2>Noch kein Verlauf</h2>
        <p>Beantworte deine ersten 10 Fragen, um deinen Verlauf zu starten.</p>
        <button onclick="showScreen('daily')">Jetzt starten</button>
      </div>
    `;
    return;
  }

  let html = `<div class="card fade-in"><h2>Verlauf</h2><p class="small">${entries.length} Eintraege gesamt</p><div class="hr"></div>`;

  entries.forEach(entry => {
    const score = entry.score || 0;
    const scoreColor = score >= 70 ? "#22c55e" : score >= 45 ? "#f59e0b" : "#ef4444";
    const answered = (entry.answers || []).filter(a => a && a.trim()).length;

    html += `
      <div class="history-entry" onclick="showHistoryDetail('${entry.date}')" style="cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <span class="history-date">${formatDate(entry.date)}</span>
            <p class="small" style="margin:2px 0">${answered}/10 Fragen</p>
          </div>
          <div style="text-align:right">
            <span class="history-score" style="color:${scoreColor}">${score}</span>
            <p class="small">/100</p>
          </div>
        </div>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

function showHistoryDetail(date) {
  const data = loadData();
  const entry = data.entries.find(e => e.date === date);
  if (!entry) return;

  let questionsHtml = "";
  if (entry.questions && entry.answers) {
    entry.questions.forEach((q, i) => {
      const answer = entry.answers[i] || "(nicht beantwortet)";
      questionsHtml += `
        <div style="padding:10px 0;border-bottom:1px solid var(--line)">
          <span class="tag tag-blue" style="font-size:10px">${q.bookTitle || "Buch"}</span>
          <p style="font-size:13px;color:var(--text);margin:6px 0 4px;font-weight:600">${q.question}</p>
          <p style="font-size:13px;color:var(--muted);font-style:italic">${answer}</p>
        </div>
      `;
    });
  }

  const html = `
    <div class="card fade-in">
      <button class="btn-outline btn-sm" onclick="renderHistory()" style="margin-bottom:12px">← Zurueck</button>
      <h2>${formatDate(date)}</h2>
      <p>Score: <span style="font-weight:700;font-size:20px;color:var(--accent)">${entry.score || 0}</span>/100</p>
      <div class="hr"></div>
      ${questionsHtml}
    </div>
  `;
  document.getElementById("content").innerHTML = html;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  const days = ["So","Mo","Di","Mi","Do","Fr","Sa"];
  const months = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  return `${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

// =========================================================
showScreen("daily");
</script>
