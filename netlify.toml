[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Clean URLs
[[redirects]]
  from = "/heal"
  to = "/heal.html"
  status = 200

[[redirects]]
  from = "/heal-en"
  to = "/heal-en.html"
  status = 200

[[redirects]]
  from = "/heal-ultra"
  to = "/heal-ultra.html"
  status = 200

[[redirects]]
  from = "/portal"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/musik"
  to = "/musik.html"
  status = 200

[[redirects]]
  from = "/ostern"
  to = "/ostern.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/impressum"
  to = "/impressum.html"
  status = 200

[[redirects]]
  from = "/datenschutz"
  to = "/impressum.html"
  status = 200

# Block setup page in production
[[redirects]]
  from = "/setup-supabase"
  to = "/setup-supabase.html"
  status = 200

[[redirects]]
  from = "/live"
  to = "/live.html"
  status = 200

[[redirects]]
  from = "/bot-admin"
  to = "/bot-admin.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
