<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#030308">
<meta name="robots" content="noindex,nofollow">
<title>VOSS COMMAND CENTER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#030308;--surface:#0a0a14;--border:#1a1a2e;--cyan:#00f0ff;--pink:#ff2d8e;--green:#2dffa8;--gold:#c9a84c;--purple:#a855f7;--red:#ff4444;--text:#e0ddd4;--dim:#666680}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace}
::selection{background:var(--cyan);color:var(--bg)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
a{text-decoration:none;color:var(--cyan)}
.scanline{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.12;z-index:9999;animation:scan 5s linear infinite;pointer-events:none}
@keyframes scan{0%{top:-2px}100%{top:100vh}}
.wrap{max-width:800px;margin:0 auto;padding:40px 20px 80px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(14px,3vw,22px);letter-spacing:3px;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.back{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--dim);letter-spacing:2px;padding:6px 12px;border:1px solid var(--border);cursor:pointer;transition:all .3s}
.back:hover{border-color:var(--cyan);color:var(--cyan)}
h1{font-family:'Orbitron',sans-serif;font-size:clamp(18px,4vw,28px);letter-spacing:2px;margin-bottom:8px}
h2{font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:2px;color:var(--cyan);margin:24px 0 12px;text-transform:uppercase}
.sub{font-size:11px;color:var(--dim);letter-spacing:1px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);padding:20px;margin-bottom:12px;position:relative;cursor:pointer;transition:all .25s}
.card:hover{border-color:var(--cyan);transform:translateY(-2px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cyan);opacity:.3}
.card-static{cursor:default;transform:none}.card-static:hover{transform:none}
label{display:block;font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
input[type="text"],textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:14px;padding:12px 16px;outline:none;transition:border-color .3s}
input:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,240,255,.1)}
textarea{resize:vertical;min-height:80px}
.btn{display:block;width:100%;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:14px;border:none;cursor:pointer;transition:all .3s;text-align:center;margin-top:12px}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:var(--bg);font-weight:700}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,240,255,.3)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--dim);font-size:11px;padding:10px}
.btn-outline:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-green{background:linear-gradient(135deg,var(--green),#0a9);color:var(--bg);font-weight:700}
.btn-sm{width:auto;display:inline-block;padding:8px 16px;font-size:10px;margin:4px}
.p-card{display:flex;align-items:center;justify-content:space-between;padding:16px 20px}
.p-name{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px}
.p-meta{font-size:11px;color:var(--dim)}
.p-count{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--cyan)}
.file-drop{border:2px dashed var(--border);padding:30px 20px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:12px}
.file-drop:hover,.file-drop.dragover{border-color:var(--cyan);background:rgba(0,240,255,.03)}
.file-drop input{display:none}
.file-drop .fn{font-size:13px;color:var(--green);margin-top:8px;display:none}
.voss-msg{background:rgba(45,255,168,.05);border:2px solid rgba(45,255,168,.3);padding:20px;margin:12px 0;position:relative}
.voss-msg pre{font-family:'Space Mono',monospace;font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;word-wrap:break-word;margin:0}
.voss-label{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--green);letter-spacing:2px;margin-bottom:10px}
.copy-btn{margin-top:12px;padding:10px;background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;cursor:pointer;width:100%;transition:all .3s}
.copy-btn:hover{border-color:var(--green);color:var(--green)}
.chat-bubble{padding:10px 14px;margin:6px 0;border-radius:12px;font-size:12px;line-height:1.5;max-width:85%}
.chat-t{background:rgba(0,240,255,.08);border:1px solid rgba(0,240,255,.2);margin-left:auto;text-align:right}
.chat-p{background:rgba(255,45,142,.05);border:1px solid rgba(255,45,142,.15)}
.chat-ts{font-size:9px;color:var(--dim);margin-top:2px}
.hr{height:1px;background:var(--border);margin:20px 0}
.hidden{display:none}
.screenshots{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin:12px 0}
.screenshots img{width:100%;border:1px solid var(--border);cursor:pointer;transition:all .3s}
.screenshots img:hover{border-color:var(--cyan);transform:scale(1.02)}
.ocr-status{font-size:11px;color:var(--gold);margin:8px 0;padding:8px 12px;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.2)}
.ocr-text{font-size:11px;color:var(--dim);background:var(--bg);border:1px solid var(--border);padding:10px;margin:8px 0;max-height:150px;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word}
.screenshot-wrap{position:relative}
.screenshot-wrap .ocr-badge{position:absolute;top:4px;right:4px;font-size:8px;background:var(--green);color:var(--bg);padding:2px 4px;font-family:'Orbitron',sans-serif;letter-spacing:1px}
.img-modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:10000;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-modal img{max-width:95%;max-height:95%;object-fit:contain}
.type-badge{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:2px;margin-left:8px}
.type-voss{background:rgba(0,240,255,.15);color:var(--cyan);border:1px solid rgba(0,240,255,.3)}
.type-rollo{background:rgba(255,45,142,.15);color:var(--pink);border:1px solid rgba(255,45,142,.3)}
.rollo-msg{background:rgba(255,45,142,.05);border:2px solid rgba(255,45,142,.3);padding:20px;margin:12px 0}
.rollo-msg pre{font-family:'Space Mono',monospace;font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;word-wrap:break-word;margin:0}
.rollo-label{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--pink);letter-spacing:2px;margin-bottom:10px}
@media(max-width:600px){.wrap{padding:24px 12px 60px}.card{padding:16px}.p-card{padding:12px 16px}.screenshots{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="wrap">
  <div class="header">
    <div class="logo">VOSS COMMAND CENTER</div>
    <a href="/archive" class="back">ARCHIVE</a>
  </div>
  <div id="app"></div>
</div>
<script>
(function(){
const $=id=>document.getElementById(id);
const app=$('app');
const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';

// ─── Storage ───
function getPatients(){try{return JSON.parse(localStorage.getItem('voss_patients')||'[]')}catch(e){return[]}}
function savePatients(p){localStorage.setItem('voss_patients',JSON.stringify(p))}
function getPatient(id){return getPatients().find(p=>p.id===id)}
function updatePatient(id,fn){const ps=getPatients();const i=ps.findIndex(p=>p.id===id);if(i>=0){fn(ps[i]);savePatients(ps)}}

// ─── WhatsApp Parser ───
function parseWA(raw){
  const pats=[/^\[(\d{1,2}\.\d{1,2}\.\d{2,4},\s*\d{1,2}:\d{2}(?::\d{2})?)\]\s*([^:]+):\s*(.+)/s,/^(\d{1,2}\.\d{1,2}\.\d{2,4},\s*\d{1,2}:\d{2})\s*-\s*([^:]+):\s*(.+)/s,/^(\d{1,2}\/\d{1,2}\/\d{2,4},\s*\d{1,2}:\d{2})\s*-\s*([^:]+):\s*(.+)/s];
  const msgs=[];let cur=null;
  for(const line of raw.split('\n')){let ok=false;for(const p of pats){const m=line.trim().match(p);if(m){if(cur)msgs.push(cur);cur={ts:m[1].trim(),sender:m[2].trim(),text:m[3].trim()};ok=true;break}}if(!ok&&cur&&line.trim())cur.text+='\n'+line.trim()}
  if(cur)msgs.push(cur);return msgs;
}

// ─── CHRIS VOSS RESPONSE GENERATOR ───
function generateVossResponse(lastMsgs, patientName, myName, history){
  const last5=lastMsgs.slice(-10);
  const patientMsgs=last5.filter(m=>!m.sender.toLowerCase().includes(myName.toLowerCase()));
  const lastP=patientMsgs.slice(-3);
  if(!lastP.length) return{main:'Kein Patientenkontext gefunden.',followUp:'',price:''};

  const lastText=lastP.map(m=>m.text).join(' ');
  const lt=lastText.toLowerCase();
  const pFirst=patientName.split(' ')[0];

  // Detect context
  const pain=lt.match(/schmerz|weh|aua|tut|sticht|brennt|zieht|druck|verspann|blockier|steif|rueck|nacken|kopf|knie|hueft|schulter/);
  const fear=lt.match(/angst|sorge|panik|furcht|unwohl|unsicher|nervoes|nerv|angespannt/);
  const sleep=lt.match(/schlaf|muede|müde|wach|nacht|ruh|erhol|energie|erschoepf|erschöpf/);
  const stress=lt.match(/stress|druck|ueber|über|viel|schaff|anstreng|belast|hektisch/);
  const positive=lt.match(/besser|gut|freue|schoen|schön|toll|super|fortschritt|geschafft|klappt|hilft|leichter/);
  const frust=lt.match(/frust|genervt|satt|reicht|bringt nichts|sinnlos|aufgeben|keine lust|hoffnung|schlimm/);
  const question=lt.match(/\?/);
  const short=lastText.length<50;
  const long=lastText.length>200;

  // Extract patient's key words for mirroring
  const keywords=lastText.split(/\s+/).filter(w=>w.length>4).slice(-5);
  const mirror=keywords.length?keywords[Math.floor(Math.random()*keywords.length)]:'';

  let parts=[];

  // ─── SCHRITT 1: MIRROR (letzte Worte wiederholen) ───
  if(mirror&&lastP.length){
    const lastSentence=lastP[lastP.length-1].text;
    const lastWords=lastSentence.trim().split(/\s+/).slice(-3).join(' ');
    if(lastWords.length>5) parts.push(lastWords+'...?');
  }

  // ─── SCHRITT 2: LABEL (Emotion benennen) ───
  if(pain){
    parts.push('Es klingt so, als ob das nicht nur koerperlich ist. Als ob der Schmerz dir etwas wegnimmt — vielleicht mehr als du zugeben moechtest.');
  }else if(frust){
    parts.push('Es klingt so, als ob du nicht nur frustriert bist wegen der Situation — sondern muede davon, immer wieder zu hoffen und dann enttaeuscht zu werden.');
  }else if(fear){
    parts.push('Es scheint, als ob da etwas ist, das dich innerlich nicht loslasst. Etwas, das staerker ist als das, was man von aussen sieht.');
  }else if(sleep){
    parts.push('Es klingt so, als ob die Nacht nicht mehr das ist, was sie sein sollte — eine Pause. Sondern eher ein weiterer Kampf.');
  }else if(positive){
    parts.push('Ich hoere da etwas, das du vielleicht selbst noch gar nicht ganz realisierst — eine echte Veraenderung. Nicht nur ein guter Tag, sondern ein Shift.');
  }else if(stress){
    parts.push('Es klingt so, als ob du gerade mehr traegst als eine Person tragen sollte. Und trotzdem machst du weiter. Das sagt viel ueber dich aus.');
  }else if(short){
    parts.push('Ich merke, dass du gerade nicht viel sagst. Manchmal steckt hinter kurzen Antworten mehr als hinter langen.');
  }else{
    parts.push('Ich hoere, was du sagst. Und ich hoere auch, was du NICHT sagst. Beides ist wichtig.');
  }

  // ─── SCHRITT 3: AKKUSATIONS-AUDIT ───
  if(frust||short){
    parts.push('');
    parts.push('Du denkst jetzt vielleicht: "Der sagt das auch nur so." Oder: "Bringt eh nichts." Und ehrlich — ich kann verstehen warum. Du hast wahrscheinlich schon alles gehoert.');
  }else if(pain){
    parts.push('');
    parts.push('Vielleicht denkst du, dass ich gar nicht nachvollziehen kann, wie sich das anfuehlt. Und damit hast du recht — ich kann es nicht fuehlen. Aber ich kann zuhoeren. Richtig zuhoeren.');
  }

  // ─── SCHRITT 4: KALIBRIERTE FRAGE ───
  parts.push('');
  if(pain){
    parts.push('Was muesste passieren, damit du morgen aufwachst und sagst: "Heute ist es anders"? Nicht perfekt — aber ANDERS.');
  }else if(frust){
    parts.push('Was waere der kleinste Schritt, bei dem du sagen wuerdest: "Okay, vielleicht lohnt es sich doch noch"?');
  }else if(positive){
    parts.push('Was genau hat sich veraendert? Nicht die Situation — sondern DU. Was machst du jetzt anders als vor 4 Wochen?');
  }else if(fear){
    parts.push('Wenn du dir vorstellst, dass die Angst weg waere — was wuerdest du als Erstes tun? Was traust du dir gerade nicht?');
  }else if(sleep){
    parts.push('Was glaubst du — was haelt dich wirklich wach? Nicht die offensichtliche Antwort. Die dahinter.');
  }else if(question){
    parts.push('Bevor ich dir darauf antworte — was ist DEIN Gefuehl dabei? Was sagt dein Bauch?');
  }else{
    parts.push('Was ist die eine Sache, die du mir noch nicht gesagt hast — nicht weil es ein Geheimnis ist, sondern weil du dachtest, es ist nicht wichtig genug?');
  }

  // Build main message
  const main=parts.join('\n');

  // Follow-Up (24h)
  const followUp='Hey '+pFirst+', ich wollte nicht draengen — aber du gehst mir nicht aus dem Kopf. Wenn jetzt nicht der richtige Moment ist, ist das okay. Ich bin da.';

  // Price Script
  const price='Ich verstehe, dass das eine Investition ist. Und ich wuerde dir nie sagen, du MUSST das machen.\n\nWas ich dich fragen will: Was kostet es dich, wenn sich NICHTS aendert? Nicht in Euro — sondern in Schlaf, in Energie, in Lebensqualitaet. In den Momenten, die du verpasst.\n\nWaere es schlimm, wenn wir es einfach mal versuchen?';

  return{main,followUp,price};
}

// ─── ROLLO TOMASSI RESPONSE GENERATOR ───
function generateRolloResponse(lastMsgs, contactName, myName){
  const patientMsgs=lastMsgs.filter(m=>!m.sender.toLowerCase().includes(myName.toLowerCase())).slice(-5);
  if(!patientMsgs.length) return{main:'Kein Kontext gefunden.',followUp:'',frame:''};
  const lastText=patientMsgs.map(m=>m.text).join(' ');
  const lt=lastText.toLowerCase();
  const cFirst=contactName.split(' ')[0];
  const short=lastText.length<50;

  // Detect context
  const flaky=lt.match(/vielleicht|mal schauen|weiss nicht|keine zeit|spaeter|busy|stress|geht nicht|kann nicht|muss schauen/);
  const interested=lt.match(/ja|klar|gerne|okay|wann|wo|freue|lust|cool|nice|super|unbedingt/);
  const testing=lt.match(/warum|wieso|denkst du|findest du|meinst du|glaubst du|sicher|wirklich|ernst/);
  const emotional=lt.match(/vermiss|denke an|fuehl|mag dich|lieb|sehnsucht|traurig|einsam|brauche/);
  const disrespect=lt.match(/egal|whatever|nerv|lass mich|geh weg|kein bock|interessiert mich nicht|lol|haha ok/);
  const question=lt.match(/\?/);

  // Extract last words for mirroring
  const lastSentence=patientMsgs[patientMsgs.length-1].text;

  let parts=[];

  // ─── IRON RULE: Frame Control ───
  if(disrespect){
    // Iron Rule #1: Frame is everything
    parts.push('Alles klar.');
    parts.push('');
    parts.push('Ich investiere meine Zeit nur in Menschen, die das auch zu schaetzen wissen. Kein Vorwurf — nur Klarheit.');
    // No follow-up. Abundance.
    return{main:parts.join('\n'),followUp:'[KEIN FOLLOW-UP. Abundance Mentality. Du schreibst nicht nochmal. Wenn sie will, kommt sie.]',frame:'IRON RULE #1 — Frame. Du kontrollierst den Frame oder du verlierst ihn. Hier wurde dein Frame getestet. Die einzig richtige Antwort: Rueckzug mit Wuerde. Kein Erklaeren, kein Rechtfertigen.'};
  }

  if(flaky){
    // Iron Rule #3: Any pursuit must be on your terms
    parts.push('Kein Stress.');
    parts.push('');
    parts.push('Ich hab diese Woche eh einiges vor. Wenn du Zeit hast, meld dich. Wenn nicht — auch gut.');
    return{main:parts.join('\n'),followUp:'[KEIN FOLLOW-UP. Wer "vielleicht" sagt, sagt nein. Naechste.]',frame:'IRON RULE #3 — Immer zu deinen Bedingungen. "Vielleicht" ist ein Nein. Abundance Mentality: Du hast Optionen. Zeig das durch Gleichgueltigkeit, nicht durch Worte.'};
  }

  if(emotional){
    // Don't mirror emotion. Stay grounded.
    parts.push('Ich hoere dich.');
    parts.push('');
    parts.push('Aber ich sage dir was — Gefuehle sind Momentaufnahmen. Was zaehlt ist, was du TUST. Nicht was du fuehlst.');
    parts.push('');
    parts.push('Was willst du konkret? Nicht was du fuehlst — was du WILLST.');
    return{main:parts.join('\n'),followUp:'[Warte 48h. Wenn sie schreibt: kurz, warm, aber nicht emotional. Frame halten.]',frame:'ROLLO RULE: Emotionale Kongruenz ist eine Falle. Wenn du emotional reagierst, verlierst du den Frame. Bleib rational. Sei der Fels, nicht die Welle.'};
  }

  if(testing){
    // Shit test / fitness test
    parts.push('Interessante Frage.');
    parts.push('');
    if(lt.includes('wirklich')||lt.includes('ernst')){
      parts.push('Du kennst mich. Ich sage was ich meine. Und ich meine was ich sage.');
    }else{
      parts.push('Aber die bessere Frage waere: Was denkst DU? Ich bin nicht hier um dich zu ueberzeugen.');
    }
    return{main:parts.join('\n'),followUp:'[Kein Follow-Up nach Shit-Tests. Bestanden = Anziehung steigt. Durchgefallen = Attraction sinkt.]',frame:'SHIT TEST ERKANNT. Rollo: "Frauen testen deinen Frame unbewusst. Die richtige Antwort ist nie Erklaerung. Sondern: Amused Mastery oder Agree & Amplify."'};
  }

  if(interested){
    // IOI (Indicator of Interest) — but don't overinvest
    parts.push('Gut.');
    parts.push('');
    if(lt.includes('wann')||lt.includes('wo')){
      parts.push('Donnerstag, 19 Uhr. Ich schick dir die Location.');
    }else{
      parts.push('Ich hab '+['Donnerstag','Freitag','Samstag'][Math.floor(Math.random()*3)]+' was frei. Passt dir das?');
    }
    return{main:parts.join('\n'),followUp:'[Wenn keine Antwort in 24h: Einmal nachfragen, dann next. "Hey, brauch ne Antwort bis heute Abend — sonst verplan ich den Abend anders."]',frame:'IOI ERKANNT. Rollo: "Setze den Termin. Sei direkt. Keine Optionen geben — du gibst den Rahmen vor. Wer fragt hat den Frame."'};
  }

  if(short){
    // Low effort message — match energy or less
    parts.push('.');
    return{main:'👍',followUp:'[Match die Energie. Kurze Antwort = kurze Antwort. Investiere nie mehr als sie.]',frame:'LOW EFFORT erkannt. Iron Rule #4: "Never invest more than she does." Ein Emoji oder ein Wort. Mehr nicht. Wer mehr investiert, verliert.'};
  }

  // Default: Outcome Independence
  if(question){
    parts.push('Gute Frage.');
    parts.push('');
    parts.push('Aber ich geb dir keine Antwort die du hoeren willst. Ich geb dir die Wahrheit.');
    parts.push('');
    parts.push('Lass uns das bei nem Kaffee besprechen. Face to face. Nicht ueber Text.');
  }else{
    parts.push('Verstehe.');
    parts.push('');
    parts.push('Ich sag dir was ich denke, wenn wir uns sehen. Manche Dinge gehoeren nicht in eine Textnachricht.');
  }

  return{main:parts.join('\n'),followUp:'[48h Regel. Nicht vorher schreiben. Wenn sie nicht schreibt — hat sie sich disqualifiziert. Naechste.]',frame:'OUTCOME INDEPENDENCE. Rollo: "Der Mann der bereit ist wegzugehen, hat die meiste Macht." Zeig durch dein Verhalten, nicht durch Worte.'};
}

// ─── VIEWS ───
function renderDashboard(){
  const all=getPatients();
  const patients=all.filter(p=>p.type!=='rollo');
  const contacts=all.filter(p=>p.type==='rollo');

  function makeCards(list){
    if(!list.length) return '<div class="card card-static" style="text-align:center;padding:24px"><p style="color:var(--dim)">Noch keine Eintraege.</p></div>';
    return list.map(p=>{
      const uploads=p.uploads||[];const screenshots=p.screenshots||[];
      const lastDate=uploads.length?uploads[uploads.length-1].date:'—';
      const badge=p.type==='rollo'?'<span class="type-badge type-rollo">ROLLO</span>':'<span class="type-badge type-voss">VOSS</span>';
      return '<div class="card p-card" onclick="openPatient(\''+p.id+'\')"><div><div class="p-name">'+esc(p.name)+badge+'</div><div class="p-meta">Uploads: '+uploads.length+' · Screenshots: '+screenshots.length+' · Letzter: '+lastDate+'</div></div><div class="p-count">'+uploads.length+'</div></div>';
    }).join('');
  }

  app.innerHTML='<h1>Command Center</h1><div class="sub">PATIENTEN = CHRIS VOSS · KONTAKTE = ROLLO TOMASSI</div>'
    +'<h2 style="color:var(--cyan)">Patienten (Chris Voss)</h2>'+makeCards(patients)
    +'<h2 style="color:var(--pink)">Kontakte (Rollo Tomassi)</h2>'+makeCards(contacts)
    +'<div class="hr"></div><h2>Neue Akte anlegen</h2><div class="card card-static">'
    +'<label>Name</label><input type="text" id="new-name" placeholder="z.B. Bettina Breiteneder">'
    +'<label style="margin-top:12px">Dein Name im Chat</label><input type="text" id="my-name" placeholder="z.B. THETOYSAREOUT oder Zeis" value="'+(localStorage.getItem('voss_my_name')||'')+'">'
    +'<label style="margin-top:12px">Typ</label><div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-sm btn-primary" id="type-voss-btn" onclick="setType(\'voss\')" style="flex:1">PATIENT (Voss)</button><button class="btn btn-sm btn-outline" id="type-rollo-btn" onclick="setType(\'rollo\')" style="flex:1">KONTAKT (Rollo)</button></div>'
    +'<button class="btn btn-primary" onclick="addPatient()">AKTE ANLEGEN</button></div>';
}
let newType='voss';
window.setType=function(t){
  newType=t;
  const vb=document.getElementById('type-voss-btn'),rb=document.getElementById('type-rollo-btn');
  if(t==='voss'){vb.className='btn btn-sm btn-primary';rb.className='btn btn-sm btn-outline'}
  else{rb.className='btn btn-sm btn-primary';vb.className='btn btn-sm btn-outline';rb.style.background='linear-gradient(135deg,var(--pink),var(--purple))'}
};
window.openPatient=function(id){renderPatientView(id)};

function renderPatientView(id){
  const p=getPatient(id);
  if(!p){renderDashboard();return}
  const uploads=p.uploads||[];
  const myName=p.myName||localStorage.getItem('voss_my_name')||'';

  // Last messages display
  let chatHTML='';
  let vossHTML='';
  // Merge chat messages + OCR screenshot texts for full context
  let allMessages=p.lastMessages?[...p.lastMessages]:[];
  const scrTexts=p.screenshotTexts||[];
  if(scrTexts.length){
    scrTexts.forEach(st=>{
      allMessages.push({ts:st.date,sender:p.name+' (Screenshot)',text:st.text});
    });
  }

  if(allMessages.length){
    const last10=(p.lastMessages||[]).slice(-10);
    chatHTML='<h2>Letzte Nachrichten</h2>';
    chatHTML+=last10.map(m=>{
      const isMe=myName&&m.sender.toLowerCase().includes(myName.toLowerCase());
      return '<div class="chat-bubble '+(isMe?'chat-t':'chat-p')+'">'+esc(m.text)+'<div class="chat-ts">'+esc(m.sender)+' — '+esc(m.ts)+'</div></div>';
    }).join('');

    if(p.type==='rollo'){
      const rollo=generateRolloResponse(allMessages,p.name,myName);
      // ROLLO TOMASSI MODE
      const rollo=generateRolloResponse(allMessages,p.name,myName);
      vossHTML='<h2 style="color:var(--pink)">ROLLO TOMASSI ANTWORTET</h2><div class="rollo-msg"><div class="rollo-label">DEINE NAECHSTE NACHRICHT — 1:1 SENDEN</div><pre id="voss-main">'+esc(rollo.main)+'</pre><button class="copy-btn" onclick="copyText(\'voss-main\')">KOPIEREN</button></div>';
      vossHTML+='<h2 style="color:var(--pink)">FOLLOW-UP STRATEGIE</h2><div class="rollo-msg"><div class="rollo-label">FOLLOW-UP REGEL</div><pre id="voss-follow">'+esc(rollo.followUp)+'</pre></div>';
      vossHTML+='<h2 style="color:var(--pink)">FRAME-ANALYSE</h2><div class="rollo-msg"><div class="rollo-label">IRON RULE</div><pre id="voss-frame">'+esc(rollo.frame)+'</pre></div>';
    }else{
      // CHRIS VOSS MODE
      const voss=generateVossResponse(allMessages,p.name,myName,uploads);
      vossHTML='<h2 style="color:var(--green)">CHRIS VOSS ANTWORTET</h2><div class="voss-msg"><div class="voss-label">DEINE NAECHSTE NACHRICHT — 1:1 SENDEN</div><pre id="voss-main">'+esc(voss.main)+'</pre><button class="copy-btn" onclick="copyText(\'voss-main\')">KOPIEREN</button></div>';
      vossHTML+='<h2 style="color:var(--gold)">FOLLOW-UP (24h keine Antwort)</h2><div class="voss-msg" style="border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.03)"><div class="voss-label" style="color:var(--gold)">FOLLOW-UP</div><pre id="voss-follow">'+esc(voss.followUp)+'</pre><button class="copy-btn" onclick="copyText(\'voss-follow\')">KOPIEREN</button></div>';
      vossHTML+='<h2 style="color:var(--gold)">PREIS-GESPRAECH</h2><div class="voss-msg" style="border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.03)"><div class="voss-label" style="color:var(--gold)">PREIS SCRIPT</div><pre id="voss-price">'+esc(voss.price)+'</pre><button class="copy-btn" onclick="copyText(\'voss-price\')">KOPIEREN</button></div>';
    }
  }

  // Upload history
  let histHTML='';
  if(uploads.length){
    histHTML='<h2>Upload-Verlauf</h2>'+uploads.map((u,i)=>'<div class="card card-static" style="padding:12px 16px;cursor:default"><div style="display:flex;justify-content:space-between"><span style="font-size:12px">'+esc(u.date)+'</span><span style="font-size:11px;color:var(--dim)">'+u.msgCount+' Nachrichten</span></div></div>').join('');
  }

  const typeBadge=p.type==='rollo'?'<span class="type-badge type-rollo">ROLLO</span>':'<span class="type-badge type-voss">VOSS</span>';
  const analyzeLabel=p.type==='rollo'?'ROLLO ANTWORTET':'VOSS ANTWORTET';

  // Screenshots gallery with OCR text
  let screenshotHTML='';
  const screenshots=p.screenshots||[];
  const ocrTexts=p.ocrTexts||[];
  if(screenshots.length){
    screenshotHTML='<h2>Screenshots ('+screenshots.length+')</h2><div class="screenshots">'+screenshots.map((s,i)=>{
      const hasOcr=ocrTexts[i]&&ocrTexts[i].length>5;
      return '<div class="screenshot-wrap"><img src="'+s+'" onclick="showImg(\''+i+'\',\''+id+'\')" alt="Screenshot '+(i+1)+'">'+(hasOcr?'<div class="ocr-badge">OCR</div>':'')+'</div>';
    }).join('')+'</div>';
    // Show combined OCR text
    const allOcr=ocrTexts.filter(t=>t&&t.length>5).join('\n---\n');
    if(allOcr){
      screenshotHTML+='<h2>Erkannter Text aus Screenshots</h2><div class="ocr-text">'+esc(allOcr)+'</div>';
    }
  }

  app.innerHTML='<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><span class="back" onclick="renderDashboard()">← ZURUECK</span><h1 style="margin:0">'+esc(p.name)+typeBadge+'</h1></div>'
    +'<div class="card card-static"><label>Chat-Verlauf hochladen (.txt / .zip)</label><div class="file-drop" id="file-drop"><div style="font-size:28px;margin-bottom:8px">📄</div><div style="font-size:11px;color:var(--dim)">Datei ablegen oder klicken</div><div class="fn" id="fn"></div><input type="file" id="fi" accept=".txt,.csv,.text,.zip"></div><button class="btn btn-green" id="upload-btn" disabled onclick="processUpload(\''+id+'\')">ANALYSIEREN — '+analyzeLabel+'</button></div>'
    +'<div class="card card-static"><label>Screenshots hochladen (Bilder)</label><div class="file-drop" id="img-drop"><div style="font-size:28px;margin-bottom:8px">📸</div><div style="font-size:11px;color:var(--dim)">Bilder ablegen oder klicken (mehrere moeglich)</div><input type="file" id="img-input" accept="image/*" multiple></div></div>'
    +vossHTML+chatHTML+screenshotHTML+'<div class="hr"></div>'+histHTML
    +'<div class="hr"></div><button class="btn btn-outline" onclick="if(confirm(\'Akte loeschen?\'))deletePatient(\''+id+'\')">AKTE LOESCHEN</button>';

  // File handling
  setupFileHandling(id);
  // Screenshot handling
  const imgDrop=$('img-drop'),imgInput=$('img-input');
  if(imgDrop){
    imgDrop.addEventListener('click',()=>imgInput.click());
    imgDrop.addEventListener('dragover',e=>{e.preventDefault();imgDrop.classList.add('dragover')});
    imgDrop.addEventListener('dragleave',()=>imgDrop.classList.remove('dragover'));
    imgDrop.addEventListener('drop',e=>{e.preventDefault();imgDrop.classList.remove('dragover');handleImages(e.dataTransfer.files,id)});
    imgInput.addEventListener('change',()=>handleImages(imgInput.files,id));
  }
}

async function handleImages(files,patientId){
  const fileArr=Array.from(files).filter(f=>f.type.startsWith('image/'));
  if(!fileArr.length)return;

  // Show OCR status
  const statusEl=document.createElement('div');
  statusEl.className='ocr-status';
  statusEl.textContent='Screenshots werden verarbeitet + Text wird erkannt...';
  const imgDrop=document.getElementById('img-drop');
  if(imgDrop)imgDrop.parentElement.appendChild(statusEl);

  for(let fi=0;fi<fileArr.length;fi++){
    const file=fileArr[fi];
    statusEl.textContent='Bild '+(fi+1)+'/'+fileArr.length+': Komprimiere...';

    // Compress image
    const compressed=await new Promise(resolve=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const maxW=800;const scale=Math.min(1,maxW/img.width);
        canvas.width=img.width*scale;canvas.height=img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',0.7));
      };
      img.src=URL.createObjectURL(file);
    });

    // Run OCR
    statusEl.textContent='Bild '+(fi+1)+'/'+fileArr.length+': OCR Texterkennung laeuft...';
    let ocrText='';
    try{
      const result=await Tesseract.recognize(compressed,'deu',{logger:m=>{
        if(m.status==='recognizing text')statusEl.textContent='Bild '+(fi+1)+'/'+fileArr.length+': OCR '+Math.round((m.progress||0)*100)+'%';
      }});
      ocrText=(result.data.text||'').trim();
    }catch(e){
      console.warn('OCR failed:',e);
      ocrText='';
    }

    // Save screenshot + OCR text
    updatePatient(patientId,p=>{
      if(!p.screenshots)p.screenshots=[];
      if(!p.ocrTexts)p.ocrTexts=[];
      if(p.screenshots.length>=50){p.screenshots.shift();p.ocrTexts.shift()}
      p.screenshots.push(compressed);
      p.ocrTexts.push(ocrText);
      // Also feed OCR text into lastMessages as pseudo-messages
      if(ocrText.length>10){
        if(!p.screenshotTexts)p.screenshotTexts=[];
        p.screenshotTexts.push({date:new Date().toISOString().slice(0,10),text:ocrText});
      }
    });
  }

  statusEl.textContent='Fertig! '+fileArr.length+' Screenshot(s) verarbeitet.';
  setTimeout(()=>{renderPatientView(patientId)},800);
}

window.showImg=function(idx,patientId){
  const p=getPatient(patientId);
  if(!p)return;
  const src=p.screenshots[idx];
  const ocrText=(p.ocrTexts||[])[idx]||'';
  const modal=document.createElement('div');
  modal.className='img-modal';
  modal.innerHTML='<div style="text-align:center;max-width:95%;max-height:95%"><img src="'+src+'" style="max-width:100%;max-height:80vh;object-fit:contain">'
    +(ocrText.length>5?'<div style="margin-top:12px;padding:12px;background:rgba(0,0,0,.8);font-size:11px;color:var(--text);max-height:20vh;overflow-y:auto;text-align:left;white-space:pre-wrap">'+esc(ocrText)+'</div>':'')+'</div>';
  modal.onclick=e=>{if(e.target===modal)modal.remove()};
  document.body.appendChild(modal);
};

let pendingChat='';
function setupFileHandling(patientId){
  const drop=$('file-drop'),fi=$('fi'),fn=$('fn'),btn=$('upload-btn');
  if(!drop)return;
  drop.addEventListener('click',()=>fi.click());
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('dragover')});
  drop.addEventListener('dragleave',()=>drop.classList.remove('dragover'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('dragover');if(e.dataTransfer.files.length)loadFile(e.dataTransfer.files[0])});
  fi.addEventListener('change',()=>{if(fi.files.length)loadFile(fi.files[0])});

  async function loadFile(file){
    if(file.name.toLowerCase().endsWith('.zip')){
      try{const zip=await JSZip.loadAsync(file);let txt=null;zip.forEach((p,e)=>{if(!e.dir&&p.toLowerCase().endsWith('.txt'))txt=e});if(!txt){alert('Keine .txt in ZIP');return}pendingChat=await txt.async('string');fn.textContent=file.name;fn.style.display='block';btn.disabled=false}catch(e){alert('ZIP Fehler: '+e.message)}
    }else{
      pendingChat=await new Promise((r,j)=>{const f=new FileReader();f.onload=e=>r(e.target.result);f.onerror=j;f.readAsText(file,'UTF-8')});
      fn.textContent=file.name;fn.style.display='block';btn.disabled=false;
    }
  }
}

window.processUpload=function(id){
  const msgs=parseWA(pendingChat);
  if(!msgs.length){alert('Keine Nachrichten erkannt.');return}
  const p=getPatient(id);
  const myName=p.myName||localStorage.getItem('voss_my_name')||'';
  const now=new Date().toISOString().slice(0,10);

  updatePatient(id,pat=>{
    if(!pat.uploads)pat.uploads=[];
    pat.uploads.push({date:now,msgCount:msgs.length});
    pat.lastMessages=msgs.slice(-30); // store last 30 for context
  });

  pendingChat='';
  renderPatientView(id);
};

window.addPatient=function(){
  const name=$('new-name').value.trim();
  const myName=$('my-name').value.trim();
  if(!name){alert('Name eingeben');return}
  if(myName)localStorage.setItem('voss_my_name',myName);
  const ps=getPatients();
  const id='p_'+Date.now();
  ps.push({id,name,myName,type:newType,uploads:[],lastMessages:[],screenshots:[]});
  savePatients(ps);
  renderDashboard();
};

window.deletePatient=function(id){
  const ps=getPatients().filter(p=>p.id!==id);
  savePatients(ps);
  renderDashboard();
};

window.copyText=function(elId){
  const el=document.getElementById(elId);
  if(el){navigator.clipboard.writeText(el.textContent);const btns=el.parentElement.querySelectorAll('.copy-btn');btns.forEach(b=>{b.textContent='KOPIERT!';b.style.borderColor='var(--green)';b.style.color='var(--green)';setTimeout(()=>{b.textContent='KOPIEREN';b.style.borderColor='';b.style.color=''},2000)})}
};

// ─── INIT ───
renderDashboard();
})();
</script>
