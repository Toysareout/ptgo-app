<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#030308">
<meta name="robots" content="noindex,nofollow">
<title>NEURAL OS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020208;--surface:rgba(10,10,20,.8);--border:rgba(0,240,255,.12);--cyan:#00f0ff;--pink:#ff2d8e;--green:#2dffa8;--gold:#c9a84c;--purple:#a855f7;--red:#ff4444;--text:#e0ddd4;--dim:#555570}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;overflow-x:hidden}
::selection{background:var(--cyan);color:var(--bg)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border)}

/* AMBIENT */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,240,255,.04) 0%,transparent 70%);pointer-events:none;z-index:0}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,240,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.scanline{position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.2;z-index:9999;animation:scan 3s linear infinite;pointer-events:none}
@keyframes scan{0%{top:-1px}100%{top:100vh}}

.wrap{max-width:800px;margin:0 auto;padding:20px 16px 80px;position:relative;z-index:1}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:18px;letter-spacing:6px}
.logo span{background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-left:8px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(45,255,168,.4)}50%{box-shadow:0 0 0 8px rgba(45,255,168,0)}}

/* DECODER */
.decoder{background:var(--surface);border:1px solid var(--border);padding:20px;margin:12px 0;backdrop-filter:blur(10px)}
.decoder-title{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:var(--cyan);margin-bottom:12px}
.decode-input{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:14px;padding:14px;outline:none;resize:vertical;min-height:80px;transition:all .3s}
.decode-input:focus{border-color:var(--cyan);box-shadow:0 0 30px rgba(0,240,255,.1)}
.decode-input::placeholder{color:var(--dim)}
.decode-btn{width:100%;font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:3px;padding:14px;border:none;cursor:pointer;margin-top:10px;background:linear-gradient(135deg,var(--cyan),var(--purple));color:var(--bg);font-weight:900;transition:all .3s}
.decode-btn:hover{box-shadow:0 0 40px rgba(0,240,255,.3);transform:translateY(-2px)}
.mode-switch{display:flex;gap:4px;margin-bottom:12px}
.mode-btn{flex:1;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;padding:8px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;text-align:center}
.mode-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,240,255,.05)}
.mode-btn.active-pink{border-color:var(--pink);color:var(--pink);background:rgba(255,45,142,.05)}

/* RESULTS */
.result-section{margin:16px 0;animation:fadeIn .5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* SUBTEXT DECODER */
.subtext-card{background:var(--surface);border:1px solid var(--border);padding:16px;margin:8px 0;backdrop-filter:blur(10px)}
.subtext-label{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;margin-bottom:8px}
.subtext-text{font-size:13px;line-height:1.7}

/* EMOTION RADAR */
.emotion-bar{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:11px}
.emotion-fill{height:4px;border-radius:2px;transition:width 1s}
.emotion-name{width:90px;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:1px}
.emotion-val{width:30px;text-align:right;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700}

/* RESPONSE OPTIONS */
.response-option{background:var(--surface);border:1px solid var(--border);padding:16px;margin:8px 0;cursor:pointer;transition:all .3s;position:relative;backdrop-filter:blur(10px)}
.response-option:hover{border-color:var(--cyan);transform:translateX(4px)}
.resp-num{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--cyan);position:absolute;top:12px;right:16px;opacity:.3}
.resp-tag{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;margin-bottom:6px}
.resp-text{font-size:13px;line-height:1.7;margin:8px 0}
.resp-outcome{font-size:10px;color:var(--dim);border-top:1px solid var(--border);padding-top:8px;margin-top:8px}
.copy-btn{padding:6px 12px;background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;cursor:pointer;transition:all .2s;float:right}
.copy-btn:hover{border-color:var(--green);color:var(--green)}

/* INFLUENCE SCORE */
.score-ring{width:100px;height:100px;border-radius:50%;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;margin:16px auto;position:relative}
.score-ring::before{content:'';position:absolute;inset:-3px;border-radius:50%;border:3px solid transparent;border-top-color:var(--cyan);animation:rotate 3s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}
.score-num{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900}
.score-label{text-align:center;font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:4px}

/* CONTACTS */
.contact{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--border);margin:4px 0;cursor:pointer;transition:all .2s;background:var(--surface)}
.contact:hover{border-color:var(--cyan);transform:translateX(4px)}
.contact-name{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1px}
.contact-type{font-size:8px;letter-spacing:1px;padding:2px 6px;border:1px solid}
.type-v{color:var(--cyan);border-color:var(--cyan)}
.type-r{color:var(--pink);border-color:var(--pink)}
.contact-score{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700}

.hr{height:1px;background:var(--border);margin:16px 0}
.back-btn{font-size:9px;color:var(--dim);letter-spacing:1px;cursor:pointer;padding:4px 8px;border:1px solid var(--border)}
.back-btn:hover{border-color:var(--cyan);color:var(--cyan)}
label{display:block;font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin:10px 0 4px}
input[type="text"]{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:13px;padding:10px 12px;outline:none}
input:focus{border-color:var(--cyan)}
.btn-add{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;padding:10px;border:none;cursor:pointer;width:100%;margin-top:8px;transition:all .2s}
.btn-v{background:var(--cyan);color:var(--bg);font-weight:700}
.btn-r{background:var(--pink);color:var(--bg);font-weight:700}
.btn-del{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;padding:8px;width:100%;cursor:pointer;margin-top:8px}
.btn-del:hover{border-color:var(--red);color:var(--red)}
@media(max-width:600px){.wrap{padding:16px 10px 60px}.logo{font-size:14px;letter-spacing:4px}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="scanline"></div>
<div class="wrap">
  <div class="header">
    <div class="logo"><span>NEURAL OS</span><div class="pulse"></div></div>
    <a href="/archive" class="back-btn">EXIT</a>
  </div>
  <div id="app"></div>
</div>
<script>
(function(){
const $=id=>document.getElementById(id);
const app=$('app');
const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';

// ─── Storage ───
function getAll(){try{return JSON.parse(localStorage.getItem('neural_contacts')||'[]')}catch(e){return[]}}
function saveAll(a){localStorage.setItem('neural_contacts',JSON.stringify(a))}
function getOne(id){return getAll().find(p=>p.id===id)}
function upd(id,fn){const a=getAll();const i=a.findIndex(p=>p.id===id);if(i>=0){fn(a[i]);saveAll(a)}}

// ─── NEURAL DECODER ENGINE ───
function decode(text,type,contactName,history){
  const lt=text.toLowerCase();const norm=lt.replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss');
  const words=lt.split(/\s+/);const len=text.length;
  const hasQ=lt.includes('?');const short=len<40;const long=len>200;

  // ─── EMOTION RADAR ───
  const emotions={
    interesse:0,distanz:0,frustration:0,zuneigung:0,unsicherheit:0,dominanz:0,manipulation:0,vertrauen:0
  };
  // Interesse
  if(hasQ)emotions.interesse+=30;
  if(lt.match(/was machst|was hast du|was geht|wie geht|wie war|erzaehl|erzähl/))emotions.interesse+=40;
  if(lt.match(/wann|wo |treffen|sehen|lust/))emotions.interesse+=50;
  if(long)emotions.interesse+=20;
  // Distanz
  if(short&&!hasQ)emotions.distanz+=40;
  if(lt.match(/ok|okay|ja|nein|hm|hmm|aha|klar|gut|passt/))emotions.distanz+=30;
  if(lt.match(/vielleicht|mal schauen|keine zeit|busy|spaeter|später/))emotions.distanz+=50;
  // Frustration
  if(lt.match(/was soll|warum|wieso nicht|versteh nicht|nerv|genervt|satt|reicht|schlimm/))emotions.frustration+=50;
  if(lt.match(/!{2,}/))emotions.frustration+=30;
  // Zuneigung
  if(lt.match(/vermiss|denke an|schoen|schön|freue|mag |lieb|herz|♥|❤|😘|🥰/))emotions.zuneigung+=50;
  if(lt.match(/wuensch|wünsch|schönes|gute nacht|schlaf gut|pass auf dich auf/))emotions.zuneigung+=35;
  // Unsicherheit
  if(lt.match(/weiss nicht|weiß nicht|keine ahnung|vielleicht|glaub|denkst du|meinst du|sicher\?/))emotions.unsicherheit+=45;
  if(lt.match(/oder\?|richtig\?|stimmt das|findest du/))emotions.unsicherheit+=35;
  // Dominanz
  if(lt.match(/du musst|mach das|sofort|jetzt|hör auf|hoer auf|lass das/))emotions.dominanz+=60;
  if(lt.match(/ich will|ich brauch|gib mir/))emotions.dominanz+=30;
  // Manipulation
  if(lt.match(/wenn du mich|du liebst mich nicht|andere wuerden|andere würden|jeder andere/))emotions.manipulation+=60;
  if(lt.match(/schuld|immer du|nie machst|du machst nie/))emotions.manipulation+=40;
  // Vertrauen
  if(lt.match(/ich hab dir|erzaehl dir|erzähl dir|unter uns|nur dir|vertrau/))emotions.vertrauen+=50;
  if(long&&!lt.match(/!{2,}/))emotions.vertrauen+=15;

  // Cap at 100
  Object.keys(emotions).forEach(k=>{emotions[k]=Math.min(100,emotions[k])});
  const topEmotion=Object.entries(emotions).sort((a,b)=>b[1]-a[1])[0];

  // ─── SUBTEXT DECODER ───
  let subtext='';let intent='';let powerDynamic='';
  if(lt.match(/was machst du heute|was hast du vor|was geht/)){
    subtext='Sie will deine Aufmerksamkeit und testet ob du verfuegbar bist. Die eigentliche Frage ist nicht "Was machst du?" sondern "Hast du Zeit fuer MICH?"';
    intent='ATTENTION SEEKING — Sie denkt an dich, will aber nicht direkt sagen "Ich will dich sehen."';
    powerDynamic='SIE initiiert. Das gibt dir den Frame. Wer fragt, gibt Macht ab.';
  }else if(lt.match(/was soll das|wie meinst du|versteh ich nicht/)){
    subtext='Das ist kein echtes Unverstaendnis. Das ist ein Test. Sie will sehen ob du dich rechtfertigst oder ob du bei dir bleibst.';
    intent='FRAME TEST — Sie prueft deine innere Staerke. Erklaerst du dich = Frame verloren. Bleibst du cool = Attraction steigt.';
    powerDynamic='MACHTKAMPF. Wer sich erklaert, verliert. Wer lacht, gewinnt.';
  }else if(lt.match(/wuensch|wünsch|schönes|gute nacht|schlaf gut|pass auf dich/)){
    subtext='Echte Zuneigung mit leichter Sehnsucht. Sie denkt an dich in Momenten wo sie nicht muss. Das ist real.';
    intent='BONDING — Sie baut emotionale Verbindung auf. Kleine Nachrichten = sie will in deinem Kopf sein.';
    powerDynamic='GLEICHGEWICHT. Das sind gesunde Signale. Nicht ueberreagieren.';
  }else if(lt.match(/vermiss|denke an|sehnsucht|einsam|brauch dich/)){
    subtext='Emotionaler Peak. Sie ist verletzlich und oeffnet sich. Was du JETZT sagst, praegt die Dynamik fuer Wochen.';
    intent='VULNERABILITY — Echte Oeffnung. Seltener Moment. Nicht mit Logik antworten.';
    powerDynamic='DU hast den Frame. Sie gibt dir emotionale Macht. Handle weise.';
  }else if(lt.match(/vielleicht|mal schauen|keine zeit|busy|spaeter|später/)){
    subtext='"Vielleicht" heisst Nein. Immer. Wenn sie wollen wuerde, wuerde sie Himmel und Erde bewegen. Das hier ist Hoeflichkeit.';
    intent='SOFT REJECTION — Sie will nicht direkt Nein sagen, aber die Antwort ist Nein.';
    powerDynamic='SIE hat den Frame. Du verlierst ihn, wenn du nachfragst. Einzige Loesung: Rueckzug.';
  }else if(hasQ&&long){
    subtext='Echtes Interesse. Sie investiert Zeit und Energie in diese Nachricht. Das ist ein starkes Zeichen.';
    intent='INVESTMENT — Je laenger die Nachricht, desto mehr denkt sie an dich.';
    powerDynamic='GLEICHGEWICHT bis leichter Vorteil fuer dich.';
  }else if(short&&!hasQ){
    subtext='Minimale Investition. Entweder sie ist beschaeftigt, oder du bist gerade nicht Prioritaet. Beides: Nicht nachhaken.';
    intent='LOW INVESTMENT — Match die Energie. Nie mehr geben als du bekommst.';
    powerDynamic='SIE kontrolliert das Tempo. Lass sie. Antworte genauso kurz.';
  }else if(lt.match(/immobilienscout|angebot|wohnung|haus|miete|kaufen/)){
    subtext='Sie teilt ihren Alltag und Zukunftsplaene mit dir. Das bedeutet: Du bist Teil ihres Denkens. Sie sieht dich als jemanden mit dem sie Zukunft plant — oder sie will deine Meinung.';
    intent='FUTURE PROJECTION — Sie bezieht dich in Lebensentscheidungen ein. Starkes Bindungssignal.';
    powerDynamic='GLEICHGEWICHT. Sie oeffnet ihr Leben fuer dich. Reagiere interessiert aber nicht ueber-enthusiastisch.';
  }else{
    subtext='Neutrale Nachricht. Der Kontext bestimmt den Subtext. Achte auf Timing und Haeufigkeit — WANN sie schreibt sagt mehr als WAS.';
    intent='NEUTRAL — Beobachte das Muster ueber mehrere Nachrichten.';
    powerDynamic='Nicht genug Daten fuer eine klare Einschaetzung.';
  }
  // ─── 3 RESPONSE OPTIONS ───
  let responses=[];
  if(type==='rollo'){
    if(lt.match(/was machst du|was hast du vor|was geht|was treibst/)){
      responses=[
        {tag:'MYSTERIOES',text:'Geheime Sachen. Erzaehl ich dir vielleicht spaeter.',outcome:'Curiosity steigt. Sie wird nachfragen. Frame: Du bist interessant und beschaeftigt.',style:'border-left:3px solid var(--pink)'},
        {tag:'DIREKT',text:'Bin beschaeftigt. Aber heute Abend haette ich kurz Zeit fuer dich.',outcome:'Zeigt Interesse aber zu DEINEN Bedingungen. Du setzt den Rahmen.',style:'border-left:3px solid var(--cyan)'},
        {tag:'MINIMAL',text:'Nichts was dich betrifft 😏',outcome:'Amused Mastery. Provoziert spielerisch. Nur wenn die Dynamik schon flirty ist.',style:'border-left:3px solid var(--gold)'},
      ];
    }else if(lt.match(/was soll das|wie meinst du/)){
      responses=[
        {tag:'AMUSED MASTERY',text:'Du weisst genau was ich meine 😏',outcome:'Shit Test bestanden. Keine Erklaerung. Attraction steigt sofort.',style:'border-left:3px solid var(--pink)'},
        {tag:'REDIRECT',text:'Lass uns das persoenlich klaeren. Text ist das falsche Medium.',outcome:'Du kontrollierst WO das Gespraech stattfindet. Dein Terrain = dein Frame.',style:'border-left:3px solid var(--cyan)'},
        {tag:'NUCLEAR',text:'Wenn du das nicht verstehst, erklaere ich es nicht.',outcome:'Riskant. Nur bei wiederholten Tests. Zeigt absolute Frame-Kontrolle.',style:'border-left:3px solid var(--red)'},
      ];
    }else if(lt.match(/vermiss|denke an|mag dich/)){
      responses=[
        {tag:'WARM + FRAME',text:'Ich weiss.',outcome:'Han Solo Effekt. Zeigt Sicherheit ohne emotional zu werden. Sie fuehlt: Er ist sicher in sich.',style:'border-left:3px solid var(--pink)'},
        {tag:'RECIPROCATE MINIMAL',text:'Geht mir aehnlich. Lass uns was planen.',outcome:'Gibt Zuneigung zurueck aber leitet sofort in ACTION. Reden < Handeln.',style:'border-left:3px solid var(--cyan)'},
        {tag:'PLAYFUL',text:'Natuerlich vermisst du mich. Wer wuerde das nicht 😏',outcome:'Amused Mastery + Confidence. Zeigt: Er nimmt sich nicht zu ernst.',style:'border-left:3px solid var(--gold)'},
      ];
    }else if(lt.match(/wuensch|wünsch|schönes|gute nacht|schlaf gut/)){
      responses=[
        {tag:'KURZ + WARM',text:'Dir auch. Schlaf gut.',outcome:'Match die Energie. Nicht mehr, nicht weniger. Perfekte Balance.',style:'border-left:3px solid var(--cyan)'},
        {tag:'PLAYFUL',text:'Ich schlaf immer gut 😎 Du auch?',outcome:'Leichter Humor. Zeigt: Du bist entspannt und hast dein Leben im Griff.',style:'border-left:3px solid var(--pink)'},
        {tag:'MINIMAL',text:'✌️',outcome:'Ultra-kurz. Zeigt Coolness. Nur wenn du nicht zu distanziert wirken willst.',style:'border-left:3px solid var(--gold)'},
      ];
    }else if(lt.match(/immobilienscout|angebot|wohnung|haus|miete/)){
      responses=[
        {tag:'INTERESSIERT',text:'Sieht gut aus. Was gefaellt dir daran am meisten?',outcome:'Zeigt Interesse an ihrem Leben. Kalibrierte Frage oeffnet Gespraech.',style:'border-left:3px solid var(--cyan)'},
        {tag:'LEADER',text:'Gute Lage. Aber die Kaltmiete ist zu hoch fuer die Groesse. Schick mir noch 2-3, ich schau sie mir an.',outcome:'Du nimmst die Fuehrung. Zeigt Kompetenz und Frame. Sie fuehlt: Er kuemmert sich.',style:'border-left:3px solid var(--pink)'},
        {tag:'ZUKUNFT',text:'Wollen wir am Wochenende zusammen ein paar besichtigen?',outcome:'Bold Move. Projiziert gemeinsame Zukunft. Nur wenn die Beziehung das hergibt.',style:'border-left:3px solid var(--gold)'},
      ];
    }else if(lt.match(/vielleicht|mal schauen|keine zeit|busy/)){
      responses=[
        {tag:'ABUNDANCE',text:'Kein Problem. Meld dich wenn du Zeit hast.',outcome:'Null Druck. Abundance Mentality. Ball bei ihr. Wenn sie will, kommt sie.',style:'border-left:3px solid var(--cyan)'},
        {tag:'SOFT NEXT',text:'Alles klar 👍',outcome:'Minimale Investition. Zeigt: Es betrifft dich nicht. Attraction durch Indifferenz.',style:'border-left:3px solid var(--pink)'},
        {tag:'DEADLINE',text:'Verstehe. Sag mir bis morgen Bescheid, sonst verplan ich um.',outcome:'Zeigt: Deine Zeit ist wertvoll. Erzeugt sanften Handlungsdruck.',style:'border-left:3px solid var(--gold)'},
      ];
    }else{
      responses=[
        {tag:'MIRROR + REDIRECT',text:'Interessant. Erzaehl mir das persoenlich — nicht ueber Text.',outcome:'Lenkt ins Persoenliche. Face-to-face = dein Terrain = dein Frame.',style:'border-left:3px solid var(--cyan)'},
        {tag:'KURZ',text:'Verstehe.',outcome:'Minimale Investition. Laesst Raum. Sie muss mehr investieren.',style:'border-left:3px solid var(--pink)'},
        {tag:'FRAGE',text:'Was erwartest du dir davon?',outcome:'Dreht die Dynamik. SIE muss nachdenken. Du fragst, sie antwortet.',style:'border-left:3px solid var(--gold)'},
      ];
    }
  }else{
    // VOSS MODE
    const lastWords=text.trim().split(/\s+/).slice(-3).join(' ');
    const mirror=lastWords.length>5?lastWords+'...?':'';
    if(lt.match(/schmerz|weh|tut|brennt|sticht|druck|verspann/)){
      responses=[
        {tag:'LABEL + MIRROR',text:(mirror?mirror+'\n\n':'')+'Es klingt so, als ob der Schmerz dir mehr nimmt als nur koerperliche Kraft. Als ob er dir Stueck fuer Stueck etwas wegnimmt — Schlaf, Geduld, das Gefuehl von Normalitaet.\n\nWas muesste passieren, damit du sagst: "Heute ist es anders"?',outcome:'Oeffnet den Patienten emotional. Zeigt tiefes Verstaendnis. Kalibrierte Frage aktiviert Loesungsdenken.',style:'border-left:3px solid var(--green)'},
        {tag:'AKKUSATIONS-AUDIT',text:'Vielleicht denkst du, ich kann gar nicht nachvollziehen wie sich das anfuehlt. Und damit hast du recht — ich kann es nicht fuehlen. Aber ich kann zuhoeren. Richtig zuhoeren.\n\nWas ist das Schlimmste daran? Nicht der Schmerz selbst — sondern was er dir wegnimmt?',outcome:'Entwaffnet Widerstand durch Vorwegnahme. Black-Swan-Frage oeffnet neue Ebene.',style:'border-left:3px solid var(--cyan)'},
        {tag:'DIREKT + PREIS',text:'Ich arbeite nur mit Patienten bei denen ich weiss dass ich etwas bewirken kann. Bei dir sehe ich das.\n\nWaere es schlimm wenn wir das mal strukturiert angehen?',outcome:'Value-Positioning + No-oriented Close. Maximaler Profit bei echtem Commitment.',style:'border-left:3px solid var(--gold)'},
      ];
    }else if(lt.match(/besser|gut|freue|schoen|fortschritt|geschafft|klappt|leichter/)){
      responses=[
        {tag:'VERSTÄRKEN',text:'Das was du beschreibst ist nicht "ein bisschen besser." Das ist ein echter Shift.\n\nWas genau machst du jetzt anders als vor 4 Wochen?',outcome:'Verstaerkt den Fortschritt. Kalibrierte Frage verankert die Veraenderung.',style:'border-left:3px solid var(--green)'},
        {tag:'LABEL + ZUKUNFT',text:'Es scheint als ob sich nicht nur der Schmerz veraendert hat — sondern deine Haltung. Das ist bemerkenswert.\n\nWo willst du in 4 Wochen stehen?',outcome:'Emotionales Label + Zukunftsprojektion. Bindet den Patienten langfristig.',style:'border-left:3px solid var(--cyan)'},
        {tag:'UPSELL',text:'Das freut mich wirklich. Und jetzt kommt der spannende Teil — wir sind erst am Anfang.\n\nWaere es schlimm wenn wir den naechsten Level angehen?',outcome:'Nutzt den positiven Moment fuer Upgrade/Continuation. Maximaler Lifetime Value.',style:'border-left:3px solid var(--gold)'},
      ];
    }else{
      responses=[
        {tag:'MIRROR + LABEL',text:(mirror?mirror+'\n\n':'')+'Ich hoere was du sagst. Und ich hoere auch was du NICHT sagst.\n\nWas ist die eine Sache die du noch nicht ausgesprochen hast?',outcome:'Oefffnet Black-Swan-Bereich. Die wichtigsten Informationen sind die ungesagten.',style:'border-left:3px solid var(--green)'},
        {tag:'EMPATHIE + FRAGE',text:'Das muss sich anfuehlen als ob... ja, als ob du alleine damit bist.\n\nWas wuerdest du dir wuenschen — nicht von mir, sondern generell?',outcome:'Tiefe Empathie + offene Frage. Patient fuehlt sich zum ersten Mal WIRKLICH gehoert.',style:'border-left:3px solid var(--cyan)'},
        {tag:'AUDIT + COMMIT',text:'Du denkst vielleicht: Bringt das hier ueberhaupt was? Und ehrlich — das ist eine faire Frage.\n\nWas muesste passieren damit du sagst: Ja, das war es wert?',outcome:'Entwaffnet Skepsis + kalibrierte Frage nach dem Erfolgskriterium. Bindet.',style:'border-left:3px solid var(--gold)'},
      ];
    }
  }

  // Influence score (aggregated)
  const history_count=(history||[]).length;
  const influence=Math.min(99,20+history_count*3+Object.values(emotions).reduce((a,b)=>a+b,0)/8);

  return{emotions,subtext,intent,powerDynamic,responses,influence:Math.round(influence),topEmotion};
}
// ─── DASHBOARD ───
function renderDash(){
  const all=getAll();
  const totalDecodes=all.reduce((s,a)=>(a.decodes||0)+s,0);

  let html='<div class="decoder" style="text-align:center;padding:30px"><div class="decoder-title">NEURAL OS v1.0</div><div style="font-size:12px;color:var(--dim);line-height:1.7;margin:8px 0">Paste was jemand geschrieben hat.<br>Neural OS decoded Subtext, Emotionen, Power-Dynamik<br>und gibt dir 3 taktische Antwort-Optionen.</div><div style="font-family:Orbitron,sans-serif;font-size:11px;color:var(--cyan);margin-top:12px">'+all.length+' KONTAKTE · '+totalDecodes+' DECODES</div></div>';

  if(all.length){
    html+='<div style="font-family:Orbitron,sans-serif;font-size:10px;color:var(--dim);letter-spacing:2px;margin:16px 0 8px">KONTAKTE</div>';
    html+=all.map(a=>{
      const badge=a.type==='rollo'?'<span class="contact-type type-r">ROLLO</span>':'<span class="contact-type type-v">VOSS</span>';
      const sc=a.influence||0;const scColor=sc>60?'var(--green)':sc>30?'var(--gold)':'var(--dim)';
      return'<div class="contact" onclick="openC(\''+a.id+'\')"><div><div class="contact-name">'+esc(a.name)+'</div><div style="margin-top:4px">'+badge+'</div></div><div class="contact-score" style="color:'+scColor+'">'+sc+'</div></div>';
    }).join('');
  }

  html+='<div class="hr"></div><div class="decoder"><div class="decoder-title">NEUE AKTE</div><label>Name</label><input type="text" id="n-name" placeholder="Name"><div style="display:flex;gap:4px;margin-top:10px"><button class="btn-add btn-v" style="flex:1" onclick="addC(\'voss\')">+ VOSS</button><button class="btn-add btn-r" style="flex:1" onclick="addC(\'rollo\')">+ ROLLO</button></div></div>';

  app.innerHTML=html;
}

window.addC=function(type){
  const name=$('n-name').value.trim();if(!name){alert('Name');return}
  const a=getAll();a.push({id:'n_'+Date.now(),name,type,history:[],influence:20,decodes:0});
  saveAll(a);renderDash();
};
window.openC=function(id){renderContact(id)};

// ─── CONTACT VIEW ───
function renderContact(id){
  const c=getOne(id);if(!c){renderDash();return}
  const isR=c.type==='rollo';
  const color=isR?'var(--pink)':'var(--green)';
  const engine=isR?'ROLLO TOMASSI':'CHRIS VOSS';

  // Build last decode result if exists
  let lastResult='';
  if(c.lastDecode){
    const d=c.lastDecode;
    // Emotion bars
    let emotionHTML='';
    Object.entries(d.emotions).forEach(([k,v])=>{
      if(v>0){const col=k==='zuneigung'?'var(--pink)':k==='frustration'?'var(--red)':k==='dominanz'?'var(--gold)':k==='manipulation'?'var(--red)':k==='vertrauen'?'var(--green)':k==='interesse'?'var(--cyan)':k==='unsicherheit'?'var(--purple)':'var(--dim)';
      emotionHTML+='<div class="emotion-bar"><div class="emotion-name">'+k+'</div><div style="flex:1;background:var(--border);border-radius:2px"><div class="emotion-fill" style="width:'+v+'%;background:'+col+'"></div></div><div class="emotion-val" style="color:'+col+'">'+v+'</div></div>'}
    });

    lastResult='<div class="result-section">';
    lastResult+='<div class="subtext-card"><div class="subtext-label" style="color:var(--cyan)">SUBTEXT</div><div class="subtext-text">'+esc(d.subtext)+'</div></div>';
    lastResult+='<div class="subtext-card"><div class="subtext-label" style="color:var(--gold)">INTENT</div><div class="subtext-text">'+esc(d.intent)+'</div></div>';
    lastResult+='<div class="subtext-card"><div class="subtext-label" style="color:var(--pink)">POWER DYNAMIC</div><div class="subtext-text">'+esc(d.powerDynamic)+'</div></div>';
    lastResult+='<div class="subtext-card"><div class="subtext-label" style="color:var(--purple)">EMOTION RADAR</div>'+emotionHTML+'</div>';

    // 3 Response Options
    lastResult+='<div style="font-family:Orbitron,sans-serif;font-size:10px;letter-spacing:2px;color:'+color+';margin:16px 0 8px">3 RESPONSE OPTIONEN</div>';
    d.responses.forEach((r,i)=>{
      lastResult+='<div class="response-option" style="'+r.style+'" onclick="copyR('+i+')"><div class="resp-num">'+(i+1)+'</div><div class="resp-tag" style="color:'+color+'">'+esc(r.tag)+'</div><div class="resp-text" id="resp-'+i+'">'+esc(r.text)+'</div><div class="resp-outcome">→ '+esc(r.outcome)+'</div><button class="copy-btn" onclick="event.stopPropagation();copyR('+i+')">COPY</button><div style="clear:both"></div></div>';
    });

    // Influence Score
    lastResult+='<div class="score-ring"><div class="score-num" style="color:'+color+'">'+d.influence+'</div></div><div class="score-label">INFLUENCE SCORE</div>';
    lastResult+='</div>';
  }

  // History
  let histHTML='';
  if(c.history&&c.history.length){
    histHTML='<div style="font-family:Orbitron,sans-serif;font-size:10px;letter-spacing:2px;color:var(--dim);margin:16px 0 8px">LETZTE DECODES</div>';
    histHTML+=c.history.slice(-8).reverse().map(h=>'<div style="padding:8px;border:1px solid var(--border);margin:3px 0;font-size:11px;color:var(--dim)"><span style="color:var(--text)">'+esc(h.text.substring(0,60))+(h.text.length>60?'...':'')+'</span><br><span style="font-size:9px">'+esc(h.date)+' · Top: '+esc(h.topEmotion)+'</span></div>').join('');
  }

  app.innerHTML='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span class="back-btn" onclick="renderDash()">ESC</span><span style="font-family:Orbitron,sans-serif;font-size:16px;font-weight:900;letter-spacing:2px;color:'+color+'">'+esc(c.name)+'</span></div>'
    +'<div class="decoder"><div class="decoder-title">NEURAL DECODER — '+engine+'</div><div class="mode-switch"><div class="mode-btn '+(isR?'active-pink':'active')+'">'+engine+'</div></div><textarea class="decode-input" id="decode-in" placeholder="Was hat '+esc(c.name)+' geschrieben? Paste die Nachricht hier..."></textarea><button class="decode-btn" onclick="runDecode(\''+id+'\')">DECODE + RESPOND</button></div>'
    +lastResult
    +'<div class="hr"></div>'+histHTML
    +'<div class="hr"></div><button class="btn-del" onclick="if(confirm(\'Loeschen?\'))delC(\''+id+'\')">AKTE LOESCHEN</button>';
}

window.runDecode=function(id){
  const input=$('decode-in');
  const text=input?input.value.trim():'';
  if(!text)return;
  const c=getOne(id);if(!c)return;

  const result=decode(text,c.type,c.name,c.history);

  upd(id,p=>{
    p.lastDecode=result;
    if(!p.history)p.history=[];
    p.history.push({text,date:new Date().toLocaleString('de'),topEmotion:result.topEmotion[0]});
    if(p.history.length>50)p.history=p.history.slice(-50);
    p.influence=result.influence;
    p.decodes=(p.decodes||0)+1;
  });

  renderContact(id);
  setTimeout(()=>{const r=document.querySelector('.result-section');if(r)r.scrollIntoView({behavior:'smooth',block:'start'})},100);
};

window.copyR=function(i){
  const el=document.getElementById('resp-'+i);
  if(el){navigator.clipboard.writeText(el.textContent);const btns=el.parentElement.querySelectorAll('.copy-btn');btns.forEach(b=>{b.textContent='COPIED';b.style.color='var(--green)';b.style.borderColor='var(--green)';setTimeout(()=>{b.textContent='COPY';b.style.color='';b.style.borderColor=''},1500)})}
};

window.delC=function(id){saveAll(getAll().filter(a=>a.id!==id));renderDash()};

// ─── INIT ───
renderDash();
})();
</script>
</body>
</html>
