<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#030308">
<meta name="robots" content="noindex,nofollow">
<title>KOMMUNIKATIONS-ANALYSE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#030308;--surface:#0a0a14;--border:#1a1a2e;--cyan:#00f0ff;--pink:#ff2d8e;--green:#2dffa8;--gold:#c9a84c;--purple:#a855f7;--red:#ff4444;--text:#e0ddd4;--dim:#666680}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace}
::selection{background:var(--cyan);color:var(--bg)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
a{text-decoration:none;color:var(--cyan)}
.scanline{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.12;z-index:9999;animation:scan 5s linear infinite;pointer-events:none}
@keyframes scan{0%{top:-2px}100%{top:100vh}}
.wrap{max-width:800px;margin:0 auto;padding:40px 20px 80px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(16px,3.5vw,24px);letter-spacing:3px;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.back{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--dim);letter-spacing:2px;padding:6px 12px;border:1px solid var(--border);transition:all .3s}
.back:hover{border-color:var(--cyan);color:var(--cyan)}
h1{font-family:'Orbitron',sans-serif;font-size:clamp(20px,4vw,32px);letter-spacing:2px;margin-bottom:8px}
h2{font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:2px;color:var(--cyan);margin:32px 0 16px;text-transform:uppercase}
.subtitle{font-size:12px;color:var(--dim);letter-spacing:1px;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);padding:24px;margin-bottom:16px;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cyan);opacity:.3}
label{display:block;font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
input[type="text"],input[type="password"],textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:14px;padding:12px 16px;outline:none;transition:border-color .3s}
input:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,240,255,.1)}
textarea{resize:vertical;min-height:60px}
.file-drop{border:2px dashed var(--border);padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:16px}
.file-drop:hover,.file-drop.dragover{border-color:var(--cyan);background:rgba(0,240,255,.03)}
.file-drop .icon{font-size:36px;margin-bottom:12px}
.file-drop .label{font-size:12px;color:var(--dim)}
.file-drop .filename{font-size:14px;color:var(--green);margin-top:8px;display:none}
.file-drop input{display:none}
.btn{display:block;width:100%;font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;padding:16px;border:none;cursor:pointer;transition:all .3s;text-align:center;margin-top:16px}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:var(--bg);font-weight:700}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,240,255,.3)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.loading{display:none;text-align:center;padding:40px 20px}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .phase{font-size:12px;color:var(--dim);letter-spacing:1px}
.results{display:none}
.score-big{text-align:center;margin:24px 0}
.score-big .number{font-family:'Orbitron',sans-serif;font-size:72px;font-weight:900;line-height:1}
.score-big .label{font-size:11px;color:var(--dim);letter-spacing:2px;margin-top:4px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.kpi{background:var(--surface);border:1px solid var(--border);padding:14px;text-align:center}
.kpi .val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;color:var(--cyan)}
.kpi .lbl{font-size:10px;color:var(--dim);letter-spacing:1px;margin-top:4px}
.dim-card{background:var(--surface);border:1px solid var(--border);padding:20px;margin-bottom:12px;position:relative}
.dim-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.dim-name{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:1px;font-weight:700}
.dim-score{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900}
.dim-bar{height:4px;background:var(--border);margin-bottom:12px}
.dim-bar-fill{height:4px;transition:width 1s ease-out}
.dim-desc{font-size:11px;color:var(--dim);margin-bottom:10px;line-height:1.5}
.dim-row{font-size:12px;line-height:1.6;margin:6px 0;padding:6px 0;border-bottom:1px solid rgba(26,26,46,.5)}
.dim-row:last-child{border:none}
.dim-row .tag{font-size:10px;letter-spacing:1px;font-weight:700;margin-right:6px}
.elite-box{background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.3);padding:10px 12px;margin-top:8px;font-size:12px;line-height:1.6}
.strength-item,.improve-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}
.script-item{background:rgba(0,240,255,.04);border:1px solid rgba(0,240,255,.2);padding:14px 16px;margin:8px 0;font-size:13px;font-style:italic;line-height:1.5}
.pricing-box{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.3);padding:20px;font-size:13px;line-height:1.7}
.uniqueness-box{background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.3);padding:20px;font-size:13px;line-height:1.7}
.musk-section{margin-top:40px;border-top:2px solid var(--border);padding-top:32px}
.musk-verdict{text-align:center;margin:24px 0}
.musk-verdict .invest{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;letter-spacing:3px}
.musk-verdict .quote{font-size:13px;font-style:italic;color:var(--dim);margin-top:8px;line-height:1.5}
.musk-row{padding:16px 0;border-bottom:1px solid var(--border)}
.musk-row .musk-label{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;margin-bottom:6px}
.musk-row .musk-text{font-size:13px;line-height:1.6}
.sender-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.sender-name{font-weight:700}
.sender-you{color:var(--cyan);font-size:10px;letter-spacing:1px;margin-left:6px}
.sender-stats{color:var(--dim);font-size:11px}
.hr{height:1px;background:var(--border);margin:24px 0}
.key-row{display:flex;gap:8px;align-items:center}
.key-row input{flex:1}
.key-btn{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);color:var(--dim);cursor:pointer;white-space:nowrap}
.key-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.key-status{font-size:11px;margin-top:6px}
@media(max-width:600px){.wrap{padding:24px 12px 60px}.kpi-grid{grid-template-columns:1fr 1fr 1fr;gap:6px}.kpi .val{font-size:16px}.score-big .number{font-size:56px}.card{padding:16px}}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="wrap">
  <div class="header">
    <div class="logo">KOMMUNIKATION</div>
    <a href="/archive" class="back">ARCHIVE</a>
  </div>
  <div id="upload-section">
    <h1>Kommunikations-Analyse</h1>
    <div class="subtitle">CHRIS VOSS x ELITE LEVEL x MUSK CHECK</div>
    <div class="card">
      <label>Anthropic API Key</label>
      <div class="key-row">
        <input type="password" id="api-key" placeholder="sk-ant-...">
        <button class="key-btn" id="save-key-btn">SPEICHERN</button>
      </div>
      <div class="key-status" id="key-status"></div>
      <p style="font-size:11px;color:var(--dim);margin-top:8px">Key von <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a> — wird lokal gespeichert</p>
    </div>
    <div class="card">
      <label>WhatsApp-Export (.txt oder .zip)</label>
      <div class="file-drop" id="file-drop">
        <div class="icon">📄</div>
        <div class="label">Datei hier ablegen oder klicken</div>
        <div class="filename" id="filename"></div>
        <input type="file" id="file-input" accept=".txt,.csv,.text,.zip">
      </div>
      <label>Dein Name im Chat</label>
      <input type="text" id="therapist-name" placeholder="z.B. Sascha" style="margin-bottom:16px">
      <label>Kontext (optional)</label>
      <textarea id="context" rows="2" placeholder="z.B. Patient mit chronischen Schmerzen..."></textarea>
      <button class="btn btn-primary" id="start-btn" disabled>ANALYSE STARTEN</button>
    </div>
  </div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="phase" id="loading-phase">Chat wird geparst...</div>
  </div>
  <div class="results" id="results"></div>
</div>
<script>
(function(){
  let chatText='',fileName='';
  const fileDrop=document.getElementById('file-drop'),fileInput=document.getElementById('file-input'),fileNameEl=document.getElementById('filename'),nameInput=document.getElementById('therapist-name'),contextInput=document.getElementById('context'),startBtn=document.getElementById('start-btn'),uploadSection=document.getElementById('upload-section'),loadingEl=document.getElementById('loading'),loadingPhase=document.getElementById('loading-phase'),resultsEl=document.getElementById('results'),apiKeyInput=document.getElementById('api-key'),saveKeyBtn=document.getElementById('save-key-btn'),keyStatus=document.getElementById('key-status');

  // --- API Key Management ---
  function getKey(){return localStorage.getItem('ptgo_anthropic_key')||''}
  function saveKey(k){localStorage.setItem('ptgo_anthropic_key',k)}
  const saved=getKey();
  if(saved){apiKeyInput.value=saved;keyStatus.style.color='var(--green)';keyStatus.textContent='Key gespeichert'}
  saveKeyBtn.addEventListener('click',()=>{
    const k=apiKeyInput.value.trim();
    if(k){saveKey(k);keyStatus.style.color='var(--green)';keyStatus.textContent='Key gespeichert'}
    else{localStorage.removeItem('ptgo_anthropic_key');keyStatus.style.color='var(--red)';keyStatus.textContent='Key entfernt'}
    checkReady();
  });
  apiKeyInput.addEventListener('input',checkReady);

  // --- File handling ---
  fileDrop.addEventListener('click',()=>fileInput.click());
  fileDrop.addEventListener('dragover',e=>{e.preventDefault();fileDrop.classList.add('dragover')});
  fileDrop.addEventListener('dragleave',()=>fileDrop.classList.remove('dragover'));
  fileDrop.addEventListener('drop',e=>{e.preventDefault();fileDrop.classList.remove('dragover');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])});
  fileInput.addEventListener('change',()=>{if(fileInput.files.length)handleFile(fileInput.files[0])});

  async function handleFile(file){
    if(file.name.toLowerCase().endsWith('.zip')||file.type==='application/zip'){
      try{
        const zip=await JSZip.loadAsync(file);let txt=null;
        zip.forEach((p,e)=>{if(!e.dir&&p.toLowerCase().endsWith('.txt'))txt=e});
        if(!txt){alert('Keine .txt in ZIP gefunden.');return}
        chatText=await txt.async('string');fileName=file.name+' > '+txt.name;
      }catch(e){alert('ZIP Fehler: '+e.message);return}
    }else{
      chatText=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(file,'UTF-8')});
      fileName=file.name;
    }
    fileNameEl.textContent=fileName+' ('+(chatText.length/1024).toFixed(1)+' KB)';
    fileNameEl.style.display='block';checkReady();
  }

  nameInput.addEventListener('input',checkReady);
  function checkReady(){
    const hasKey=!!(apiKeyInput.value.trim()||getKey());
    startBtn.disabled=!(chatText&&nameInput.value.trim()&&hasKey);
  }

  // --- WhatsApp Parser ---
  function parseWhatsApp(raw){
    const pats=[/^\[(\d{1,2}\.\d{1,2}\.\d{2,4},\s*\d{1,2}:\d{2}(?::\d{2})?)\]\s*([^:]+):\s*(.+)/s,/^(\d{1,2}\.\d{1,2}\.\d{2,4},\s*\d{1,2}:\d{2})\s*-\s*([^:]+):\s*(.+)/s,/^(\d{1,2}\/\d{1,2}\/\d{2,4},\s*\d{1,2}:\d{2})\s*-\s*([^:]+):\s*(.+)/s];
    const msgs=[];let cur=null;
    for(const line of raw.split('\n')){let ok=false;
      for(const p of pats){const m=line.trim().match(p);if(m){if(cur)msgs.push(cur);cur={timestamp:m[1].trim(),sender:m[2].trim(),text:m[3].trim()};ok=true;break}}
      if(!ok&&cur&&line.trim())cur.text+='\n'+line.trim();
    }
    if(cur)msgs.push(cur);return msgs;
  }

  function buildStats(msgs){
    const s={};let tl=0;
    for(const m of msgs){if(!s[m.sender])s[m.sender]={count:0,chars:0,questions:0};s[m.sender].count++;s[m.sender].chars+=m.text.length;if(m.text.includes('?'))s[m.sender].questions++;tl+=m.text.length}
    return{total:msgs.length,senders:s,avgLength:Math.round(tl/Math.max(msgs.length,1))};
  }

  // --- Direct Anthropic API Call ---
  async function callClaude(systemPrompt,userPrompt,maxTokens){
    const key=apiKeyInput.value.trim()||getKey();
    if(!key)throw new Error('Kein API Key');
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20241022',max_tokens:maxTokens,system:systemPrompt,messages:[{role:'user',content:userPrompt}]})
    });
    if(!resp.ok){const e=await resp.text();throw new Error('API '+resp.status+': '+e.substring(0,200))}
    const data=await resp.json();
    const text=data.content&&data.content[0]&&data.content[0].text;
    if(!text)throw new Error('Keine Antwort');
    return text;
  }

  function parseJSON(text){
    try{return JSON.parse(text)}catch(e){}
    const m=text.match(/\{[\s\S]*\}/);
    if(m)return JSON.parse(m[0]);
    throw new Error('Kein JSON gefunden');
  }

  // --- Start Analysis ---
  startBtn.addEventListener('click',async()=>{
    const tn=nameInput.value.trim(),ctx=contextInput.value.trim();
    // Save key if entered
    if(apiKeyInput.value.trim())saveKey(apiKeyInput.value.trim());

    uploadSection.style.display='none';loadingEl.style.display='block';
    loadingPhase.textContent='Chat wird geparst...';
    const msgs=parseWhatsApp(chatText);
    if(!msgs.length){loadingEl.style.display='none';uploadSection.style.display='block';alert('Keine Nachrichten erkannt.');return}
    const stats=buildStats(msgs);
    let excerpt=msgs.slice(-80).map(m=>'['+m.timestamp+'] '+m.sender+': '+m.text).join('\n');
    if(excerpt.length>6000)excerpt=excerpt.slice(-6000);

    // Voss Analysis
    loadingPhase.textContent='Chris Voss Analyse (8 Dimensionen)...';
    let voss={};
    try{
      const vossSystem='Du bist ein Elite-Kommunikationscoach, spezialisiert auf Chris Voss\x27 Verhandlungstechniken ("Never Split the Difference"). Analysiere therapeutische Kommunikation auf Weltklasse-Niveau. Antworte IMMER NUR mit validem JSON. Kein Markdown, kein Text davor oder danach. Kein ```json Block.';
      const vossPrompt='Analysiere diesen WhatsApp-Chatverlauf. Der Therapeut heisst "'+tn+'".\n'+(ctx?'Kontext: '+ctx+'\n':'')+'\nCHATVERLAUF:\n'+excerpt.substring(0,6000)+'\n\nBewerte nach 8 Chris Voss Dimensionen (je 0-100):\n1. TAKTISCHE EMPATHIE\n2. KALIBRIERTE FRAGEN\n3. SPIEGELUNG\n4. LABELING\n5. AKKUSATIONS-AUDIT\n6. NEIN-ORIENTIERTE FRAGEN\n7. LATE-NIGHT-DJ\n8. BLACK SWANS\n\nPro Dimension: score (0-100), good (was gut war), improve (was besser geht), elite (Weltklasse-Vorschlag).\n\nAntworte NUR mit diesem JSON:\n{"overall_score":0,"dimensions":{"tactical_empathy":{"score":0,"good":"","improve":"","elite":""},"calibrated_questions":{"score":0,"good":"","improve":"","elite":""},"mirroring":{"score":0,"good":"","improve":"","elite":""},"labeling":{"score":0,"good":"","improve":"","elite":""},"accusation_audit":{"score":0,"good":"","improve":"","elite":""},"no_oriented":{"score":0,"good":"","improve":"","elite":""},"late_night_dj":{"score":0,"good":"","improve":"","elite":""},"black_swan":{"score":0,"good":"","improve":"","elite":""}},"top_strengths":["","",""],"top_improvements":["","",""],"pricing_insight":"","uniqueness":"","concrete_scripts":["","","",""]}';
      const raw=await callClaude(vossSystem,vossPrompt,4000);
      voss=parseJSON(raw);
    }catch(e){voss={error:e.message}}

    // Musk Check
    loadingPhase.textContent='Musk Protocol wird aktiviert...';
    let musk={};
    try{
      const muskSystem='Du bist Elon Musk. Brutal ehrlich, First-Principles-Denker, 10X-Mindset. Antworte NUR mit validem JSON. Kein Markdown, kein ```json Block.';
      const muskPrompt='Kommunikationsanalyse eines Therapeuten:\n\n'+JSON.stringify(voss).substring(0,3000)+'\n\n'+msgs.length+' WhatsApp-Nachrichten.\n\nBeantworte als Elon Musk:\n1. FIRST PRINCIPLES\n2. 10X THINKING\n3. AUTOMATION\n4. SCALE\n5. PRICING\n6. SPEED\n7. KILLER FEATURE\n8. FINAL VERDICT: Investieren ja/nein?\n\nNUR dieses JSON:\n{"first_principles":"","ten_x_thinking":"","automation":"","scale":"","pricing":"","speed":"","killer_feature":"","final_verdict":"","invest":false,"one_line":""}';
      const raw2=await callClaude(muskSystem,muskPrompt,2000);
      musk=parseJSON(raw2);
    }catch(e){musk={error:e.message}}

    loadingEl.style.display='none';
    renderResults(msgs,stats,tn,voss,musk);
  });
  // --- Render Results ---
  function renderResults(msgs,stats,therapistName,voss,musk){
    const tn=therapistName.toLowerCase();
    const score=voss.overall_score||0;
    const scoreColor=score<40?'var(--red)':score<70?'var(--gold)':'var(--green)';
    let errHTML='';
    if(voss.error)errHTML='<div class="card" style="border-color:var(--red);margin-bottom:16px"><div style="font-size:11px;color:var(--red);letter-spacing:1px;font-weight:700;margin-bottom:6px">API FEHLER</div><p style="color:var(--red);font-size:13px">'+esc(voss.error)+'</p></div>';
    let senderHTML='';
    for(const[name,s]of Object.entries(stats.senders)){
      const isT=name.toLowerCase().includes(tn);
      const pct=Math.round(s.count/Math.max(stats.total,1)*100);
      senderHTML+='<div class="sender-row"><div><span class="sender-name">'+esc(name)+'</span>'+(isT?'<span class="sender-you">DU</span>':'')+'</div><div class="sender-stats">'+s.count+' Nachr. ('+pct+'%) &middot; '+s.questions+' Fragen</div></div>';
    }
    const dimMeta={tactical_empathy:{label:'Taktische Empathie',desc:'Verstaendnis der Perspektive demonstrieren',color:'var(--cyan)'},calibrated_questions:{label:'Kalibrierte Fragen',desc:'Offene Wie/Was-Fragen statt geschlossener',color:'var(--green)'},mirroring:{label:'Spiegelung',desc:'Schluesselwoerter wiederholen fuer Rapport',color:'var(--purple)'},labeling:{label:'Labeling',desc:'"Es scheint als ob..." Emotionen benennen',color:'var(--pink)'},accusation_audit:{label:'Akkusations-Audit',desc:'Negative Erwartungen vorwegnehmen',color:'var(--gold)'},no_oriented:{label:'Nein-orientierte Fragen',desc:'Fragen wo "Nein" die gewuenschte Antwort ist',color:'var(--cyan)'},late_night_dj:{label:'Late-Night-DJ',desc:'Ruhiger, kontrollierter Ton',color:'var(--green)'},black_swan:{label:'Black Swans',desc:'Versteckte Informationen entdecken',color:'var(--pink)'}};
    let dimsHTML='';const dims=voss.dimensions||{};
    for(const[key,meta]of Object.entries(dimMeta)){
      const d=dims[key]||{};const ds=d.score||0;
      const dc=ds<40?'var(--red)':ds<70?'var(--gold)':'var(--green)';
      dimsHTML+='<div class="dim-card"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:'+meta.color+';opacity:.5"></div><div class="dim-header"><div class="dim-name">'+meta.label+'</div><div class="dim-score" style="color:'+dc+'">'+ds+'</div></div><div class="dim-bar"><div class="dim-bar-fill" style="width:'+Math.max(ds,2)+'%;background:'+dc+'"></div></div><div class="dim-desc">'+meta.desc+'</div><div class="dim-row"><span class="tag" style="color:var(--green)">GUT</span>'+esc(d.good||'—')+'</div><div class="dim-row"><span class="tag" style="color:var(--gold)">BESSER</span>'+esc(d.improve||'—')+'</div><div class="elite-box"><span class="tag" style="color:var(--purple)">ELITE</span>'+esc(d.elite||'—')+'</div></div>';
    }
    let strengthsHTML=(voss.top_strengths||[]).map(s=>'<div class="strength-item"><span style="color:var(--green)">&#10003;</span> '+esc(s)+'</div>').join('');
    let improvementsHTML=(voss.top_improvements||[]).map(s=>'<div class="improve-item"><span style="color:var(--gold)">&uarr;</span> '+esc(s)+'</div>').join('');
    let scriptsHTML=(voss.concrete_scripts||[]).map(s=>'<div class="script-item">"'+esc(s)+'"</div>').join('');
    let muskHTML='';
    if(!musk.error){
      const ic=musk.invest?'var(--green)':'var(--red)';
      const it=musk.invest?'JA — ICH INVESTIERE':'NEIN — NOCH NICHT';
      const mk=[['first_principles','FIRST PRINCIPLES'],['ten_x_thinking','10X THINKING'],['automation','AUTOMATION'],['scale','SCALE'],['pricing','PRICING'],['speed','SPEED'],['killer_feature','KILLER FEATURE'],['final_verdict','FINAL VERDICT']];
      let mr=mk.map(([k,l])=>{const v=musk[k]||'';return v?'<div class="musk-row"><div class="musk-label" style="color:var(--gold)">'+l+'</div><div class="musk-text">'+esc(v)+'</div></div>':''}).join('');
      muskHTML='<div class="musk-section"><div style="text-align:center;margin-bottom:16px"><div style="font-family:Orbitron,sans-serif;font-size:10px;color:var(--dim);letter-spacing:3px;margin-bottom:8px">MUSK PROTOCOL</div><h2 style="color:var(--text);font-size:18px;margin:0">Wuerde Elon investieren?</h2></div><div class="musk-verdict"><div class="invest" style="color:'+ic+'">'+it+'</div><div class="quote">"'+esc(musk.one_line||'')+'"</div></div>'+mr+'</div>';
    }else if(musk.error){
      muskHTML='<div class="musk-section"><p style="color:var(--red)">Musk-Check Fehler: '+esc(musk.error)+'</p></div>';
    }
    resultsEl.innerHTML='<h1>Analyse-Ergebnis</h1><div class="subtitle">CHRIS VOSS x ELITE LEVEL x MUSK CHECK</div>'+errHTML+'<h2>Chat-Statistik</h2><div class="kpi-grid"><div class="kpi"><div class="val">'+stats.total+'</div><div class="lbl">NACHRICHTEN</div></div><div class="kpi"><div class="val">'+Object.keys(stats.senders).length+'</div><div class="lbl">TEILNEHMER</div></div><div class="kpi"><div class="val">'+stats.avgLength+'</div><div class="lbl">AVG ZEICHEN</div></div></div>'+senderHTML+'<div class="hr"></div><div class="score-big"><div class="number" style="color:'+scoreColor+'">'+score+'</div><div class="label">VOSS ELITE SCORE / 100</div></div><div class="hr"></div><h2>8 Dimensionen — Chris Voss</h2>'+dimsHTML+'<div class="hr"></div><h2>Top 3 Staerken</h2>'+strengthsHTML+'<div class="hr"></div><h2>Top 3 Verbesserungen</h2>'+improvementsHTML+'<div class="hr"></div><h2>Konkrete Formulierungen</h2>'+scriptsHTML+(voss.pricing_insight?'<div class="hr"></div><h2>Pricing-Optimierung</h2><div class="pricing-box">'+esc(voss.pricing_insight)+'</div>':'')+(voss.uniqueness?'<div class="hr"></div><h2>Einzigartigkeit</h2><div class="uniqueness-box">'+esc(voss.uniqueness)+'</div>':'')+muskHTML+'<div class="hr"></div><div style="text-align:center;margin:24px 0"><button class="btn btn-primary" style="width:auto;display:inline-block;padding:14px 32px" onclick="location.reload()">NEUE ANALYSE</button></div><div style="text-align:center"><a href="/archive" style="font-size:11px;color:var(--dim);letter-spacing:1px">ARCHIVE</a></div>';
    resultsEl.style.display='block';
  }
  function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
})();
</script>
</body>
</html>
