<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#030308">
<title>THE MATRIX</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#030308;--green:#2dffa8;--text:#e0ddd4;--dim:#555568}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;overflow-x:hidden}
::selection{background:var(--green);color:var(--bg)}

.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px;position:relative}
.page::before{content:'';position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(45,255,168,.04),transparent 70%);pointer-events:none}

.title{font-family:'Orbitron',sans-serif;font-size:clamp(48px,12vw,96px);font-weight:900;letter-spacing:6px;line-height:1;margin-bottom:32px;color:var(--text)}

.line{font-size:clamp(15px,3vw,20px);color:var(--dim);max-width:480px;line-height:1.8;margin-bottom:48px}

.price{font-family:'Orbitron',sans-serif;font-size:clamp(32px,6vw,56px);font-weight:900;color:var(--green);margin-bottom:6px}
.price-note{font-size:11px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}

.cta{font-family:'Orbitron',sans-serif;font-size:clamp(12px,2vw,15px);letter-spacing:4px;padding:20px 56px;background:var(--text);color:var(--bg);font-weight:700;cursor:pointer;transition:all .15s;border:none;text-transform:uppercase}
.cta:hover{background:var(--green);transform:translateY(-2px);box-shadow:0 0 60px rgba(45,255,168,.25)}
.cta:active{transform:scale(.97)}

.foot{position:absolute;bottom:24px;font-size:10px;color:var(--dim);letter-spacing:2px}
.foot a{color:var(--dim);text-decoration:none}
</style>
</head>
<body>

<div class="page">
  <h1 class="title">THE MATRIX</h1>
  <p class="line">KI-Betriebssystem. Täglich gefüttert. Sagt dir was du tun sollst. Du handelst.</p>
  <div class="price">€4.997</div>
  <div class="price-note">Einmalig · Lifetime · 14 Tage Garantie</div>
  <button class="cta" onclick="buyMatrix()">Zugang</button>
  <div class="foot"><a href="/impressum">Impressum</a></div>
</div>

<script>
async function buyMatrix(){
  const b=document.querySelector('.cta');
  b.textContent='...';b.disabled=true;
  try{
    const r=await fetch('/api/create-checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({item_type:'session',item_name:'THE MATRIX — Lifetime Access',price:4997,quantity:1})});
    const d=await r.json();
    if(d.url)window.location.href=d.url;else throw 0;
  }catch(e){b.textContent='ZUGANG';b.disabled=false}
}
</script>
</body>
</html>
