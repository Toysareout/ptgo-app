<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#030308">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex,nofollow">
<link rel="manifest" href="/manifest.json">
<title>ZEIS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#030308;--surface:#0a0a14;--border:#1a1a2e;--green:#2dffa8;--gold:#c9a84c;--cyan:#00f0ff;--text:#e0ddd4;--dim:#555568;--safe-bottom:env(safe-area-inset-bottom,0px)}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;overflow:hidden;-webkit-tap-highlight-color:transparent}
::selection{background:var(--green);color:var(--bg)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border)}

/* GATE */
#gate{position:fixed;inset:0;z-index:99;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
#gate.gone{display:none}
.g-title{font-family:'Orbitron',sans-serif;font-size:clamp(48px,12vw,72px);font-weight:900;color:var(--text);letter-spacing:8px}
.g-input{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:16px;padding:14px 20px;width:240px;text-align:center;outline:none;transition:border-color .3s;-webkit-appearance:none}
.g-input:focus{border-color:var(--green)}
.g-input::placeholder{color:var(--dim)}
.g-err{color:#ff4444;font-size:11px;min-height:16px}

/* APP */
#app{display:none;height:100vh;height:100dvh;flex-direction:column}
#app.on{display:flex}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-z{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:6px}
.hdr-rev{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;color:var(--green)}

/* SCROLL AREA */
.flow{flex:1;overflow-y:auto;padding:20px 20px 8px}

/* REVENUE BLOCK */
.rev-block{margin-bottom:16px}
.rev-big{font-family:'Orbitron',sans-serif;font-size:clamp(28px,7vw,44px);font-weight:900;color:var(--green);text-align:center;margin-bottom:4px}
.rev-bar{height:3px;background:var(--surface);margin-bottom:4px}
.rev-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .6s}
.rev-label{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--dim);text-align:right;letter-spacing:2px;margin-bottom:4px}
.rev-row{display:flex;gap:8px}
.rev-input{flex:1;background:var(--surface);border:1px solid rgba(45,255,168,.15);color:var(--green);font-family:'Orbitron',sans-serif;font-size:15px;padding:12px 14px;outline:none;transition:border-color .3s;-webkit-appearance:none}
.rev-input:focus{border-color:var(--green)}
.rev-input::placeholder{color:var(--dim);font-family:'Space Mono',monospace;font-size:11px}
.rev-btn{background:var(--green);border:none;color:var(--bg);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1px;padding:12px 18px;cursor:pointer;font-weight:700}
.streak{text-align:center;margin:8px 0 16px}
.streak span{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--gold);letter-spacing:3px}

/* DIRECTIVE */
.dir{background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.2);padding:18px;margin-bottom:16px;position:relative}
.dir::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold)}
.dir-label{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.dir-text{font-size:13px;color:var(--text);line-height:1.8;font-weight:700}

/* STREAM */
.stream{margin-bottom:8px}
.msg{padding:14px;margin-bottom:6px;border:1px solid var(--border);background:var(--surface);animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.u{border-left:2px solid var(--dim)}
.msg.z{border-left:2px solid var(--green);background:rgba(45,255,168,.03)}
.msg .ml{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.msg.u .ml{color:var(--dim)}
.msg.z .ml{color:var(--green)}
.msg .mt{font-size:12px;line-height:1.8;color:var(--text)}
.empty{text-align:center;padding:32px 16px;color:var(--dim);font-size:12px;line-height:1.8}

/* INPUT BAR */
.bar{display:flex;gap:8px;padding:12px 20px;padding-bottom:calc(12px + var(--safe-bottom));border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.bar textarea{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:13px;padding:12px;outline:none;resize:none;min-height:44px;max-height:80px;transition:border-color .3s}
.bar textarea:focus{border-color:var(--green)}
.bar textarea::placeholder{color:var(--dim)}
.bar-send{background:var(--green);border:none;color:var(--bg);font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;width:48px;cursor:pointer;flex-shrink:0;transition:opacity .2s}
.bar-send:hover{opacity:.8}
.bar-send:active{transform:scale(.93)}
</style>
</head>
<body>

<div id="gate">
  <div class="g-title">ZEIS</div>
  <input type="password" class="g-input" id="pw" placeholder="Code" autofocus>
  <div class="g-err" id="err"></div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-z">ZEIS</div>
    <div class="hdr-rev" id="hdrRev">€0</div>
  </div>

  <div class="flow" id="flow">

    <div class="rev-block">
      <div class="rev-big" id="revBig">€0</div>
      <div class="rev-bar"><div class="rev-fill" id="revFill" style="width:0%"></div></div>
      <div class="rev-label" id="revLabel"></div>
      <div class="rev-row">
        <input type="number" class="rev-input" id="revIn" placeholder="€ verdient..." min="0">
        <button class="rev-btn" id="revBtn">LOG</button>
      </div>
      <div class="streak"><span id="streakText"></span></div>
    </div>

    <div class="dir" id="dir"></div>

    <div class="stream" id="stream">
      <div class="empty" id="empty">Was beschäftigt dich gerade?<br>Schreib es. ZEIS sagt dir was du tun sollst.</div>
    </div>

  </div>

  <div class="bar">
    <textarea id="input" placeholder="Was ist los?" rows="1"></textarea>
    <button class="bar-send" id="send">→</button>
  </div>
</div>

<script>
const PASS='zeis2026';
const TARGET=333333;
const RK='z_rev';
const MK='z_msg';

// ── GATE ──
const gate=document.getElementById('gate');
const pwEl=document.getElementById('pw');
if(localStorage.getItem('z_in')==='1'){gate.classList.add('gone');document.getElementById('app').classList.add('on');boot()}
pwEl.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(pwEl.value===PASS){localStorage.setItem('z_in','1');gate.classList.add('gone');document.getElementById('app').classList.add('on');boot()}
    else{document.getElementById('err').textContent='Falscher Code.';pwEl.value=''}
  }
});

// ── DATA ──
function gR(){try{return JSON.parse(localStorage.getItem(RK))||{}}catch(e){return{}}}
function sR(r){localStorage.setItem(RK,JSON.stringify(r))}
function gM(){try{return JSON.parse(localStorage.getItem(MK))||[]}catch(e){return[]}}
function sM(m){localStorage.setItem(MK,JSON.stringify(m))}
function td(){return new Date().toISOString().slice(0,10)}
function tR(){return gR()[td()]||0}
function streak(){const r=gR();let s=0;const d=new Date();for(let i=1;i<=365;i++){d.setDate(d.getDate()-1);if(r[d.toISOString().slice(0,10)]>0)s++;else break}if(tR()>0)s++;return s}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── PATTERNS ──
const P={
  stress:['stress','druck','burnout','überlastet','erschöpft','müde','kaputt','overwhelm','fertig','genervt','überfordert'],
  geld:['geld','money','verdien','umsatz','kunde','client','sales','business','income','cash','profit','revenue','verkauf','preis','angebot'],
  beziehung:['frau','frauen','beziehung','dating','liebe','sex','trennung','freundin','single','partner','ehe','familie'],
  gesundheit:['schmerz','schlaf','krank','training','gym','körper','rücken','kopf','sport','pain','müde','energie','essen'],
  angst:['angst','zweifel','unsicher','sorge','panik','blockade','stuck','fear','versagen','scheitern','risiko'],
  disziplin:['prokrastin','faul','aufschieb','keine lust','unmotiviert','abgelenkt','focus','disziplin','aufhör','durchhalten'],
  strategie:['plan','strategie','ziel','richtung','entscheid','wohin','nächster schritt','fokus','priorit','vision'],
  idee:['idee','projekt','bauen','app','content','kreativ','innovation','produkt','launch']
};
function detect(t){const l=t.toLowerCase();for(const[k,w]of Object.entries(P)){if(w.some(x=>l.includes(x)))return k}return'x'}

// ── ZEIS ENGINE — First Principles. Zerlegen. Neu denken. Handeln. ──
const Z={
  stress:[
    'Zerlegen: Was genau stresst dich? Nicht "alles" — EIN Auslöser. Schreib ihn auf.\nNeu denken: Musst du das wirklich tun? Oder glaubst du nur dass du musst?\nHandeln: Streiche es oder erledige es. Jetzt.',
    'Stress ist ein System-Fehler. Du versuchst zu viel gleichzeitig. Ein Mensch, eine Aufgabe, ein Zeitblock. Lösch 3 Dinge von deiner Liste. Sofort.',
    'Alte Annahme: "Ich muss das alles schaffen." Wahrheit: Du musst nur die EINE Sache schaffen die alles andere überflüssig macht. Welche ist das?'
  ],
  geld:[
    'Zerlegen: Geld = jemand bezahlt dich für ein gelöstes Problem. Welches Problem löst du? Für wen?\nNeu denken: Löst du ein €10 oder ein €10.000 Problem?\nHandeln: Schreib JETZT eine Nachricht an jemanden mit dem teuren Problem.',
    'Alte Annahme: "Ich muss erst alles fertig bauen." Wahrheit: Verkaufe bevor du baust. Frag 3 Menschen ob sie zahlen würden. Heute.',
    'Geld fließt zu dem der Wert liefert. Nicht zu dem der am härtesten arbeitet. Wo lieferst du gerade Wert? Wo nicht? Eliminiere alles ohne Wertschöpfung.',
    'Dein nächster Kunde ist eine Nachricht entfernt. Nicht eine Website. Nicht ein Funnel. Eine ehrliche Nachricht: "Ich kann X für dich lösen." Schick sie.',
    'Was kostet eine Stunde deiner Zeit? Bei €10M/Jahr = €4.800/Stunde. Ist das was du GERADE tust €4.800/Stunde wert? Wenn nein — sofort wechseln.'
  ],
  beziehung:[
    'Zerlegen: Was willst du wirklich? Aufmerksamkeit? Bestätigung? Verbindung?\nNeu denken: Suchst du bei jemand anderem was du dir selbst nicht geben kannst?\nHandeln: Definiere deinen Wert unabhängig von anderen.',
    'Alte Annahme: "Ich muss die richtige Person finden." Wahrheit: Werde die richtige Person. Alles andere folgt.',
    'Anziehung ist kein Zufall — es ist ein System. Dein Wert bestimmt deine Optionen. Was erhöht deinen Wert? Pick one. Verbessere es diese Woche.'
  ],
  gesundheit:[
    'Zerlegen: Dein Körper ist ein System. Schlaf, Ernährung, Bewegung, Stress. Welches System ist kaputt?\nNeu denken: Nicht Symptome behandeln — Ursache finden.\nHandeln: Fix das EINE kaputte System heute.',
    'Alte Annahme: "Ich habe keine Zeit für Gesundheit." Wahrheit: Ohne Gesundheit hast du keine Zeit für NICHTS. Was änderst du heute Abend?',
    'Schmerz ist Information. Nicht der Feind. Was sagt dein Körper? Hör 5 Minuten zu. Das ist dein Diagnose-Report.'
  ],
  angst:[
    'Zerlegen: Wovor genau hast du Angst? Was passiert im schlimmsten Fall? Schreib es auf.\nNeu denken: Kannst du damit leben? Ja.\nHandeln: Die Angst ist eine Lüge. Tu die Sache. 5-4-3-2-1.',
    'Alte Annahme: "Ich muss mich sicher fühlen bevor ich handle." Wahrheit: Sicherheit kommt NACH dem Handeln. Nie davor.',
    'Angst und Aufregung sind das GLEICHE Signal. Gleicher Puls, gleiche Hormone. Der Unterschied ist deine Interpretation. Interpretiere es als Aufregung. Handle.'
  ],
  disziplin:[
    'Zerlegen: Du prokrastinierst nicht weil du faul bist. Du prokrastinierst weil die Aufgabe unklar ist.\nNeu denken: Was sind die ERSTEN 2 Minuten?\nHandeln: Mach nur die 2 Minuten. Der Rest kommt von allein.',
    'Alte Annahme: "Ich brauche Motivation." Wahrheit: Motivation kommt NACH dem Anfangen. Timer auf 25 Minuten. Los.',
    'Willenskraft ist endlich. Jede Entscheidung verbraucht sie. Lösung: Automatisiere Entscheidungen. Gleiche Routine. Gleiche Regeln. Keine Ausnahmen.'
  ],
  strategie:[
    'Zerlegen: Wo willst du hin? Wo bist du? Was ist die Lücke?\nNeu denken: Ist dein Plan ein 10% Plan oder ein 10x Plan?\nHandeln: Was wäre der 10x Move? Tu den.',
    'Pläne sind wertlos. Planning ist alles. Der ERSTE Schritt zeigt dir den zweiten. Mach den ersten. In 5 Minuten.',
    'Delete → Simplify → Accelerate → Automate. Die meisten starten bei Accelerate. Starte bei Delete. Was streichst du JETZT?'
  ],
  idee:[
    'Zerlegen: Löst die Idee ein Problem? Zahlt jemand dafür?\nNeu denken: Nicht bauen — validieren.\nHandeln: Frag 3 Menschen ob sie zahlen würden. Antwort = Wahrheit.',
    'Die schlechteste Idee die du umsetzt schlägt die beste Idee die du nicht umsetzt. 48 Stunden. Ship or kill.',
    'Eine Idee die niemand kauft ist ein Hobby. Ein Problem das jemand bezahlt ist ein Business. Was ist das Problem des KUNDEN?'
  ],
  x:[
    'Schreib konkreter. Was ist dein EIGENTLICHES Problem? Nicht das Symptom — die Ursache.',
    'Jeder Moment in dem du nachdenkst statt handelst ist ein Moment in dem sich nichts ändert. Was tust du JETZT?',
    'Zerlege es: Was beschäftigt dich? Geld? Beziehung? Gesundheit? Angst? Schreib das Wort. ZEIS sagt dir was du tun sollst.'
  ]
};

// ── DIRECTIVES ──
const D=[
  {h:[5,6,7,8],t:'Morgens ist dein Gehirn 3x schneller. Nutze es für das Problem das du seit Tagen aufschiebst. Nicht Email. Nicht Social Media. Das EINE Problem.'},
  {h:[9,10,11],t:'Deep Work Block. Eine Aufgabe. Null Ablenkung. Die nächsten 3 Stunden entscheiden ob dieser Tag zählt oder nicht.'},
  {h:[12,13],t:'Hälfte des Tages rum. Hast du heute Wert geliefert? Nicht gearbeitet — WERT GELIEFERT. Wenn nein, die nächste Stunde gehört dem Kunden.'},
  {h:[14,15,16,17],t:'Jeder Mensch in deinem Netzwerk hat ein Problem das du lösen kannst. Ein Call. Eine Nachricht. Ein Angebot. Jetzt.'},
  {h:[18,19,20],t:'Eine Sache heute FERTIG machen. Nicht anfangen — FERTIG. Der Unterschied zwischen dir von gestern und dir von morgen: Abschluss.'},
  {h:[21,22,23,0,1,2,3,4],t:'Recovery ist keine Schwäche. Es ist System-Wartung. Ohne 7h Schlaf verlierst du morgen 30% Kapazität. Plan morgen. Schlaf jetzt.'}
];
function getDir(){
  const h=new Date().getHours();
  const d=D.find(d=>d.h.includes(h))||D[5];
  const r=tR();
  return r>0?`€${r.toLocaleString('de-DE')} heute. Gut. Weiter.\n\n${d.t}`:d.t;
}

function respond(t){const p=detect(t);const c=Z[p];return c[Math.floor(Math.random()*c.length)]}

// ── RENDER ──
function render(){
  const rev=tR(),s=streak(),msgs=gM(),pct=Math.min(100,Math.round(rev/TARGET*100));
  document.getElementById('hdrRev').textContent='€'+rev.toLocaleString('de-DE');
  document.getElementById('revBig').textContent='€'+rev.toLocaleString('de-DE');
  document.getElementById('revFill').style.width=pct+'%';
  document.getElementById('revLabel').textContent=pct+'% von €'+TARGET.toLocaleString('de-DE');
  document.getElementById('streakText').textContent=s>0?s+' TAGE STREAK':'TAG 1';
  document.getElementById('dir').innerHTML=`<div class="dir-label">Dein Befehl</div><div class="dir-text">${getDir().replace(/\n/g,'<br>')}</div>`;

  const stream=document.getElementById('stream');
  const empty=document.getElementById('empty');
  const recent=msgs.slice(0,30);
  if(recent.length){
    empty.style.display='none';
    stream.innerHTML=recent.map(m=>{
      const t=new Date(m.ts).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      return`<div class="msg ${m.w==='u'?'u':'z'}"><div class="ml">${m.w==='u'?'DU':'ZEIS'} · ${t}</div><div class="mt">${esc(m.text)}</div></div>`;
    }).join('');
  }else{empty.style.display='block'}
}

// ── SUBMIT ──
function submit(){
  const el=document.getElementById('input');
  const t=el.value.trim();if(!t)return;
  const msgs=gM();
  msgs.unshift({w:'u',text:t,ts:Date.now()});
  msgs.unshift({w:'z',text:respond(t),ts:Date.now()+1});
  sM(msgs);el.value='';render();
  document.getElementById('flow').scrollTop=document.querySelector('.stream').offsetTop-80;
}

// ── REVENUE ──
function logRev(){
  const el=document.getElementById('revIn');
  const v=parseFloat(el.value);if(!v||v<=0)return;
  const r=gR();r[td()]=(r[td()]||0)+v;sR(r);
  const total=r[td()],pct=Math.round(total/TARGET*100);
  const msgs=gM();
  msgs.unshift({w:'z',text:`€${v.toLocaleString('de-DE')} geloggt. Stand: €${total.toLocaleString('de-DE')} (${pct}%). ${pct<5?'Anfang. Mehr.':pct<50?'Weiter.':pct<100?'Push.':'Tagesziel. Überperformen.'}`,ts:Date.now()});
  sM(msgs);el.value='';render();
}

function boot(){
  render();
  document.getElementById('send').addEventListener('click',submit);
  document.getElementById('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit()}});
  document.getElementById('revBtn').addEventListener('click',logRev);
  document.getElementById('revIn').addEventListener('keydown',e=>{if(e.key==='Enter')logRev()});
}
</script>
</body>
</html>
